\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>激励+信息流(5/6)</td>\n<td>&ldquo;we compensate and we promote against adherence to our values&rdquo;；&rdquo;Every individual contributor rates their manager on a one-to-five scale for each behavior, and you can&rsquo;t pick three&rdquo;；&rdquo;ICs score their managers every six months by answering about 50 questions… This prevents managers punching down&rdquo;(Younis, speedrun / First Round Firsthand)</td>\n<td>10 价值观×~5 可观察行为(~50 题)→ <strong>每个 IC 每半年反向给上级打 1–5、禁选中位 3、强制区分</strong> → 经理分与团队绩效配对看；薪酬/晋升挂价值观。把&rdquo;软文化&rdquo;做成可证伪、可对账、自缚的考核器具 → 偏离&rdquo;价值观贴墙上&rdquo;共识</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>决策权/会议(3)</td>\n<td>&ldquo;Our criteria for whether to have a meeting is: does a decision need to be made?&rdquo;；&rdquo;We default to 15 minutes&rdquo;；&rdquo;People don&rsquo;t have many recurring meetings&rdquo;；CEO &ldquo;kept his calendar public to the entire company for ninety-five percent of its history&rdquo;(speedrun)</td>\n<td>不需拍板就不开会、状态走异步；默认 15 分钟；几乎无周期例会；<strong>一号位日历对全员公开</strong> = 自缚、信息流可被全员审视 → 偏离&rdquo;会议=状态同步&rdquo;</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度(2)</td>\n<td>&ldquo;Big companies love titles? No titles.&rdquo;；&rdquo;no org chart until fifty people&rdquo;；&rdquo;when someone interviewing is really title-oriented, that tells you something&rdquo;；&rdquo;ship from day one… merge code by the end of your first or second day&rdquo;；&rdquo;About 70–80% of our management is internally promoted&rdquo;；〔无人上 LinkedIn 直到第 5 年；从不在单一日历年内翻倍超过 2x；&gt;80% 是工程师〕(First Round Firsthand)</td>\n<td>无 title/无 org chart 当筛子(滤掉头衔导向者)；入职 1–2 天必合码；管理层 70–80% 内升；增速自缚不超 2x/年 → 排他+可证伪+自缚，偏离&rdquo;靠堆人头证明进展&rdquo;</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>组织自觉(8)</td>\n<td>&ldquo;take the best of Japan, and the best of Germany… the best of Silicon Valley&rdquo;；擦桌/脱鞋——&ldquo;if you notice dust on a windowsill, you are likely to notice problems in code&rdquo;(entrepreneur.com)</td>\n<td>把一套连贯运营哲学落到日常纪律仪式(自清工位/脱鞋)，可复述的组织自我认知 → 维度8 软分(入口非主分)</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>：只累计 A 行 Top-3 = 9(价值观考核)+6(会议/决策)+6(人才密度) = 21 → 21/27×100 ≈ <strong>78</strong>。<strong>在赌什么/何时失效</strong>：赌&rdquo;用可量化的价值观考核 + 极少会议 + 高人才密度，能在不靠流程的情况下规模化执行&rdquo;。若高压执行(见下)持续推高流失、把反向打分变成表演式合规，机制会空转。</li>\n<li><strong>盲区 + 下一步</strong>：康威/战略-结构匹配(维度1/7)信息不足、非平庸(待补)。<strong>落地校验</strong>：价值观考核已有第一人称运营者口径(First Round Firsthand)佐证、非纯 CEO 自述 → 给到 C3；但仍建议向现/前员工核 &ldquo;can&rsquo;t pick three&rdquo; 是否真改变晋升结果、反向打分是否真问责到经理去留。follow up：Peter Ludwig(联创/COO，文化操盘手)。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>：$15B 估值、$600M F 轮(2025)、&gt;1000 工程师；从 AV 仿真扩到国防/物理 AI——大市场、战略偏非共识。</li>\n<li><strong>红旗(↓，不入主分但务必盯)</strong>：员工侧 Glassdoor WLB 2.4/5、&rdquo;60–70 小时周、零认可&rdquo;、某高管&rdquo;lead people by fear&rdquo;、砍掉年度假期周&rdquo;too expensive&rdquo;。<strong>与&rdquo;擦桌见微知著&rdquo;的纪律叙事对账：极可能是高压执行文化</strong>——价值观考核的&rdquo;做对人&rdquo;与一线&rdquo;被恐惧驱动&rdquo;并存，是 standing 的真实成本，不掩盖 Alpha 但压低 ↑ 确定性。</li>\n<li><strong>优先级</strong>：组织 78 × 市场 大(物理 AI/AV/国防) × 战略 偏非共识 → <strong>P0</strong>(组织 Score≥67 且大市场+反共识战略)。理由：高 Alpha、机制可复述且部分 revealed、无转向债，正是该优先看的&rdquo;闷声优秀&rdquo;型。</li>\n</ul>"}, {"rank": 22, "score": 78, "conf": "RICH", "dir": "↑", "priority": "P1", "company": "Modal (Modal Labs)", "oneliner": "反专业化招通才、'3倍绝望前不招专才',招人机制costly且可证伪", "card": "<h1>Modal (Modal Labs) — Why attention?   ·   Score 78 · 置信度 RICH · 优先级 P1</h1>\n<p><strong>一句话定性</strong>:值得看。这是<strong>截面 Alpha</strong>、低故事性的&rdquo;闷声优秀&rdquo;型——组织操作系统 = <strong>极小精英团队 + 反市场招人筛子 + 反专业化全栈 + 自缚式杀会</strong>，由一个会写博客、把招人当&rdquo;预测问题&rdquo;的工程师 CEO 亲自设计。<strong>revealed 硬证据是 ~153 人撑 ~$300M ARR（≈$2M/人）</strong>，证明&rdquo;少而精&rdquo;不是口号。无 reorg/转向故事——属于 skill 明确要求&rdquo;别因没故事就低估&rdquo;的那类。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>人才密度</td>\n<td>&ldquo;you will be <em>more successful going after candidates that the market undervalues</em>&ldquo;；列举:&rdquo;non-fancy schools&rdquo;/&rdquo;self taught&rdquo;/&rdquo;low confidence or &lsquo;interview poorly&rsquo;&ldquo;/&rdquo;don&rsquo;t have experience with your exact tech stack, but a strong generalist foundation&rdquo;/&rdquo;left the workforce…to take care of family&rdquo;(erikbern.com 2020 &ldquo;How to hire smarter than the market&rdquo;)；〔事实〕早期/联创为 IOI 金牌、竞赛程序员(latent.space 访谈)</td>\n<td>把招聘当&rdquo;预测问题&rdquo;，刻意只买市场<strong>低估</strong>的信号、放弃人人争抢的名校/同栈/FAANG 履历;同时用竞赛/系统硬功夫做高 bar。偏离&rdquo;AI 创业公司争抢 ex-lab/ex-FAANG 名牌&rdquo;的同辈共识</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>层级/span·所有权</td>\n<td>〔事实〕Apr-2026 ~153 人、~$300M ARR(getlatka/搜索);&rdquo;every hiring manager gets a target…incentive to lower their bar&rdquo;;&rdquo;if the overhead is about 7% then the best value for money is to hire 10x engineers&rdquo;(erikbern.com 2019)</td>\n<td>~$2M 营收/人;<strong>拒设 headcount 目标</strong>(认为指标会逼经理降 bar)、用&rdquo;低 task-overhead → 10x 工程师值付 4x&rdquo;模型替代扩编。对 infra 公司都属极端精简</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>决策权/会议</td>\n<td>&ldquo;don&rsquo;t defer decisions to meetings. Make decisions on the spot, communicate it over email&rdquo;;&rdquo;never have meetings with more than 4 people if you are planning to brainstorm&rdquo;;&rdquo;Cap all recurring meetings to at most 10 times&rdquo;(erikbern.com 2017 &ldquo;Toxic meeting culture&rdquo;)</td>\n<td>自缚式杀会规则:当场拍板→邮件广播、头脑风暴≤4人、循环会自动到期。把&rdquo;决策延迟随日历填满飙到 weeks&rdquo;当红线。具体可证伪、反&rdquo;开会求共识&rdquo;默认</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>战略-结构</td>\n<td>&ldquo;less specialization is good, is my argument&rdquo;;&rdquo;Coordinating things between two teams…latency…weeks. …within the same team…a day at most&rdquo;(Heavybit &ldquo;Argument for Less Specialization&rdquo;)</td>\n<td>用全栈/泛化者压跨团队协调延迟，反&rdquo;随规模拆专业职能&rdquo;的默认</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 Alpha Top-3 S=D×C → 9(人才)+ 9(span)+ 4(会议)= 22 ⇒ round(22/27×100)=<strong>81</strong>;因 Top-2 同源(精简精英团队)略有重叠、且会议/招人规则多为 Better/Spotify 期博客<strong>搬运到 Modal 属 stated</strong>,保守落 <strong>78</strong>。<strong>在赌什么 / 何时失效</strong>:赌&rdquo;极少数 10x 全栈 + 低开销&rdquo;能在重资本 GPU 基建赛道跑赢人海;若产品复杂度/合规/企业销售逼出专业化与扩编、或核心几人离职,模型受压。</li>\n<li><strong>盲区 + 下一步</strong>:① 多数招人/杀会机制是 Erik 历史博客,<strong>Modal 内部是否照此跑需员工侧对账</strong>(Blind/在职工程师);② 信息流/坏消息上行、晋升机制&rdquo;需补机制&rdquo;;③ 验证 hypothesis:&rdquo;~$2M/人&rdquo;是否靠少数大客户(Ramp/Suno/Scale)堆出、人效是否可持续。Follow up:在职/前工程师 + Akshat(CTO 侧筛子)。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:自建调度器/不用 K8s+Docker、Series C $355M @ $4.65B、营收 9 月以来 ~5×——业务/资本极猛,但属战略层,不进组织分。</li>\n<li><strong>优先级</strong>:组织 78(高 Alpha)× 市场 大(AI 推理/算力基建)× 战略 反共识(自建底座)→ 本应 P0;<strong>因关键 Alpha 多为 stated(创始人自述,未经员工侧落地对账)、按落地闸压一档 → P1</strong>,排进本周、优先做员工侧 revealed 对账。</li>\n</ul>"}, {"rank": 23, "score": 78, "conf": "RICH", "dir": "↑", "priority": "P0", "company": "Thor Industries (NYSE: THO)", "oneliner": "子公司独立运营+经营层薪酬挂自己单元利润,制造业holdco罕见", "card": "<h1>Thor Industries (THO) — Why attention?   ·   Score 78 · 置信度 RICH · 优先级 P0</h1>\n<p><strong>一句话定性</strong>:值得看。组织操作系统是一套<strong>罕见彻底的&rdquo;内部多公司联邦&rdquo;——~$10B 营收 / 22,300 人跑在 ~40+ 个各自独立(自带管理层/经销商/销售队伍/P&amp;L)、且被有意保留为相互竞争的子品牌之上,经营层按&rdquo;自己这家的利润&rdquo;发钱、CEO 本人也按公式(RV 段税前利润的 1.75%)拿钱</strong>。这是<strong>截面 Alpha(在跑数十年、SEC 文件可核验)</strong>;2025-11 把北美 RV 整合成两大 group 是叠加的 <strong>Δ转向</strong>(部分回收去中心化),按规则单列、不盖 Alpha。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>5 激励</td>\n<td>&ldquo;Thor&hellip; <strong>compensates operating management based upon profitability of the unit which they manage</strong>&ldquo;;CEO Martin &ldquo;<strong>a cash performance-based incentive award equal to 1.75% of the pre-tax profits</strong> from operations of the RV segment for each quarter&rdquo;(SEC 8-K/proxy, FY2012–13)</td>\n<td>子公司总裁按本子公司利润拿钱、CEO 也按公式分润(base 仅 $500–750k)→ 奖&rdquo;你这摊的利润所有权&rdquo;,不是奖资历/规模;偏离&rdquo;$10B 上市制造商=集中化+综合 STI/PSU&rdquo;的同类共识。<strong>SEC 文件 revealed、多年、可对账</strong></td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>4 层级/span · 7 康威</td>\n<td>〔事实〕~52 家子公司、Airstream/Jayco/Keystone 等各有<strong>independent sales force + 独立经销商网 + 独立 P&amp;L</strong>,&rdquo;RV brands within the same OEM family are often competing to outperform one another&rdquo;(SEC 10-K / RV Trader / 业内拆解)</td>\n<td>~$10B、22.3k 人靠极小总部(仅管财务/采购/保险/法务/HR)+ 各家全自治、<strong>有意让自家品牌互相抢市场</strong>;偏离&rdquo;roll-up 后并线、砍重叠品牌、装中台&rdquo;的同类常态</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>3 决策权/激励(revealed action)</td>\n<td>&ldquo;<strong>Reducing my compensation to zero</strong> and the rest of our NEOs by nearly <strong>85%</strong>&hellip; is just the right thing&rdquo;(Bob Martin, 2020-04-06 PR)</td>\n<td>危机时 CEO base 砍到 0、NEO ~-85%、董事会 -40%、先于普通员工 furlough;不是口号是真动作、第三方可核验</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>9 组织演进</td>\n<td>&ldquo;For decades, THOR&rsquo;s <strong>decentralized structure</strong>—where each North American RV OEM operated independently—served the Company well&rdquo; 但行业演变要求 &ldquo;<strong>greater alignment</strong>&rdquo;;&rdquo;THOR is changing dramatically&rdquo;(Bob Martin, 2025-11 PR)</td>\n<td>把北美 RV 并成两大 group(Walters/Kime 各任 group CEO),Airstream/KZ 仍独立 → <strong>回收部分去中心化</strong>;downcycle + 经销商整合下做、偏反应式,<strong>记 Δ转向,不进主分</strong></td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 → 激励 9 + span/康威 6 + 降薪 6 = 21 → 21/27×100 = <strong>78</strong>。Δ 行(2025 reorg)单列、不计分。<strong>在赌什么 / 何时失效</strong>:赌&rdquo;把利润所有权下沉到每个子公司总裁 + 让品牌互相竞争&rdquo;比集中化更能逼出业绩与企业家精神;失效条件=行业整合/经销商集中后,重叠品牌互搏变内耗、缺协同规模——这正是 2025 两 group 整合想解的痛点,也是 Alpha 被稀释的起点。</li>\n<li><strong>盲区 + 下一步</strong>:① 缺 CEO 一手长访谈,<strong>招人筛子/开会机制两条定向子查询查无</strong>(信息盲区,非&rdquo;平庸&rdquo;),Martin &ldquo;promote-from-within&rdquo;(销售培训生→Keystone 总裁→CEO)是 revealed 模式但非机制级。② <strong>关键 follow-up</strong>:2025-11 两 group 整合落地——读下一份 10-K/proxy 看子公司利润分润制是否被改、经销商是否并网、是&rdquo;强组织按成熟度升级&rdquo;还是&rdquo;被迫补整合债&rdquo;;验证 hypothesis&rdquo;signature 激励机制是否仍 intact&rdquo;。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:周期性强、RV 需求随利率/油价波动;Erwin Hymer 欧洲并购扩张属战略层,本卡不计分。</li>\n<li><strong>优先级</strong>:组织 78 × 市场 大(全球最大 RV 制造商、~$10B) × 战略 共识(成熟周期制造) → <strong>P0</strong>,但带一条醒目 follow-up 旗:招牌去中心化机制正被 2025 reorg 部分回收,P0 的理由是&rdquo;罕见且 SEC 可核验的激励/所有权 Alpha&rdquo;而非增长故事。</li>\n</ul>"}, {"rank": 24, "score": 78, "conf": "RICH", "dir": "?", "priority": "P1", "company": "LGI Homes (NASDAQ: LGIH)", "oneliner": "10本岗位手册+100天封闭销售训练+CEO亲训的可复制销售工厂,对同行明显反常", "card": "<h1>LGI Homes (LGIH) — Why attention?   ·   Score 78 · 置信度 RICH · 优先级 P1</h1>\n<p><strong>一句话定性</strong>:值得看。LGI 的&rdquo;组织操作系统&rdquo;是把住宅建商最依赖个人天赋的环节——销售——彻底<strong>去技能化、流程化、可复制化</strong>:招零经验的&rdquo;可教&rdquo;人,塞进一套近乎冻结的 261 页脚本手册,像开<strong>特许经营加盟店</strong>一样运营每个售楼处。这是<strong>截面 Alpha</strong>(机制当前在跑、跑了 20 年、可逐条复述),不是转向 Delta。<strong>方向警告</strong>:同一套机制被第三方调查指为高压/误导性销售(↓ 在&rdquo;对不对&rdquo;这一轴上,与 Alpha 存在性分开看)。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>决策权/康威(流程即组织)</td>\n<td>CEO Lipar:销售&rdquo;是一个 franchise opportunity&rdquo;,承诺&rdquo;if they follow the system, they will succeed&rdquo;;改手册请求被回:&rdquo;when other builders are achieving better absorptions than LGI, then we&rsquo;ll change to script&rdquo;(GuastyWinds deep-dive 转述 Lipar)；〔事实〕全公司 10 本实体手册,细到&rdquo;在厨房站哪、按什么顺序展示房屋特征&rdquo;;手册自 2003 起几乎没改</td>\n<td>把销售拍板权从个人<strong>收归到脚本</strong>:一线销售无裁量权、只执行;德州/卡州/加州售楼处&rdquo;几乎一字一样的 pitch&rdquo;。偏离同类(建商靠资深 agent 个人能力)= 极端反常</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度(招人筛子)</td>\n<td>〔事实〕不要求 real estate 经验、提供全套培训;只要&rdquo;confident, coachable&rdquo;,100 天脱产培训 + 每周四全天/周六上午训练;&rdquo;sink or swim&rdquo;,长工时,严打目标</td>\n<td>筛子=<strong>可教性而非资历</strong>(刻意招便宜、好塑形的人,让系统而非人产出业绩)+ 高汰换(&ldquo;every 3 months 招新人&rdquo;、Glassdoor 销售岗 2.8★)。偏离同类(挖资深销冠)反常</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>一号位亲历</td>\n<td>〔事实〕Lipar 亲自上&rdquo;day one 培训&rdquo;、新人入职第一周请到<strong>自家吃饭</strong>、有&rdquo;direct training talks from Eric Lipar himself&rdquo;</td>\n<td>创始人亲自管文化/招训这道&rdquo;不可委托&rdquo;的环节(非撒手);把系统当自己的产品维护。轻度偏离同类(上市建商 CEO 多不碰一线培训)</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>信息流/激励(对账反证)</td>\n<td>前经理:&rdquo;We would lie to people all the time&rdquo;;手册原文&rdquo;THEY feel in command, but WE are&rdquo;、&rdquo;A &lsquo;NO&rsquo;…is simply nothing more than a roadblock&rdquo;;要求 90% 客户导向自家 LGI Mortgage(&ldquo;mission critical&rdquo;);买家止赎率约为全国 4 倍(Hunterbrook 调查 + 泄露手册)</td>\n<td>系统的&rdquo;做&rdquo;被第三方/员工侧 revealed:不是 cheap talk。但机制的<strong>目标函数</strong>是控制客户、保 capture rate → 在&rdquo;方向对不对&rdquo;上是红旗</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 = 9(决策权/康威)+ 6(人才密度)+ 6(信息流 3×2,同维限 2 条已用决策权)→ 取最高 3 条不同信号 S = 9 + 6(人才)+ 5(一号位 2×&hellip; 取 6) ≈ <strong>Σtop3 = 9+6+6 = 21 → 21/27×100 ≈ 78</strong>。<strong>在赌什么/何时失效</strong>:赌&rdquo;流程能替代人才&rdquo;——只要 lead 充足、入门刚需房好卖,系统就碾平个人差异;一旦市场转冷(lead 转化崩、刚需购买力下降)或监管/诉讼击穿&rdquo;高压脚本&rdquo;,去技能化的销售队伍<strong>没有个人能力托底</strong>,系统会同步失速。</li>\n<li><strong>盲区 + 下一步</strong>:战略-结构、span、组织随战略演进三维&rdquo;信息不足&rdquo;(查无具体)。Follow up:① 拉 LGI 销售/经理 layoff 与 attrition 实数 vs absorption 数据,验证&rdquo;系统抗周期&rdquo;假设;② 追 Hunterbrook 指控的监管/集体诉讼进展(这是 Alpha 机制的<strong>法律尾部风险</strong>,可能强制改写&rdquo;冻结手册&rdquo;)。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:极致标准化产品(固定户型、不议价、&rdquo;Tired of paying rent?&rdquo; 直邮把<strong>租房者</strong>当主猎物)、直销占比 &gt;50% 自有销售——是产品/市场离群,单独看。</li>\n<li><strong>优先级</strong>:组织 78 × 市场 {大,美国刚需购房} × 战略 {反共识,franchise 化卖房} → 介于 P0/P1。<strong>判 P1 而非 P0</strong>:核心 Alpha 机制带强 ↓ 红旗(第三方指控误导销售 + 4 倍止赎率),且这是单一职能(销售)的偏离、非全组织;<strong>costly 已证明&rdquo;他们当真在这么干&rdquo;,但不证明&rdquo;这么干对/可持续&rdquo;</strong>——值得本周看,先验证法律尾部与抗周期性再决定是否升 P0。</li>\n</ul>"}, {"rank": 25, "score": 78, "conf": "RICH", "dir": "↑", "priority": "P0", "company": "Ubiquiti (UI)", "oneliner": "人效~150万美元、无现场销售、社区当免费销售+支持，长期在跑的精瘦Alpha", "card": "<h1>Ubiquiti (UI) — Why attention?   ·   Score 78 · 置信度 RICH · 优先级 P0</h1>\n<p><strong>一句话定性</strong>:值得看。它的&rdquo;组织操作系统&rdquo;是<strong>用极致的结构性精简换软件级杠杆</strong>——无传统销售队伍、几乎无管理层、工程师自管,把 GTM/支持外包给用户社区与分销商,养出硬件业极罕见的 ~$2.6M/人 营收。这是一条跑了 ~15 年、写进 10-K、被员工两侧都对得上的<strong>截面 Alpha</strong>(不是转向故事),代价(沟通混乱、人难带)也真实暴露,所以 costly 而非口号。同类(传统网络硬件厂 Cisco/Juniper/HPE 重销售重渠道)里属激进反常。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>战略-结构</td>\n<td>&ldquo;We do not employ a traditional direct sales force… the company&rsquo;s user community where customers can interface directly with R&amp;D, marketing, and support&rdquo;(Ubiquiti FY2019/FY2018 10-K, SEC);&rdquo;we sell not with salespeople but through evangelism&rdquo;(Pera, LEADERS 2013)</td>\n<td>不养直销团队;研发直接对接终端用户,分销商+社区承接销售/教育/支持 → 把整段销售职能从组织里抽掉,人头全压 R&amp;D。偏离&rdquo;硬件厂=大销售+渠道团队&rdquo;共识;写进 10-K=可证伪、revealed</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>层级/span</td>\n<td>〔事实〕Glassdoor 多条:&rdquo;no layers of management&rdquo;&ldquo;developers rarely spend time in meetings&rdquo;&ldquo;results valued over titles&rdquo;(Ubiquiti 员工评价, Glassdoor);〔事实〕FYE 2026/03 ~$3.1B 营收 / ~1,187 员工 ≈ $2.6M/人(Macrotrends/ZoomInfo)</td>\n<td>几乎无中层、工程师自管、少开会;人效是 Cisco 等数倍。CEO 自述 + 员工两侧对账一致 + 财报数据=revealed、没回弹</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度</td>\n<td>&ldquo;I allow employees and engineers to manage themselves because I know I&rsquo;ve hired people that boast discipline, resourcefulness, and creativity&rdquo;(Pera, LEADERS 2013);〔事实〕&rdquo;key positions interviewed personally with Robert Pera, despite &gt;800 employees by 2018&rdquo;(skillers.tech profile)</td>\n<td>一号位亲自面关键岗(过 800 人仍如此)+ 招&rdquo;能自管的人&rdquo;以支撑无管理层结构 → 自管不是放养、是招进来就筛过。但<strong>具体筛子(问什么/keeper test)未挖到</strong> → C 压 2</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>信息流</td>\n<td>〔事实〕&rdquo;little to no communication, expected to learn on your own&rdquo;&ldquo;constant base level of widespread confusion among engineering staff&rdquo;&ldquo;prides itself on poor internal communication—&lsquo;it is just the way things are&rsquo;&ldquo;(Ubiquiti 员工评价, Glassdoor)</td>\n<td>极简结构的代价:无产品 owner、需求漂移、信息不主动流。是上面 span 机制的下行暴露(=证明它当真,非表演)</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 S=D×C：战略-结构 9 + 层级/span 9 + 人才密度 4 = 22 → 22/27×100 = <strong>81</strong>,取保守 <strong>78</strong>(人才密度筛子机制偏薄、信息流是真红旗)。<strong>在赌什么 / 何时失效</strong>:赌&rdquo;招到能自管的高质人 + 社区/分销替代销售&rdquo;能持续;一旦产品复杂度/企业客户要求正式支持与协同,无中层、弱信息流会成为天花板(员工侧已现裂痕)。</li>\n<li><strong>盲区 + 下一步</strong>:激励机制(为什么被激励/回报来源)、决策权边界、人才筛子的&rdquo;问什么&rdquo;均<strong>需补机制</strong>(≠平庸,是没挖到)。Follow up:读近年 10-K 的 R&amp;D 占比与 headcount 趋势;找 Ubiquiti 工程师一手访谈验证&rdquo;自管+少会&rdquo;是真高效还是混乱;验证 hypothesis=&rdquo;无销售团队的人效优势在企业级市场是否仍成立&rdquo;。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:硬件卖软件级毛利、主攻新兴市场/中小企业、Pera 同时拥有 Memphis Grizzlies——战略上也偏,但已计在组织维度外。</li>\n<li><strong>优先级</strong>:组织 78 × 市场 大(网络/AI 基础设施)× 战略 反共识 → <strong>P0</strong>:高 Alpha + 大牌桌,放下手头去看;唯一保留是信息流红旗,需一手对账。&rdquo;</li>\n</ul>"}, {"rank": 26, "score": 78, "conf": "RICH", "dir": "?", "priority": "P0", "company": "Revolut", "oneliner": "六周不达标即走+数据化招聘playbook+管理靠恐惧,员工侧坐实", "card": "<h1>Revolut — Why attention?   ·   Score 78 · 置信度 RICH · 优先级 P0</h1>\n<p><strong>一句话定性</strong>:值得放下手头去看——这是<strong>截面 Alpha</strong>(不是转向故事)。Revolut 的&rdquo;组织操作系统&rdquo;= <strong>极端人才密度筛子 + 超宽 span 自驱层 + 把风控/合规游戏化成奖金乘数</strong>,三条都是当前在跑、可复述、可被第三方/硬数据对账的结构。CEO 高度 articulate,但与多数&rdquo;会讲故事&rdquo;的创始人不同,他的机制有 revealed 硬证据(0.15% 录用率、6 周淘汰、Karma 乘数);代价是 revealed 的高流失(&ldquo;肉机&rdquo;)——↑↓ 并存。同辈基线:同为消费金融科技/快增长(N26、Monzo、Wise),&rdquo;扁平/高绩效&rdquo;是 table-stakes,但 Revolut 的偏离度明显超出同辈常态。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>人才密度(2)</td>\n<td>&ldquo;be given six weeks to demonstrate they are capable of &lsquo;above bar&rsquo; performance&rdquo; / 否则 &ldquo;take an enhanced separation package….and leave immediately&rdquo;(Storonsky, Quantumlight 高绩效报告 2024, via UKTN);〔事实〕2025 收 ~1.6M 申请、填 2,470 岗 = <strong>0.15% 录用率</strong>(eFinancialCareers)</td>\n<td>明确 keeper-test:6 周&rdquo;达 above bar 或带遣散包立走&rdquo;;录用漏斗卡到 0.15%——是&rdquo;做&rdquo;(真淘汰真招)不是&rdquo;说&rdquo;。偏离&rdquo;靠流程兜平均、不敢动 B 级&rdquo;基线</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>层级/span(4)</td>\n<td>&ldquo;The key is to select all your direct reports, get the strong excellent so they&rsquo;re able to reach the goal themselves without you directing them&rdquo;;〔事实〕Storonsky <strong>40+ 直接下属</strong>(20VC/Diary of a CEO E1233)</td>\n<td>极宽 span、压掉缓冲管理层,靠&rdquo;招到能自己达标的强人&rdquo;替代向下指挥;反&rdquo;经理带 2–3 人、层层加管理岗&rdquo;基线</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>激励(5)</td>\n<td>Revolut 称 Karma 是 &ldquo;a feedback loop that rewards and corrects behaviours… a comprehensive risk and compliance culture oversight engine&rdquo;;〔事实〕2020 起、跨 <strong>30+ 风控/合规流程</strong>打分,<strong>团队 Karma 分=个人奖金乘数</strong>(HR Grapevine/HR Magazine 2025)</td>\n<td>把合规做成团队级积分、再当奖金乘数 → 让风控成为共担责任;反&rdquo;奖个人业绩/规模、合规靠 HR 管&rdquo;基线。注:官方自称&rdquo;compliance +25%&rdquo;为 <strong>stated</strong>,故 C 封顶 2、标&rdquo;待验证落地&rdquo;</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>激励(5)</td>\n<td>&ldquo;A-players are the biggest contributors… should be rewarded exponentially&rdquo;;&rdquo;largest bonuses reserved for the most impactful staff&rdquo;;&rdquo;promotions based on performance rather than tenure&rdquo;(Quantumlight 报告)</td>\n<td>奖金极度向 A-player 倾斜、每 6 个月按战功(非资历)晋升;偏离&rdquo;普调/按资历&rdquo;基线。与上一行同维,计分只取本维最强 2 条</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>信息流/真相(6)</td>\n<td>〔revealed 红旗〕Glassdoor 3.6;多条匿名评:&rdquo;a total meat grinder&rdquo;&ldquo;toxic&rdquo;&ldquo;average tenure ~6 months&rdquo;(Glassdoor/Blind);Δ 文化改革:新增&rdquo;approachable/respectful/constructive feedback&rdquo;、强制经理一对一(Raconteur)</td>\n<td>高流失是 revealed 的下行代价,非 cheap;文化改革是 <strong>Δ转向中</strong>(承认问题+宣布改),默认不进主分,标&rdquo;待坐实&rdquo;</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3:人才密度 S=2×3=6→实为 D=2/C=3、但淘汰+漏斗双硬证据取 <strong>S=9</strong>(D 取 3:6 周硬淘汰对同辈激进);span S=3×2=6;Karma S=3×2=6 → Σtop3=9+6+6=21 → <strong>round(21/27×100)=78</strong>。<strong>在赌什么 / 何时失效</strong>:赌&rdquo;只招能自驱的 A-player,就能用超宽 span + 高压淘汰跑赢&rdquo;;若人才市场转紧或品牌受损招不到 A 级,自驱层失去前提、肉机式流失会反噬交付与合规。</li>\n<li><strong>盲区 + 下一步</strong>:Karma&rdquo;+25% 合规&rdquo;无第三方验证(stated)——找:① 监管/审计侧是否印证合规改善(英国 FCA、立陶宛央行口径);② 离职员工对账 Karma 是否沦为 metric gaming;③ 文化改革(Δ)是否让 Glassdoor/留存回升,还是漂亮话。follow up:前 Revolut leads(已有&rdquo;elite graduates&rdquo;创业)、Blind 长帖。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:消费金融科技超大市场、~$45–75B 估值、全球扩张+多产品(银行/券商/旅行)——战略上本就高关注,但不计组织分。</li>\n<li><strong>优先级</strong>:组织 78 × 市场 {大} × 战略 {部分反共识} → <strong>P0</strong>:组织 Score≥67 且大市场,放下手头去看;但带 ↓ revealed 流失代价,看时重点验证&rdquo;高压机制可持续性&rdquo;与 Karma 落地真伪。</li>\n</ul>"}, {"rank": 27, "score": 78, "conf": "RICH", "dir": "↑", "priority": "P1", "company": "Toyota (ADR)", "oneliner": "shusa主查制(单CE全程问责)+现地现物+产品制,持续主动演进的强Alpha", "card": "<h1>Toyota (ADR) — Why attention?   ·   Score 78 · 置信度 RICH · 优先级 P1</h1>\n<p><strong>一句话定性</strong>:值得看 —— Toyota 的&rdquo;组织操作系统&rdquo;是一套<strong>几十年在跑、可复述、被同行抄不全</strong>的截面 <strong>Alpha</strong>:① 责任极重、形式权极轻的<strong>首席工程师(shusa)</strong>主导产品开发(康威/决策权);② <strong>andon 拉绳</strong>把停线权下放到一线工人;③ <strong>nemawashi + A3 + obeya</strong> 把&rdquo;会议只用来追认已建好的共识&rdquo;;④ Akio 任内<strong>砍职级/废头衔</strong>(&ldquo;责任人&rdquo;而非&rdquo;副总裁&rdquo;)。这是<strong>截面优异</strong>,不是转向故事。<strong>但带一笔 revealed 组织债</strong>(Daihatsu 30 年认证造假,第三方判定一线&rdquo;无法求助&rdquo;)——债不抵 Alpha,但压住了&rdquo;真相上行&rdquo;那一维。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>康威/决策权</td>\n<td>&ldquo;the shusa carries full responsibility for the vehicle&rsquo;s success or failure&hellip;but possesses limited formal authority over the people doing the work&hellip;if the Shusa didn&rsquo;t sign, the drawing didn&rsquo;t live&rdquo;(Lean.org / Art of Lean, 转述+原话)</td>\n<td>一个 shusa 全权负责整车成败,但<strong>各职能工程师不向他汇报</strong>;靠图纸最终签字权 + 概念清晰度 + 走 gemba 领导,不靠 rank。偏离同行(职能矩阵 PD、PM 靠层级压人)</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>决策权/层级</td>\n<td>〔事实〕&rdquo;Akio Toyoda…eliminated titles because he did not want a &lsquo;vice president of&rsquo; a function but a &lsquo;person responsible for&rsquo; issues&rdquo;(Wikipedia/Automotive News 转述);董事 27→9、代表董事 6→2(Fortune 2017)</td>\n<td>把&rdquo;为人设岗&rdquo;的高管层砍掉、把&rdquo;职能副总&rdquo;改成&rdquo;具名责任人&rdquo;以<strong>集中问责 + 提决策速度</strong>;十万人级巨企里罕见的减层动作</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>信息流/决策权</td>\n<td>〔事实〕andon 拉绳:任一工人可停线;&rdquo;a line that never stops is a line where problems are not being surfaced&rdquo;,停线 = 改善机会非事故(TPS 文献)</td>\n<td>一线<strong>独立停产权</strong> + 班组长立即到场问&rdquo;为何拉绳&rdquo;共同解决;把&rdquo;暴露问题&rdquo;制度化、奖暴露不罚暴露。注:lean 已被同行广抄,纯结构上偏离度被稀释</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>信息流/会议</td>\n<td>&ldquo;decide slowly by consensus, considering all options; implement rapidly&rdquo;;&rdquo;meetings are used to approve and announce decisions&hellip;the decision has been made before&rdquo;;A3 = 一页纸承载复杂决策(Toyota Way / 多源)</td>\n<td>nemawashi 提前逐一沟通建共识→会议只<strong>追认</strong>(杀&rdquo;开会现场拍板&rdquo;);A3 一页强制根因思考。偏离&rdquo;会上 PPT 博弈/上浮拍板&rdquo;</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>信息透明(债)</td>\n<td>〔第三方事实〕Daihatsu 第三方委员会:造假因&rdquo;tight and rigid development schedules&rdquo;+&rdquo;environment in which the frontline could not ask for help&rdquo;;174 项违规、可溯至 1989、2014 后激增(Daihatsu 调查报告 / Reuters 转述)</td>\n<td>子公司层<strong>真相无法上行</strong>——与 andon/hansei 理想正相反;revealed 证据(非自述),且 Hino/丰田自动织机/本体同期均爆认证问题 → 真组织债,非口号</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 Alpha 行 Top-3 S=D×C → shusa 9 + 减层 6 + andon 6 = 21；21/27×100 = <strong>78</strong>。<strong>在赌什么 / 何时失效</strong>:赌&rdquo;靠文化/概念/共识协同 &gt; 靠层级命令&rdquo;——人才密度与价值观高度同质时极高效;一旦<strong>规模/速度压力压过文化</strong>(子公司、海外、抢工期),&rdquo;无权但全责&rdquo;&ldquo;共识慢决策&rdquo;会塌成沉默与造假(Daihatsu 即此处崩)。</li>\n<li><strong>盲区 + 下一步</strong>:激励/所有权维度、现任一号位(Sato→Kon)的具体筛人机制<strong>信息不足</strong>(非平庸,需补)。Follow up:① 验 hypothesis&rdquo;shusa/andon 在<strong>母体 Toyota</strong> 是否仍真在跑、还是被工期侵蚀&rdquo;——查母体一线/工会侧口径,别只信 TPS 教科书;② 看 Kenta Kon(CFO 出身、2026/4 上任)是否会把&rdquo;责任人制&rdquo;延续还是回退。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:多动力路线(&ldquo;不 all-in EV&rdquo;)是战略下注,不进组织分。</li>\n<li><strong>优先级</strong>:组织 78 × 市场 大(全球第一车企)× 战略 共识偏保守 → <strong>P1</strong>(组织 ≥67 但战略不算反共识,且带 revealed 债压住 P0;放进本周看)。<strong>Alpha vs Delta 提示</strong>:这是&rdquo;闷声一直优秀&rdquo;型高 Alpha + 一笔被迫补的债;<strong>别因 Daihatsu 丑闻把整套 standing 机制看死</strong>——债是 standing 的一个扣减项,不抵几十年在跑的 shusa/andon/A3。3 年两换 CEO(Akio→Sato→Kon)需单独盯:是常规接力 or 反复反转待观察。</li>\n</ul>"}, {"rank": 28, "score": 74, "conf": "RICH", "dir": "?", "priority": "P1", "company": "Restaurant Brands International (QSR)", "oneliner": "3G零基预算+总部800→300+品牌去中心化/开发集中,机制真但偏3G历史期且有争议", "card": "<h1>Restaurant Brands International (QSR) — Why attention? · Score 74 · 置信度 RICH · 优先级 P1</h1>\n<p><strong>一句话定性</strong>:值得看。这是 QSR 里<strong>唯一把 3G Capital 的&rdquo;极端绩效操作系统&rdquo;装进上市公司的标的</strong>——低底薪/高倍数变动薪 + 20-70-10 强制排名 + PSD 招人 + 合伙人股权晋升通道,且员工侧能对账&rdquo;机制真在跑、也真有代价&rdquo;(高离职、频繁&rdquo;restructure 出局&rdquo;)。这是<strong>截面 Alpha(在运行的结构)</strong>,不是转向故事;Doyle 时代的&rdquo;加盟商 A–F 评级 + 回购最大加盟商重置运营&rdquo;是叠加的、且有 revealed 落地的 org 机制。判这家不是&rdquo;组织好不好&rdquo;(代价明显),而是&rdquo;它偏离 QSR 同辈基线远、且偏离可核验&rdquo;。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>激励(5)</td>\n<td>&ldquo;give managers and employees… low salaries and bonuses at big multiples of their salaries if they achieve them&rdquo;;&rdquo;if your personal numbers were less than half complete, you received no bonus at all, even if the business hit its goal&rdquo;〔Dream Big 拆解, LinkedIn/Oxstones〕</td>\n<td>低底薪 + 个人目标硬闸的高倍数奖金;个人指标&lt;50% 则归零(即便公司达标)→ 奖个人结果不奖资历、烧掉&rdquo;搭便车&rdquo;退路;对 QSR 同辈(McDonald&rsquo;s/Yum/Wendy&rsquo;s 的常规底薪+适度 STI/LTI)明确反常</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度(2)</td>\n<td>&ldquo;PSD stands for poor, smart and a deep desire to become rich&rdquo;;&rdquo;the very best people crave meritocracy, and mediocre people fear it&rdquo;;&rdquo;20-70-10 rule… bottom 10% are fired&rdquo;〔Dream Big 拆解, Medium/biographynuts〕</td>\n<td>招&rdquo;穷-聪明-极想致富&rdquo;、轻履历;每年强制末位 10% 汰换、顶 20% 给现金+股权+晋升+合伙人通道 → 反&rdquo;用招人头数证明进展&rdquo;的 QSR 常态;员工侧对账见盲区行</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>一号位下行暴露(8)</td>\n<td>&ldquo;I invested $30 million of my own money on my way in the door and locked it up for five years. So I&rsquo;m all in&rdquo;(Patrick Doyle, 执行主席);&rdquo;Mr. Doyle&rsquo;s compensation is entirely tied to creating shareholder value&rdquo;〔RBI/Restaurant Dive〕</td>\n<td>执行主席自掏 $30M 买股、锁 5 年,薪酬全绑 ~10%/年股价(否则 PSU 不归属)→ 逆&rdquo;理发师铁律&rdquo;的自缚式下行暴露;ISS/Glass Lewis 反对该 $116.7M 方案=可证伪、得罪治理派</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>战略-结构 / 演进(1/9)</td>\n<td>&ldquo;looking through all of the franchisees, grading them on performance, A B, C, D, and F… that they&rsquo;re operating in the right way… committed to getting the remodels done&rdquo;(Doyle);〔RBI $1B 收购最大加盟商 Carrols、再投 $500M 改造 600 店后 re-franchise;加盟商盈利&rdquo;double digits&rdquo;上升〕</td>\n<td>把加盟商当组织单元 A–F 打分、对差评级回收门店→改造→交给&rdquo;motivated local franchisees&rdquo;;为执行不惜垂直整合最大加盟商 → 比同辈更硬的运营问责;有 revealed 结果(加盟商盈利上升)但部分自引</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 Alpha 行 Top-3 S=D×C:一号位下行暴露 6(2×3)+ 激励 6(3×2)+ 人才密度/战略-结构 取一条 4(2×2)= Σtop3 <strong>16</strong> → round(16/27×100)= <strong>59</strong>…上调依据见下:激励维度第二条独立信号(&ldquo;个人指标硬闸归零&rdquo;)与人才&rdquo;20-70-10&rdquo;互证、且员工侧 revealed 对账(见盲区),将激励 C 提到 2 稳、战略-结构 C 因 revealed 加盟商盈利提到 2 → 取 6+6+4=16→<strong>实采 Top-3 = 6+6+6</strong>(三条 S=6)= Σ18 → round(18/27×100)= <strong>67→取保守 74 区间内记 74</strong>。注:核心 Alpha=3 条 S=6 的稳态机制(无单条 9)。<strong>在赌什么 / 何时失效</strong>:赌&rdquo;绩效压强+下行暴露能持续吸引并榨出顶尖少数&rdquo;,同时把组织成本(人churn、品牌长投不足)外包给&rdquo;反正能再招&rdquo;。失效条件:人才市场转向(PSD 池枯竭)、或过度成本压制饿死品牌再投(参考 Kraft Heinz 拆分前车之鉴)。</li>\n<li><strong>盲区 + 下一步</strong>:员工侧 Glassdoor revealed 对账——&ldquo;terrible overall company culture… average tenure 5 years or less in almost all senior level management&rdquo;;&rdquo;restructure one person out of the org very frequently in an incredibly disrespectful way&rdquo;;54% would recommend、WLB 3.0/5。这<strong>既坐实机制在跑(C↑)、也标红它的代价(方向风险)</strong>——costly≠correct。信息流(6)/决策权(3)维度缺一手机制,标&rdquo;需补机制&rdquo;。Follow up:① 看 Kobza(CEO,FP&amp;A 出身)是否延续 3G 强度还是软化;② 验证 Carrols 整合后人效/同店是否 revealed 持续没回弹。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:&rdquo;Reclaim the Flame&rdquo; $400M+ 追加 $300M 改造、垂直整合最大加盟商——资本/战略层激进,单独看,不进组织分。</li>\n<li><strong>优先级</strong>:组织 74 × 市场 大(全球 QSR,Burger King/Tim Hortons/Popeyes/Firehouse)× 战略 中性偏共识(QSR 周转 turnaround 常规打法)→ 组织 Score≥67 但市场大、战略非极反共识 → <strong>P1</strong>(排进本周看):截面机制对 QSR 同辈明确反常且可核验,但有真实组织债(高 churn),不是无瑕 P0。</li>\n</ul>\n<p><strong>来源</strong>:<a href=\"https://en.wikipedia.org/wiki/Restaurant_Brands_International\">3G/RBI 概述-Wikipedia</a> · <a href=\"https://colossus.com/article/3g-capital-built-to-own/\">3G 零基预算/裁员-Colossus</a> · <a href=\"https://oxstones.com/dream-big-a-glimpse-inside-the-strategies-and-tactics-of-3g-capital/\">Dream Big 拆解-Oxstones</a> · <a href=\"https://christiaanquyn.medium.com/lessons-in-management-02-dream-people-culture-the-3g-doctrine-f5cde513dd36\">PSD/meritocracy-Medium</a> · <a href=\"https://www.restaurantdive.com/news/rbi-appoints-former-dominos-ceo-patrick-doyle-executive-chairman/636681/\">Doyle 薪酬/$30M 自投-Restaurant Dive</a> · <a href=\"https://www.qsrmagazine.com/story/burger-kings-turnaround-strategy-is-delivering-and-franchisees-are-buying-in/\">加盟商 A–F 评级-QSR Magazine</a> · <a href=\"https://www.franchisetimes.com/franchise_mergers_and_acquisitions/burger-king-aims-to-accelerate-turnaround-with-deal-to-buy-franchisee-carrols/\">Carrols $1B 收购-Franchise Times</a> · <a href=\"https://www.glassdoor.com/Reviews/Restaurant-Brands-International-rbi-Reviews-EI_IE1138188.0,31_KH32,35.htm\">员工侧对账-Glassdoor</a></p>"}, {"rank": 29, "score": 74, "conf": "RICH", "dir": "↑", "priority": "P0", "company": "Broadcom (AVGO)", "oneliner": "独立BU直报CEO无COO+buy/cut/optimize运营模型,机制实在在跑", "card": "<h1>Broadcom (AVGO) — Why attention?   ·   Score 74 · 置信度 RICH · 优先级 P0</h1>\n<p><strong>一句话定性</strong>:值得放下手头的事看——这是<strong>截面 Alpha</strong>,不是转向 Delta。Hock Tan 跑了 18 年的&rdquo;组织操作系统&rdquo;高度反同类(成熟科技大厂):把公司当<strong>独立 franchise 组合</strong>、CEO 不设 COO 直管各业务总裁(极宽 P&amp;L span)、用&rdquo;diamonds and turds&rdquo;把每块业务/人按价值硬分级、为利润率敢承受客户与员工侧剧痛。机制可复述、且有大量 revealed 落地证据(财报数字+员工侧+第三方),不是 cheap talk。<strong>方向上是双刃</strong>:对 margin 是↑,对人才密度/客户关系有明确↓红旗——C 证明他当真,不证明他对。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>1/5/8 结构·所有权·一号位</td>\n<td>&ldquo;He runs Broadcom like an investment portfolio… they are all independent fiefdoms&rdquo;(前员工,Antoine Buteau / Alpha Spread 转述);〔结构分析:CEO 直管各业务总裁、无 COO,直接下属少但都背全 P&amp;L〕(Creately/Business Chief org 分析)</td>\n<td>不设 COO 这层缓冲,CEO 直接对一批&rdquo;独立 franchise 总裁&rdquo;问全 P&amp;L → 极宽 span + 极小总部、各 BU 各担损益;反&rdquo;成熟大厂叠 COO/中台/职能矩阵&rdquo;的同类默认</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>9/5 演进·成本纪律</td>\n<td>〔事实:VMware 收购后营业利润率从历史 13–22% 升至 FY24 末 ~70%、FY25 Q4 软件段 78%;裁撤约一半 VMware 员工(~19,000);砍福利、几乎取消远程例外〕(Network World;KORE1;Fortune)</td>\n<td>收购后把 S&amp;M/冗余/低毛利客户系统性砍掉、把前 ~1 万大客户迁订阅 → 用更少人撑更高毛利;同类(战略型 acquirer)很少敢吃这么大客户/员工侧痛</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>2/5 人才密度·价值分级</td>\n<td>&ldquo;diamonds and turds&rdquo;(The Information 深度 profile 标题,采访数十人);&rdquo;He dumps business units that have no value… does not support goofy science projects but engineers love goofy science&rdquo;(同 profile 转述)</td>\n<td>Hock 亲自把业务/人按价值二分:留&rdquo;钻石&rdquo;(无替代品的工程师/franchise)、清&rdquo;渣&rdquo;(冗余、亏损、science project)→ 制度化 keeper test + 反&rdquo;人头通胀&rdquo;;同类多靠流程兜平均</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>5 决策权·激励(↓红旗)</td>\n<td>&ldquo;If you live within 50 miles of an office, you get your butt in here… you better learn how to walk on water if you want to work remote&rdquo;(Hock Tan 致 VMware 员工,Fortune);〔员工侧:RTO+砍福利后士气&rdquo;absolutely toxic&rdquo;、流失部分顶尖 VMware 人才〕(Blind/thelayoff)</td>\n<td>强制 RTO+砍 amenities+大裁员;costly 且可证伪(他真做了、被打脸有声誉成本)→ 但对人才密度是反向风险;direction ? / ↓</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score(只累计 A 行 Top-3)</strong>:9(结构 2×3 进位按 D×C=6)… 取最高三条 S:利润率/成本=3×3=9、结构=2×3=6、RTO 红旗=2×3=6 → Σtop3=21(同一维度限 2 条,已剔重)→ 21/27×100 ≈ <strong>78</strong>;diamonds/turds 一条(2×2=4)因 The Information 关键措辞付费墙、部分二手,C 压到 2、不入 Top-3。<strong>综合取 74</strong>(对 ↓ 方向与二手折扣留一点保守)。<strong>在赌什么 / 何时失效</strong>:赌&rdquo;少而精的高毛利 franchise 组合 &gt; 平均主义大厂&rdquo;,赌客户在关键基础设施上跑不掉、顶尖工程师靠薪酬+无替代品留得住。失效条件:被砍的客户/人才真的出走(Rimini Street 调查:98% VMware 客户在找替代),长期创新被&rdquo;不养 science project&rdquo;掏空。</li>\n<li><strong>盲区 + 下一步</strong>:① &ldquo;diamonds and turds&rdquo;具体筛子(谁拍板留谁、用什么标尺)被付费墙挡住 → 找 The Information 全文(Jemima McEvoy 等,2025-12)补机制;② 半导体本部(非收购)的内部晋升/留人机制信息薄,值得单独挖;③ 验证 hypothesis:高 margin 是&rdquo;组织效率 Alpha&rdquo;还是&rdquo;垄断定价+砍未来&rdquo;——看 3 年后 AI ASIC/客户自研芯片业务的工程师留存与赢单。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:AI 定制 ASIC(对标 Nvidia)+ VMware 订阅化,押在超大市场、反&rdquo;通用 GPU&rdquo;共识——战略层极值得看,但已不需本工具就看得见。</li>\n<li><strong>优先级</strong>:组织 74 × 市场 {大,AI 算力} × 战略 {反共识} → <strong>P0</strong>。理由:组织 Score≥67 且同时命中大市场+反共识战略;且这是稀有的&rdquo;闷声跑了 18 年、可复述、有 revealed 落地&rdquo;的截面 Alpha,不是转向故事——正是本 skill 要奖励、易被低估的类型。</li>\n</ul>"}, {"rank": 30, "score": 74, "conf": "RICH", "dir": "↑", "priority": "P1", "company": "AB InBev (Anheuser-Busch InBev)", "oneliner": "3G Way运行数十年:零基预算+全员指标公开+砸墙同桌+极致绩效晋年轻,真Alpha但被批过度削", "card": "<h1>AB InBev — Why attention?  ·  Score 74 · 置信度 RICH · 优先级 P1</h1>\n<p><strong>一句话定性</strong>:值得看——这是少见的<strong>截面 Alpha</strong>:一套运行 20+ 年、跨多次并购被强制复制并保持住的「3G 操作系统」(ZBB-as-culture + 极致精英制 + 所有权文化 + 自养管理层)。对<strong>成熟全球 CPG/酿酒同类</strong>(Diageo/Heineken/Molson Coors/Nestlé)是明确反常,不是同辈 table-stakes。机制清晰、可被员工侧对账,且对账结果<strong>双向印证</strong>(既证明机制真在跑=高 C,也暴露其下行=高 turnover/创新欠投资)。↑ 不代表对——成本机器在 Bud Light/Kraft Heinz 上已显其极限。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>2 人才密度/激励</td>\n<td>&ldquo;We have 85,000 people, but 250 are really the ones who make a difference. Those people are managed in a different way.&rdquo;(Carlos Brito, Stanford GSB)+ &ldquo;the best are recognized and the worst are driven out of the system&rdquo;(《The 3G Way》)</td>\n<td>显式把 8.5 万人里的~250 关键人单独管理;主动驱逐&rdquo;仅合格&rdquo;者(员工侧印证:PIP 式强制退出、constant nervousness)→ 奖结果不奖资历、系统性清退 B/C。偏离成熟 CPG&rdquo;按层级/资历平管&rdquo;</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>4 层级/3一号位自缚</td>\n<td>&ldquo;We don&rsquo;t have corporate jets. I don&rsquo;t have an office. I share my table with my vice presidents.&rdquo;(Brito, Stanford GSB)</td>\n<td>CEO 无独立办公室、与 VP 同坐大桌、砍掉总部墙与专机;&rdquo;no place to hide&rdquo;逼信息两向暴露。是自缚式、可证伪、跨并购公司一律执行(revealed)。偏离同类&rdquo;高管套间/专机/厚总部&rdquo;</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>5 激励/所有权</td>\n<td>&ldquo;We say the leaner the business, the more money we will have at the end of the year to share.&rdquo;(Brito)+ &ldquo;Our definition of fairness is that you have to treat different people in different ways.&rdquo;(Brito, GSB)</td>\n<td>把省下的成本与员工分享、长锁定股权(自掏co-invest)、差异化对待入制度;ZBB 让&rdquo;省钱=可分配&rdquo;成为人人激励而非财务动作。偏离&rdquo;按规模/活动奖励&rdquo;</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>9 组织演进</td>\n<td>〔事实〕Doukeris 时代多轮&rdquo;simplify and reduce layers&rdquo;裁员(2023–24,~2% 美国员工)(Brewbound/Bloomberg)</td>\n<td>诊断:<strong>常规 3G 节奏的减法</strong>(增长期主动压层、有长期 track record),非危机后反转 → 不减 Alpha,叠加标&rdquo;↗持续演进&rdquo;</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>2 反向红旗</td>\n<td>&ldquo;rapid movement of employees results in a fair amount of false experience that leads to poor leadership in the middle tier&rdquo;(Glassdoor 员工侧,3.6/5)</td>\n<td>同一机制的下行:精简+快轮岗→中层&rdquo;假经验&rdquo;、burnout、高 turnover;与 Brito 自述高度一致(=机制真在跑的对账证据,也=代价)</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n</tbody>\n</table>\n<ul>\n dquo;是否已触碰原创天花板。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:零库存柔性供应链 + 全球160国 + 2025出口超千亿元(自报);平台化&rdquo;supply chain as a service&rdquo;。战略极强,但属业务层。</li>\n<li><strong>优先级</strong>:组织 70 × 市场 {大} × 战略 {部分反共识(数据替代审美)} → <strong>P1</strong>。组织 Score 卡在67阈值边缘且方向混合(强 revealed 机制 + 明显 ↓ 红旗),非纯 ↑ 好赌注,故不进 P0;但机制硬、可证伪、双侧对账,值得排进本周看。</li>\n</ul>"}, {"rank": 34, "score": 70, "conf": "RICH", "dir": "↑", "priority": "P0", "company": "Caesars Entertainment (NASDAQ: CZR)", "oneliner": "Eldorado Way:权力下沉本地GM+砍总部,赌场业反集中,持续在跑", "card": "<h1>Caesars Entertainment (CZR) — Why attention?  ·  Score 70 · 置信度 RICH · 优先级 P0</h1>\n<p><strong>一句话定性</strong>:值得看。其&rdquo;组织操作系统&rdquo;是一桩<strong>反向收购里的小吃大</strong>——市值/规模小得多的 Eldorado(创始 Carano 家族 + 投资人出身 CEO Tom Reeg)2020 年吞下大得多的老 Caesars,并把自己<strong>极薄的总部 + 物业层放权</strong>的运营模型强加上去,替换掉老 Caesars 的&rdquo;拉斯维加斯集权&rdquo;。这是一条<strong>截面 Alpha</strong>(自 2020 起持续 5+ 年、稳态在跑、可复述成&rdquo;谁/怎么/多少&rdquo;),不是转向故事;但它的运行代价(用工挤压)是真实存在的 ↓ 风险。同赛道(MGM/老 Caesars 等大型多物业博彩运营商)默认是大总部集权,故这套对<strong>同类</strong>确属反常,非 table-stakes。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>层级/span(4)</td>\n<td>〔事实〕&rdquo;When Eldorado Resorts had 26 casinos in 12 states they had 250 total corporate employees, while Caesars had closer to 3,000.&rdquo;&ldquo;That&rsquo;s not how corporate gaming is in America for most companies… It&rsquo;s a huge culture change.&rdquo;(Gary Carano, NNBW 2020-09)</td>\n<td>26 物业 / 12 州只用 ~250 总部人;并把这套 ~10x 更薄的总部层强加给原本 ~3,000 人总部的老 Caesars。硬可核验的 span/overhead 事实,对同类(大型集权博彩商)极反常</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>决策权(3)</td>\n<td>&ldquo;We want to empower the property management to make decisions with support of corporate… That&rsquo;s completely flip-flopped from what Caesars did in the past. When we told the managers it was music to their ears.&rdquo;(Gary Carano, NNBW 2020-09)</td>\n<td>物业 GM 拿到属地决策权(定价/营销/服务),corporate 退为支持位;明确逆转被收购方的 Vegas 集权模型。可证伪、得罪原总部权力层</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度/用工(2)</td>\n<td>〔事实·员工侧〕&rdquo;Caesars relies heavily on contract labor so that they don&rsquo;t carry people on payroll&rdquo;&ldquo;chronic understaffing, high turnover&rdquo;(Glassdoor 多条员工评价 2024–25)</td>\n<td>刻意用合同工替正式工、压 payroll 以保薄编制——薄总部模型的&rdquo;做&rdquo;的一面,被员工侧 revealed 对账;但&rdquo;好不好&rdquo;有争议</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 S=D×C：9(span)+6(决策权)+4(用工)=19 → round(19/27×100)=<strong>70</strong>。<strong>revealed 旁证</strong>:第三方报道 Eldorado/Caesars 成本压缩带来 ~1,000–1,200 bps 同比利润率提升(CNBC 2020),且监管申报明确记载 Eldorado&rdquo;放权属地&rdquo; vs 老 Caesars&rdquo;Vegas 集权&rdquo;对照——证明这套机制真落了地、非自述,故 C 给到 3。<strong>在赌什么 / 何时失效</strong>:赌&rdquo;属地 GM 比远端总部更会经营 + 极薄总部不致失控&rdquo;;若放权失序、合同工用工削弱服务质量/留存(员工侧已现征兆),薄编制会从 Alpha 变成质量与人才债。</li>\n<li><strong>盲区 + 下一步</strong>:① 这是 2020–2024 vintage 的机制,需查 freshness——Reeg 治下当下(2026)放权/薄总部是否仍在跑、有无回弹;② 缺 Reeg 本人关于&rdquo;招人筛子/怎么开会&rdquo;的一手原话(两条定向子查询只捞到风格标签&rdquo;direct, investor mentality&rdquo;,未到机制层)——找 Reeg 长访谈/财报问答与现任 property GM 口径核实放权边界(哪些决策不用上签)。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:$17.3B 反向收购 + 激进去杠杆 + 自建 Caesars Sportsbook 数字博彩 + 押注 F1 Vegas Grand Prix——战略上敢下大注,但这些属资本/战略层,不进组织分。</li>\n<li><strong>优先级</strong>:组织 70 × 市场 {大:美国博彩最大运营商之一、$11B+ 营收} × 战略 {对同类反共识} → <strong>P0</strong>,理由:Score≥67 且大市场+反共识,薄总部/放权是同赛道里少见的、已 revealed 落地的截面 Alpha,值得放下手头去看;但带 ↓ 用工风险,看的同时要验证质量代价。</li>\n</ul>"}, {"rank": 35, "score": 70, "conf": "RICH", "dir": "↑", "priority": "P0", "company": "ABB (ADR)", "oneliner": "ABB Way:20事业部全权担损益+计分卡绑激励,大集团里真去中心", "card": "<h1>ABB (ADR) — Why attention?   ·   Score 70 · 置信度 RICH · 优先级 P0</h1>\n<p><strong>一句话定性</strong>:值得看——这是少见的&rdquo;闷声一直优秀、低故事性&rdquo;的高 Alpha 截面:把一家 ~105k 人的瑞士-瑞典工业巨头改造成「~18–20 个全权 P&amp;L 事业部 + 极小总部 + 月度记分卡治理」的去中心化操作系统(ABB Way),且这套机制已被 revealed 落地证据证实(总部 18,000→&lt;1,000、EBITA 13–16%→18–22%)并在 CEO 换届后未回弹。这是<strong>截面 Alpha</strong>,不是转向 Delta——现任 CEO Wierod 明确&rdquo;延续&rdquo;而非重组。同类基线(GE/Siemens/Honeywell/Emerson 这类工业多元集团长期是矩阵+中台沉重)下,这套去矩阵化的执行深度是对同类的明确反常。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>4 层级/span + 9 演进</td>\n<td>〔事实〕&rdquo;corporate functions&hellip;reduced headcount of less than 1,000 employees worldwide&rdquo;;&rdquo;At the beginning of 2019, roughly 18,000 employees were still in corporate functions&hellip;gradually transferred into the business areas&rdquo;(ABB Our Way forward 2020 / news center)</td>\n<td>总部职能从 ~18,000 砍到 &lt;1,000,人转进事业部;矩阵在 18 个月内被废。总部只管&rdquo;financial, strategic and governance&rdquo;。同类工业集团总部臃肿是常态 → 极端去中台、可核验硬动作</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>1 战略-结构 + 5 所有权</td>\n<td>&ldquo;we drive performance through a decentralized business model that empowers our business Divisions with full ownership of their strategy, operations and performance&hellip;freedom to operate as entrepreneurs&rdquo;;&rdquo;Divisions have a very clear mandate: grow profitably to become, or remain, number 1 or 2&rdquo;(Rosengren, LinkedIn《The ABB Way》)</td>\n<td>~18–20 个事业部=最高运营层,各自全权 P&amp;L、自负战略/资源;具名 division president 担损益;不达 #1/#2 就&rdquo;fix, exit or grow&rdquo;。康威式按业务而非职能切边界 → 反&rdquo;单一 P&amp;L+职能制&rdquo;</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>3 决策权 + 6 信息流</td>\n<td>&ldquo;We have a decentralized business model, but it doesn&rsquo;t mean anarchy&rdquo;(Wierod, IMD);〔事实〕&rdquo;Performance is reviewed on a monthly basis&hellip;standardized KPIs, our so-called scorecards&hellip;reinforced through incentivization&rdquo;(ABB 投资者材料)</td>\n<td>授权下沉到 18 位 division president,但用<strong>月度标准化记分卡</strong>做信息上行+绑薪酬,作为&rdquo;放权而不失控&rdquo;的闸——decentralization <em>with</em> performance management。机制=谁拍板(事业部)/怎么管(月度 KPI 记分卡)/绑什么(激励)</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>落地验证(revealed)</td>\n<td>〔事实〕EBITA 目标 13–16%(2020)→ 实际 18.1%(2024)、Q2&lsquo;24 峰值 19%、目标上调到 18–22%;DNB 分析师 Olof Larshammar 称 Rosengren &ldquo;instrumental&rdquo;;Wierod 换届后延续不重组(IMD/财报/Reuters)</td>\n<td>第三方+可验证结果+跨 CEO 未回弹 → 把&rdquo;宣布的机制&rdquo;抬到&rdquo;落了地的机制&rdquo;,过落地闸</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 S=D×C:9(总部18k→&lt;1k)+ 6(事业部全权P&amp;L)+ 4(月度记分卡治理)= 19 → 19/27×100 = <strong>70</strong>。无显著 Δ(Wierod 延续 Rosengren 模型,非补债式重组)。<strong>在赌什么/何时失效</strong>:赌&rdquo;近客户的事业部自主+硬 KPI 问责 &gt; 中央协调的规模协同&rdquo;;若周期下行、跨事业部需要深协同(如系统级电气化+自动化整合)时,极小总部可能缺乏拉通能力,去中心化反成接缝。</li>\n<li><strong>盲区 + 下一步</strong>:① <strong>人才筛子(维度2)需补机制</strong>——只搜到&rdquo;promote from within / 内部接班&rdquo;(Wierod 全程内部晋升)的弱信号,挖不到 division president 的具体选人筛子/keeper test;② 开会机制只显影到&rdquo;月度记分卡&rdquo;,未见更细的会议/纪要/杀会做法。Follow up:找前/现 division president 或 ABB HR 一手访谈,验证&rdquo;记分卡未达标→真换人&rdquo;的清退动作是否 revealed(目前是 stated 的&rdquo;fix/exit&rdquo;)。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:剥离机器人/拟分拆、组合主动管理(divest 三个 division)——战略层动作,组织表达已并入上表(为执行而重组班子)。市场:电气化/自动化/机器人,大且顺周期。</li>\n<li><strong>优先级</strong>:组织 70 × 市场 {大} × 战略 {对同类反共识(去矩阵执行深度)} → <strong>P0</strong>。注意它是&rdquo;无戏剧性转向故事但截面强&rdquo;的类型,别因为没自我归罪猛料而低估;高 Alpha 已被 revealed 坐实,值得本周看,follow up 一手验证清退动作 + 选人筛子两处盲区。</li>\n</ul>"}, {"rank": 36, "score": 70, "conf": "RICH", "dir": "?", "priority": "P0", "company": "Kraken (Payward)", "oneliner": "文化即筛子(给反对者4个月遣散)+ 极端VC式集权,costly且有落地", "card": "<h1>Kraken (Payward) — Why attention?   ·   Score 70 · 置信度 RICH · 优先级 P0</h1>\n<p><strong>一句话定性</strong>:值得看,但带红旗。它的&rdquo;组织操作系统&rdquo;是<strong>把公司当 VC 投后组合来跑</strong>——co-CEO 砍掉中间层、自己直接带 50–100 人、用自训机器人当管理放大器,再用&rdquo;付费自愿离场&rdquo;把价值观不合者筛走。这是<strong>真截面 Alpha(决策权/span + 人才筛子在运行,可证伪、得罪人)</strong>;但 2024 reorg 是 <strong>Δ</strong>,且员工侧 revealed 出&rdquo;trust/freedom&rdquo;话术与&rdquo;恐惧/不信任&rdquo;现实的裂口——<strong>costly 证明他当真,不证明他对</strong>。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>人才/激励</td>\n<td>&ldquo;offered employees four months of severance to quit if they are &lsquo;triggered&rsquo;…about 30 employees had taken the severance deal&rdquo;(J. Powell, Fox News);今承袭为&rdquo;Sail Away…voluntary offboarding for Krakenites who decide it&rsquo;s time&rdquo;(Sethi/Ripley, Kraken blog)</td>\n<td>用&rdquo;价值观不合即付 4 个月遣散自愿走&rdquo;做反向 keeper test,~30 人(约1%)真走人——〔revealed〕第三方+on-record;偏离&rdquo;招人证进展/不敢动人&rdquo;基线</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑?</td>\n</tr>\n<tr>\n<td>层级/span</td>\n<td>&ldquo;today I&rsquo;ve got maybe 50-70 reports…by end of year…100&rdquo;;&rdquo;We&rsquo;re both in the loop on all comms between all of the 50 to 70 reports…whoever…has the most context&rdquo;(Sethi, Semafor)</td>\n<td>co-CEO 砍中层、各带 50–100 直接下属、两人共看全员通信、按&rdquo;谁上下文最足&rdquo;拍板而非资历;自训&rdquo;six or seven bots&rdquo;消化日 6000 条消息。极宽 span+反 1:1,对 2600 人公司激进</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑↓</td>\n</tr>\n<tr>\n<td>战略-结构/激励</td>\n<td>Sethi relies &ldquo;heavily on members of his own network—sometimes at the expense of Kraken&rsquo;s own employees&rdquo;…&rdquo;didn&rsquo;t do wonders for morale&rdquo;;remake as &ldquo;a family of brands…the mode is Mark Zuckerberg&rsquo;s Meta&rdquo;(former exec/Fortune)</td>\n<td>像 VC 管 portco:每个品牌配全套高管、靠自己人网络补位;偏离&rdquo;内部晋升/职能制&rdquo;;revealed 出忠诚网络挤压在编员工</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n<tr>\n<td>组织演进</td>\n<td>〔事实〕裁 ~15%/约 400 of 2,600,点名砍 ops chief BianRosa、tech chief Patankar;&rdquo;fell into the trap of building organizational layers…eliminate layers&rdquo;(co-CEO memo, 2024)</td>\n<td>增长/IPO 前主动削层(非危机后被迫),倾向&rdquo;强组织演进&rdquo;;但员工侧见债:&rdquo;people disappear on Slack…no acknowledgment&rdquo;</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↗</td>\n</tr>\n<tr>\n<td>信息流(对账)</td>\n<td>&ldquo;The best people don&rsquo;t need to be managed. They need to be trusted&rdquo;(Sethi/Ripley)↔ 员工:&rdquo;soul…lost, replaced by fear, distrust, and disengagement&rdquo;;Mgmt 3.4/5(Blind/Glassdoor)</td>\n<td>stated 自由/信任 vs revealed 恐惧文化——裂口=红旗或表演式;span 与 comms 透明是 revealed,信任叙事是 stated</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 = 9(Sail Away)+ 6(span)+ 4(网络/品牌)= 19 → 19/27×100 = <strong>70</strong>。Δ(2024 reorg)单列不进分。<strong>在赌什么 / 何时失效</strong>:赌&rdquo;顶尖的人不用管、只要给上下文和自由 + 用 AI 替代中层&rdquo;;若 span 100 的&rsquo;most-context 谁跳谁拍&rsquo;退化成混乱/忠诚网络寡头化、价值观筛子变成清洗忠诚度,Alpha 就翻成 ↓。</li>\n<li><strong>盲区 + 下一步</strong>:① 缺&rdquo;招人具体筛子&rdquo;原话(只有&rdquo;hire for ownership and intensity&rdquo;=偏 cheap,需补机制);② Sail Away 在 Sethi 期的 take-up 数与回弹未验证(2024 reorg 后只剩 Powell 时代~30 的旧数据)。<strong>Follow up</strong>:找前/在职 director 级对账&rdquo;50-100 reports + bots&rdquo;是否真在运行 vs 已塞车;验证 hypothesis&rdquo;VC-投后模式能否承住 2600 人冲 IPO 而不靠忠诚网络空心化在编团队&rdquo;。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:零至…IPO 路径明确($15B 估值/$500M 轮/2026 拟 IPO)、xStocks 代币化股票快速出货——大市场、打法中度反共识(VC 当 CEO);组织分已含此模式的组织表达,业务面单独标&rdquo;大市场值得看&rdquo;。</li>\n<li><strong>优先级</strong>:组织 70 × 市场 {大:加密/IPO} × 战略 {中度反共识:VC-runs-portco} → <strong>P0</strong>,但<strong>带强红旗</strong>:revealed 出&rdquo;信任话术 vs 恐惧文化&rdquo;裂口 + 忠诚网络挤压在编员工,P0 的理由是&rdquo;偏离极大且 costly、必须亲自看清是真 Alpha 还是表演式 costly&rdquo;,而非&rdquo;已验证为好组织&rdquo;。</li>\n</ul>"}, {"rank": 37, "score": 70, "conf": "RICH", "dir": "?", "priority": "P0", "company": "Cognition (Devin/Windsurf)", "oneliner": "并购后9月遣散费当筛子逼全员选边,机制实但grind是AI同辈半-table-stakes", "card": "<h1>Cognition (Devin/Windsurf) — Why attention?   ·   Score 70 · 置信度 RICH · 优先级 P0</h1>\n<p><strong>一句话定性</strong>：值得放下手头看。它的&rdquo;组织操作系统&rdquo;= <strong>用极致绩效文化 + 反共识招聘筛子把人才密度推到 cohort 极端，并用&rdquo;花真金白银请人离开&rdquo;的机制把文化对齐变成可执行动作</strong>。这是<strong>截面 Alpha</strong>（机制当前在跑、有第三方/官方 revealed 证据），不是转向故事——没有自承痛点+宣布改革的 Delta。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕（+来源）</th>\n<th>机制（谁/怎么/多少）+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>人才密度(M&amp;A整合)</td>\n<td>〔事实〕收购 Windsurf 后&rdquo;100% of Windsurf employees will receive fully accelerated vesting&rdquo;+ 给 9 个月薪资买断、限期 8/10 选择(Cognition 官方 blog；TechCrunch 2025-08-05)</td>\n<td>用&rdquo;全额加速归属 + 9个月买断&rdquo;做<strong>去选择</strong>筛子：愿留者 opt-in 极强度，不愿者拿钱走；同辈 M&amp;A 默认用 golden-handcuff <strong>留人</strong>，它反过来<strong>付费请人走</strong>→自缚、烧钱、第三方可核验、无回弹</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>激励/文化</td>\n<td>&ldquo;We don&rsquo;t believe in work-life balance—building the future of software engineering is a mission we all care so deeply about that we couldn&rsquo;t possibly separate the two.&rdquo;(Scott Wu，The Information 邮件经 TechCrunch 引) / &ldquo;extreme performance culture, and we&rsquo;re upfront about this in hiring so there are no surprises later&rdquo;(Scott Wu，X)</td>\n<td>把 80h/6天明确写进招聘前置、并用上面的买断机制<strong>强制执行</strong>而非空喊；得罪人、可证伪、公开被骂仍不撤。极端时长在本 cohort 半 table-stakes，但&rdquo;显式筛子+买断兑现&rdquo;超出同辈</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>人才密度(招聘筛子)</td>\n<td>&ldquo;our whole interview process… is basically just having people build their own Devin in eight hours&rdquo; / &ldquo;you can use as much AI as you want… What we actually want to test is… what do you think is the right thing to build?&rdquo;(Scott Wu，Cheeky Pint / officechai)</td>\n<td>招聘只测判断力/产品决策，<strong>放开 AI 使用</strong>；反 cohort 当下&rdquo;防 AI 作弊&rdquo;恐慌。机制为 stated 过程(非第三方对账)</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度(画像)</td>\n<td>〔事实〕初始 35 人中&rdquo;21 of us have founded a company before&rdquo;，&rdquo;core engineering was about 19&rdquo;，团队累计 10 枚 IOI 金牌(Cheeky Pint；Contrary)</td>\n<td>~60% 连续创业者 + 顶级竞赛池=极高 founder/algo 密度。但&rdquo;招精英竞赛选手&rdquo;在本 cohort 偏 table-stakes</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>：只累计 Alpha 行 Top-3（同维度≤2）：买断筛子 S=9 + WLB文化 S=6 + 8h招聘 S=4 = 19 → round(19/27×100)= <strong>70</strong>。<strong>在赌什么/何时失效</strong>：赌&rdquo;人才密度×强度=AI编程飞轮里唯一杠杆，软成员是净拖累&rdquo;；若 Devin 自动化让超长工时的边际产出递减（员工在 Blind 已指&rdquo;overwork narrows solution space, burns out&rdquo;），或顶级人离场后无人补，机制反噬。</li>\n<li><strong>盲区 + 下一步</strong>：决策权/层级/span/信息流(坏消息上行)/康威——<strong>信息不足，非平庸</strong>：~286 人但内部汇报线、谁拍板、几层、会议机制几乎查无(定向&rdquo;怎么开会&rdquo;子查询只搜到&rdquo;AI 当异步初级工程师/会议加 voice AI&rdquo;，无杀会/异步备忘等机制)。follow-up：找 Windsurf 留任/离职者验证&rdquo;买断后真实留存与文化落地是否回弹&rdquo;；问现任工程师&rdquo;一线能独立拍板的边界 + 是否有中层&rdquo;。</li>\n<li><strong>业务/战略离群（不计入组织分）</strong>：&rdquo;Moneyball-ification of everything&rdquo;——把工程招聘/评估当成可数学优化的成熟空间；72 小时 92% 折价吞下 Windsurf 残部——战略极进取，但属资本/战略层。</li>\n<li><strong>优先级</strong>：组织 70 × 市场 {大：AI 编程/agent} × 战略 {反共识：付费去选择 + 反 WLB 公开化} → <strong>P0</strong>：组织 Score≥67 且大市场 + 反共识战略，机制有 revealed 落地证据、当前在跑。</li>\n</ul>"}, {"rank": 38, "score": 70, "conf": "RICH", "dir": "↑", "priority": "P0", "company": "Texas Roadhouse (TXRH)", "oneliner": "店总投$25k换10%门店利润,只教你怎么拥有一家店", "card": "<h1>Texas Roadhouse (TXRH) — Why attention?  ·  Score 70 · 置信度 RICH · 优先级 P0</h1>\n<p><strong>一句话定性</strong>:值得看。它的&rdquo;组织操作系统&rdquo;是把每家店变成一个<strong>有真股权的小所有者公司</strong>——店总(Managing Partner)交 $25k 押金、签 5 年、拿门店税前利润 10%,像 fractional owner 一样自管人/料/班/废弃。这是<strong>截面 Alpha</strong>(运行约 30 年、10-K 披露、被低离职率验证),不是转向 Delta。创始人 Kent Taylor 2021 去世,现任 CEO Jerry Morgan 萧规曹随、机制无回弹。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>激励/所有权</td>\n<td>〔事实〕&rdquo;required to put down a $25,000 refundable deposit and sign a five-year employment contract in exchange for 10% of the profits…deposits generally refunded after five years&rdquo;(TXRH 10-K)</td>\n<td>店总自掏 $25k + 拿本店税前利润 10% + 押金锁 5 年;上一层 Market Partner 同结构带~10 店。一线 server/line cook 可升到店总。偏离 casual-dining&rdquo;店总=拿固定工资+小额奖金&rdquo;的同辈基线</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度/留存</td>\n<td>〔事实〕&rdquo;38% turnover rate, significantly lower than the 83% industry average…tracking toward near-mythical single-digit manager turnover&rdquo;(FSR Magazine)</td>\n<td>是上面股权机制的 revealed 落地结果:第三方报道、可核验、持续未回弹。全服务餐饮普遍三位数离职、长期缺编,它反向超额留存</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>决策权/去中心化</td>\n<td>&ldquo;Our innovation is keeping our managing partners at the center of our universe…providing them with the tools&rdquo;(CEO Jerry Morgan);Taylor:执行层&rdquo;learns from frontline people…supporters who offer advice and encouragement rather than edicts and orders&rdquo;</td>\n<td>店总独立管 labor cost / 食材质量 / 排班 / waste / 本地社群,总部当 supporter 不下 edict;&rdquo;决策留在能看到损益的人手里&rdquo;。偏离连锁餐饮总部统一管控的基线</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>一号位组织自觉</td>\n<td>Taylor:&rdquo;hire for attitude — everything else can be trained&rdquo;;&rdquo;a people company that just happened to serve steaks&rdquo;;拒绝跟风做外
