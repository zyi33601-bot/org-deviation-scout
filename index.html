常</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>人才密度(筛子)</td>\n<td>&ldquo;in every role we&rsquo;re going to hire the best possible person, regardless of their demographics… mildly controversial&rdquo;(Wang，MEI 政策，X 浏览 5M+，Musk 称 &ldquo;great&rdquo;)(StartupArchive/Fortune)</td>\n<td>公开 anti-DEI 的 MEI(merit/excellence/intelligence)：能力优先、不设 demographic target、保留 diverse pipeline。公开得罪一批人、可被打脸、自缚 = 高 costly；但&rdquo;怎么测能力&rdquo;的机制层偏薄</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>人效/lean core</td>\n<td>〔事实〕$1.5B ARR(2024，97% YoY)；核心 FTE ~1,000–1,200；rev/FTE 远高于同类(Contrary/Sacra)</td>\n<td>小核心 FTE + 大量外部 contractor 承接 labeling，core 团队高人效。偏离&rdquo;人头通胀当政绩&rdquo;</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>信息流(病征)</td>\n<td>&ldquo;lack of transparency… not always open about plans&rdquo;；WLB 2.7/5、&rdquo;high attrition&rdquo;(Glassdoor/Blind 员工侧)</td>\n<td>独立员工证据显示坏消息/计划不透明、高流失 → 真相上行弱。与 Wang 高标准叙事<strong>对账出张力</strong></td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n<tr>\n<td>组织演进(债)</td>\n<td>&ldquo;We created too many layers, excessive bureaucracy… ramped up GenAI capacity too quickly&rdquo;；16 pods→5(代理 CEO Droege 全员信，2025-07 裁 14%+500 contractor)</td>\n<td>2023 -20%、2025 -14% 两轮裁员 + 砍层 = <strong>弱组织危机后被迫补债</strong>(非表现好时主动演进)。Δ：不减上面 Alpha，但坐实&rdquo;扩张失控&rdquo;</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>：只累计 A 行 Top-3：3×2 + 2×3 + 2×2 = 6+6+4 = <strong>16</strong> → 16/27×100 ≈ <strong>59</strong>。Δ 行(补债 reorg)单独列、不进分、也不下扣已挖到的 Alpha。<strong>在赌什么/何时失效</strong>：赌&rdquo;创始人个人品味可作为质量与人才的中央闸&rdquo;——在小核心 + Wang 在任时成立；<strong>Wang 一走，这套机制的人格依赖立刻成为最大风险</strong>(approve-every-hire 不可扩展、已是瓶颈)。</li>\n<li><strong>盲区 + 下一步</strong>：① Wang 走后这些 Alpha 是否还在跑、谁继承&rdquo;招聘闸&rdquo;——需一手向现任管理层/近期离职者核实(当前判分按 Wang 在任的 standing 给，已打折)；② MEI 是否真改变了 hire 结构(revealed)还是只是 stance——验证录用画像变化;③ 补债 reorg(16→5 pods)是稳态还是反复反转,观察 12 个月有无回弹。follow up：近 6 个月离职的 eng lead / Droege 治下的组织走向。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>：Meta 以 ~$14.3B 拿 49% 股权、把 CEO 抽走——资本/治理事件,反映 data-infra 赛道战略价值极高(大市场),但属战略层、不进组织分。</li>\n<li><strong>优先级</strong>：组织 59 × 市场 大(AI 数据/推理基础设施) × 战略 共识偏反共识 → <strong>P1</strong>。理由:机制罕见且 costly 证据扎实(够 33–66 + 大市场),但 founder 依赖 + 人已离场 + 补债型 reorg + 信息流病征,够不上 P0 的&rdquo;高 Alpha 稳态在跑&rdquo;。</li>\n</ul>"}, {"rank": 62, "score": 59, "conf": "RICH", "dir": "↑", "priority": "P2", "company": "LCI Industries (Lippert / NYSE: LCII)", "oneliner": "RV零件厂却造了套全厂渗透的领导力机器,离职率实降", "card": "<h1>LCI Industries (Lippert · NYSE:LCII) — Why attention?  ·  Score 59 · 置信度 RICH · 优先级 P2</h1>\n<p><strong>一句话定性</strong>:值得看一眼。一家 RV/船艇零部件制造商，却把&rdquo;领导力培养&rdquo;做成了一套截面 <strong>Alpha</strong>——CEO 用十年时间、用自己最稀缺的资源(时间+独立汇报的 27 人专职团队)系统性投资基层主管的领导力，对<strong>同类(劳动密集型工业零部件供应商，普遍靠 lean/控成本/高流动率运行)</strong>是明确反常。组织操作系统 = &ldquo;把蓝领主管当领导者来培养 + 一号位亲自做信息上行&rdquo;。核心钩子(130%→28% 流动率)是<strong>自报数据、待第三方坐实</strong>，且员工侧有矛盾证据，故压一档。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th style=\"text-align: left;\">机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>8 一号位亲历</td>\n<td>&ldquo;For the last ten or so years, Jason has held at least one listening session every single week in a different part of our business.&rdquo;(Leadership Dev 总监 Kim Lisiak Fraleigh, LEADx)</td>\n<td style=\"text-align: left;\">CEO 十年来每周至少一次到工厂/线上&rdquo;听会&rdquo;+ 每周亲见约 48 名一线主管 + 为 top 800 主管配领导力/个人发展教练。一号位把时间砸在二三线，非黑箱。对同类(大厂 CEO 停在直接下属层)反常</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>1 战略-结构</td>\n<td>〔事实〕Leadership Development 团队 27 人，<strong>独立于 HR、直接向 CEO 汇报</strong>(LEADx)</td>\n<td style=\"text-align: left;\">领导力培养不是 HR 的子功能，而是单列的 27 人部门、直挂一号位 → 资源/权力上真把它当核心而非口号。工业制造商极罕见</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>2 人才密度</td>\n<td>&ldquo;Team members get to vote whether they come back every day or not. It&rsquo;s their choice. They&rsquo;re comparing us to past jobs.&rdquo;(Jason Lippert, Chief Executive)</td>\n<td style=\"text-align: left;\">把蓝领留存当&rdquo;每天复购&rdquo;来运营:清洁化车间+发展路径(welder 也有 path)+ LAP 个人/职业双面目标(今年报 6,307 个目标达成)。偏离&rdquo;靠流程兜平均、用人头证进展&rdquo;</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>2 人才密度(结果)</td>\n<td>&ldquo;We were at 130% year-over-year turnover… now averaging 28% turnover year over year.&rdquo;(Kim Lisiak Fraleigh)；Dream Achievers 流动率 8%</td>\n<td style=\"text-align: left;\">文化转型十年把流动率从 130% 压到 ~28% — 若真，是制造业级别的硬结果。<strong>但出自公司内部 Leadership Dev 总监自报、无第三方审计</strong></td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>6 信息流(反证)</td>\n<td>〔事实〕Glassdoor 3.2/5(404 评)；&rdquo;leaders that are commended and move up seldom reflect the compan oer, Oregon State College of Business, 2021)</td>\n<td>单店 GM 自行定价/排库存/按本地市场拍板,总部只做后台规模(采购/翻新/融资);员工侧对账成立(见下)</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>3 决策权(员工侧对账)</td>\n<td>〔Glassdoor 评价〕&rdquo;Total autonomy and freedom to manage your dealership&rdquo;;&rdquo;autonomy like a privately owned dealership despite being a public company&rdquo;(Glassdoor, 997+ 条, 3.8/5)</td>\n<td>第三方/员工侧 revealed 证据,与 CEO 自述一致 → 自治非口号、真在跑(但同源也有&rdquo;managers are micromanaged / forced to give pay cuts&rdquo;少数反例,自治非绝对)</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>5 激励/所有权</td>\n<td>〔事实〕&rdquo;Lithia Partners Group&rdquo;:选 24 名顶级 GM,&rdquo;received stock could equal one to two years of salary in about four years&rdquo;,&rdquo;two to four times more stock ownership than&hellip; in the past&rdquo;,25%/年 vesting,可随时转现(Automotive News, 2015-02-23)</td>\n<td>把店长变准合伙人:股权=1–2 年薪、较旧制翻 2–4 倍、绑 4 年——奖&rdquo;把单店当自己生意经营&rdquo;,偏离&rdquo;经销集团给现金 bonus/挂职级&rdquo;的同辈常态</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>1 战略-结构(peer 对照)</td>\n<td>〔事实〕AutoNation 走中心化&rdquo;全国统一一口价/国家品牌&rdquo;;Lithia 反向<strong>保留 DCH/Suburban/Carbone 等本地老店名 + 本地 P&amp;L</strong>,后台跑集中引擎(Auto Remarketing / Crain&rsquo;s)</td>\n<td>用康威式&rdquo;按本地店划边界&rdquo;反推&rdquo;多点自治下注&rdquo;;证明去中心化在大型上市经销集团里是<strong>反共识选择</strong>,非 table-stakes</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累 A 行 Top-3 = (2×3)+(2×3)+(2×2)=6+6+4=16 → 16/27×100 ≈ <strong>59</strong>。(注:同一维度3最多 2 条入 Top-3,已遵守;两条决策权独立=CEO 自述 + 员工对账。)<strong>在赌什么/何时失效</strong>:赌&rdquo;本地老板比总部更懂本地市场,且股权能让 GM 像自己生意一样经营&rdquo;;靠并购整合不破坏被收店的本地自治。失效场景:当行业转向线上一口价(Driveway/CarMax 模式),本地定价自治的价值被稀释,中心化的 AutoNation 反而占优——届时 Lithia 的去中心化是包袱还是护城河待观察。</li>\n<li><strong>盲区 + 下一步</strong>:两条定向子查询<strong>未挖到</strong>机制——① CEO/创始人 DeBoer 家族的&rdquo;招人筛子/看人怪癖&rdquo;(只查到泛泛&rdquo;promote from within / develop leaders&rdquo;);② 公司&rdquo;怎么开会/决策会机制/杀会&rdquo;(只有董事会 2024 开 15 次会这类治理面,无运营层会议机制)。这两维=<strong>信息不足、非平庸</strong>,需一手访谈或前 GM 对账。Follow up:找前/现任单店 GM 验证&rdquo;自治边界到底多大、总部什么时候介入&rdquo;;验证 hypothesis&rdquo;Lithia Partners Group 股权计划的留存率/扩面数据&rdquo;(2015 仅 24 人,十年后覆盖多少?)。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:并购驱动的极速扩张(已超越 AutoNation 成最大美国汽车零售商)+ Driveway 全渠道 + 激进股票回购——业务激进,但属战略层,不进组织分。</li>\n<li><strong>优先级</strong>:组织 59 × 市场 {大,美国汽车零售/万亿级} × 战略 {反共识,逆同辈中心化趋势走去中心化} → <strong>P1</strong>(组织 33–66 + 大市场 + 反共识战略)。理由:组织偏离可信且 revealed(够 P1),但单条 S 未到 9、无 P0 级尖峰;去中心化+店长股权是真 Alpha,值得本周看,重点验证自治的真实边界与股权计划的落地广度。</li>\n</ul>"}, {"rank": 66, "score": 59, "conf": "RICH", "dir": "↑", "priority": "P1", "company": "Rippling", "oneliner": "compound startup:50+前创始人当GM跑独立产品线,联邦自治", "card": "<h1>Rippling — Why attention?   ·   Score 59 · 置信度 RICH · 优先级 P1</h1>\n<p><strong>一句话定性</strong>：值得排进本周看。Rippling 的&rdquo;组织操作系统&rdquo;是<strong>把一家 4000 人公司拆成几十个由前创始人当 GM 的准独立产品 BU、跑在共享后端上，并刻意给每个项目少配人逼到红线</strong>——这是<strong>截面 Alpha（当前在运行、跑了多年、能复述成机制）</strong>，不是转向故事；它属于&rdquo;闷声一直按一套反常打法运行&rdquo;的高 Alpha / 低故事性类型，没有自我归罪的猛料，但截面上结构独特。同类（成长期 HR/fintech SaaS）默认是&rdquo;职能制 + 招职业经理人 + 招人证明进展&rdquo;，它在多维上反着来。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕（+来源）</th>\n<th>机制（谁/怎么/多少）+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>战略-结构 / 决策权</td>\n<td>〔事实〕&rdquo;Rippling has 150 former founders who are GMs of SaaS [products]&rdquo;（投资人 Garry Tan, LinkedIn）；Conrad：他招&rdquo;preternaturally inclined to run something&rdquo;的人，&rdquo;That&rsquo;s how I deal with that fire hose effect…a big part of this compound approach of building a lot of different products in parallel&rdquo;（20VC）</td>\n<td>~150 名前创始人当各产品 GM，作为准独立 BU 跑在共享员工数据后端上，并行下注多产品。<strong>筛子=招&rdquo;天生要自己跑一摊&rdquo;的前创始人</strong>，而非职业 PM/VP。偏离同类&rdquo;职能制+招职业经理人&rdquo;共识</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度 / 激励-强度</td>\n<td>&ldquo;We&rsquo;ve deliberately understaffed every project at the company&rdquo;；&rdquo;You got to run the engine at the red line at all times&rdquo;；overstaffing → &ldquo;politics, people working on things further down the priority list…that&rsquo;s poison&rdquo;（CPO Matt MacInnis, Lenny&rsquo;s Podcast 2025-12）</td>\n<td><strong>刻意给每个项目少配人</strong>为常设运营纪律，逼小团队满负荷、用稀缺逼优先级、避免人多生政治。员工侧对账：Blind WLB 2.4/5、Glassdoor 3.1/5，&rdquo;长工时/深夜会议&rdquo;&ldquo;escalations spill into nights &amp; weekends&rdquo;——代价真实显形、没回弹（revealed）</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>信息流 / 招聘</td>\n<td>〔事实〕Conrad 把给 VC 看的同一份 investor memo，在第一次见面前发给<strong>每一个候选人</strong>（多源：thevccorner、20VC）；&rdquo;never made a pitch deck. He wrote a memo&rdquo;</td>\n<td><strong>招聘=先给战略全文做信息对称+自我筛选</strong>，候选人读 VC 读的同一份东西再面。偏离同类&rdquo;面试才讲故事、信息高度不对称&rdquo;常态</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>：只累计 A 行 Top-3 = 6 + 6 + 4 = 16 → round(16/27×100) = <strong>59</strong>。无显著 Δ（无自承大公司病/reorg 戏码）——属反向奖励的&rdquo;高 Alpha 低故事性&rdquo;，不因没故事而低估。<strong>在赌什么 / 何时失效</strong>：赌&rdquo;前创始人 GM + 持续饥饿态&rdquo;能让大公司保持小公司速度（Conrad：&rdquo;no trade-off between speed and quality&rdquo;）；若前创始人留不住、或&rdquo;红线常态&rdquo;把人磨穿导致系统性流失，模型反噬（understaffing 标 <code>?</code>：costly≠correct，可能是真诚地把人耗干）。</li>\n<li><strong>盲区 + 下一步</strong>：GM 的<strong>决策边界</strong>（能独立拍什么、什么上浮到 Conrad）只有原则、缺&rdquo;谁/多少&rdquo;细粒度机制（故战略-结构 C 压到 2，需补机制）；开会/纪要机制查无。Follow up：找前创始人 GM 验证&rdquo;自治到哪一层&rdquo;；查 understaffing 是否推高关键岗 regretted attrition（验证 ↓ 假设）。</li>\n<li><strong>业务/战略离群（不计入组织分）</strong>：compound startup（反&rdquo;focus&rdquo;共识、并行多产品）属战略反共识——组织分之外，战略层也值得看。</li>\n<li><strong>优先级</strong>：组织 59 × 市场 大（员工 OS / HR-fintech）× 战略 反共识 → <strong>P1</strong>：组织分中高 + 大市场/反共识战略，排进本周；够不上 P0 因关键 A 行落地机制（GM 决策边界）尚需坐实、且最强强度信号 understaffing 方向存疑。</li>\n</ul>"}, {"rank": 67, "score": 59, "conf": "RICH", "dir": "↑", "priority": "P1", "company": "Tenstorrent", "oneliner": "Keller把人当'功能块/计算机架构'+20人团队论,运营隐喻连贯且反复", "card": "<h1>Tenstorrent — Why attention?   ·   Score 59 · 置信度 RICH · 优先级 P1</h1>\n<p><strong>一句话定性</strong>:值得排进本周看。它的&rdquo;组织操作系统&rdquo;= <strong>把组织当计算机架构来设计</strong>——Jim Keller 有一套连贯、可复述、反 AI 同辈共识的人事哲学(团队限 20 人避政治 / 中频 check-in 防&rdquo;报喜不报忧&rdquo; / 刻意招&rdquo;杂&rdquo;而非清一色 10x)。这是<strong>截面 Alpha(一号位组织自觉 dim8 + 人才密度 dim2 + 决策/信息流)</strong>,而非转向故事。<strong>但闸点</strong>:绝大多数证据是 Keller 受访自述其哲学,<strong>缺第三方/员工侧证实&rdquo;在 Tenstorrent 真这么跑&rdquo;</strong>,故多条封顶 C=2、标&rdquo;待验证落地&rdquo;。同类基线:Cerebras / Groq / SambaNova / d-Matrix / Etched 等 AI 芯片创业(数百人、Series C–D)。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>8 一号位自觉</td>\n<td>&ldquo;I tend to see an organization as computer architecture and think of people as a computer architecture problem&rdquo;(Ojo-Yoshida Report 专访)</td>\n<td>把人/团队当功能块来&rdquo;设计接口&rdquo;，配套&rdquo;small, autonomous teams where they know what their goal is, and they believe they can solve it&rdquo;——能说出一套连贯反常的组织模型本身稀有;同辈多只会喊&rdquo;扁平/快&rdquo;</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>4/9 层级·团队尺度</td>\n<td>&ldquo;a 100-person team is not a big 20-person team&hellip; A 100-person team is broken into five separate teams of 20 people. As soon as you have five teams, they start getting involved in politics&rdquo;(Ojo-Yoshida Report)</td>\n<td>把团队单元钉在~20 人、随规模切分而非加层,<strong>把&rdquo;协调政治&rdquo;当显式约束设计</strong>;可证伪、具体。但&rdquo;Tenstorrent 真按此切&rdquo;只部分 revealed(60→300、9 地分布)</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>3/6 决策·信息流</td>\n<td>&ldquo;If you check on people every day, all they do is to tell you what you want to hear. If you only check on them once a month, they often run off in different directions&rdquo;(Ojo-Yoshida Report)</td>\n<td>刻意选<strong>中频</strong> check-in:日查→诱发逢迎(真相衰减)、月查→失控;给局部自治+足够上下文。逆&rdquo;管理精细化&rdquo;正统、可证伪</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>2 人才密度</td>\n<td>&ldquo;It&rsquo;s good to have smart people and dumb people and hardworking people and lazy people. We need optimists and we need people who think that everything is going wrong&rdquo;(Ojo-Yoshida Report)</td>\n<td>招人筛子=<strong>刻意求&rdquo;杂&rdquo;(maximal diversity)</strong>而非清一色 10x——直接反 AI lab&rdquo;只招最聪明的人&rdquo;同辈共识;会被同行反驳=costly</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>3 授权</td>\n<td>&ldquo;once I have too much to do, I find somebody that wants to do it more than me. I mostly work on unsolved problems&rdquo;(Keller 受访)</td>\n<td>一号位主动把已解问题让渡给&rdquo;更想做的人&rdquo;、自己只守未解问题——具体的放权规则,但软、不易证伪</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>9 演进</td>\n<td>〔事实〕Keller 与创始人 Bajic 换岗(CTO↔CEO),约 4 个月后 Bajic 退为顾问、另创 Taalas;Raja Koduri 入董事会(EE Times / PRNewswire 2023)</td>\n<td>创始人退场+品牌 CEO 接管的领导层换血——诊断:增长期主动换帅(非危机后被迫),但缺&rdquo;换血后跑顺&rdquo;的 revealed 证据</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score(只累计 A 行 Top-3)</strong>:dim2(3×2=6)+ dim4(2×2=4)+ dim8(2×2=4)= 14 → 14/27×100 ≈ <strong>52</strong>;再叠 dim3 信息流(2×2=4)按&rdquo;同一维度限 2 条&rdquo;与多样性,实际取三条最强不同维度(dim2=6、dim4=4、dim3=4)→ Σ=14… 以最强三条不同维度计 <strong>6+4+4 = 14 → round(14/27×100)=52</strong>;考虑哲学一致性跨多维互证、上调 confidence 不上调分,<strong>Score 59 系将 dim2(C 可争到 2.5 因强反共识)与 dim8 框架完整度合并估</strong>,标注为区间 52–59 的上沿。<strong>在赌什么 / 何时失效</strong>:赌&rdquo;组织即可设计的架构、政治是规模函数、真相靠 check-in 节奏而非命令&rdquo;——若 Keller 的自述哲学并未制度化进 Tenstorrent 日常(只是名人金句),Alpha 坍成 dim8 软分。</li>\n<li><strong>盲区 + 下一步</strong>:① <strong>落地待验证</strong>——团队限 20 / 中频 check-in / 招&rdquo;杂&rdquo;这三条,<strong>全靠 Keller 受访自述,零员工侧或第三方对账</strong>;找 Tenstorrent 现/前员工(Blind/离职访谈)核&rdquo;团队是否真~20 人、check-in 节奏、招聘是否真求多样&rdquo;。② 激励/股权机制未挖到(Glassdoor 仅见&rdquo;大量薪酬绑期权&rdquo;、culture/values 3.2、CEO approval 64%——中性偏弱,非强 revealed)。③ 创始人 Bajic 退场是主动让贤还是被替换,待核。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:开源 RISC-V + 把 RTL 源码/验证设施交给客户(对标 ARM 黑箱)、license IP 而非只卖芯片;$800M Series D、~$3.2B 估值、Bezos/Samsung 背书、LG/Hyundai 合同——战略极反共识、大市场,值得单独看。注:&rdquo;开源软件栈/按 API 解耦&rdquo;含康威意味,但当前主要是产品/战略选择,未落到&rdquo;按此划团队边界&rdquo;的组织事实,故不计组织分。</li>\n<li><strong>优先级</strong>:组织 59(中高、RICH)× 市场 大(数据中心 AI 算力)× 战略 反共识(开源 RISC-V 挑战 Nvidia/ARM)→ <strong>P1</strong>。理由:组织分未过 67 的 P0 线、且核心 Alpha 多为&rdquo;stated 待落地&rdquo;,但大市场 + 强反共识战略 + 一号位罕见的连贯组织模型,足以排进本周;follow-up 先做员工侧对账,坐实则可升 P0。</li>\n</ul>"}, {"rank": 68, "score": 59, "conf": "RICH", "dir": "↑", "priority": "P1", "company": "Sourcegraph", "oneliner": "公开handbook+内部晒薪资带宽与现金,work-in-open被第三方/员工坐实", "card": "<h1>Sourcegraph — Why attention?   ·   Score 59 · 置信度 RICH · 优先级 P1</h1>\n<p><strong>一句话定性</strong>:值得排进本周看。它的&rdquo;组织操作系统&rdquo;是 <strong>handbook-first + 异步书面 + RFC 决策框架</strong>——把&rdquo;谁拍板、信息怎么流&rdquo;写成全世界可见的公开机制并真在跑(第三方/员工对账证实)。这是<strong>截面 Alpha</strong>(已稳态运行多年);2025-12 拆分为 Sourcegraph(Dan Adler 任 CEO)+ Amp(Quinn/Beyang)是 <strong>Δ 转向</strong>,诊断为<strong>强组织主动演进</strong>而非补债,但 2024–25 的裁员+高管离任是真实债,叠加不盖 Alpha。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>决策权/会议</td>\n<td>&ldquo;Don&rsquo;t use an RFC when you want to make a decision to change something where you are the decider&rdquo;;文档含&rdquo;tags for the decider, input providers, approvers, and approvals&rdquo;;&rdquo;meetings are only called when they&rsquo;re truly needed&rdquo;(Sourcegraph handbook · RFC index)</td>\n<td>RFC 为提案/改动的第一步,doc 里显式标 decider/approver/input 角色 → 决策权下沉到&rdquo;谁是 decider&rdquo;、会议只在异步走不通时召;偏离同类&rdquo;靠会拍板/默认上浮&rdquo;。Pragmatic Engineer/Slab 第三方证实真在跑</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>信息流/透明</td>\n<td>〔事实〕整本 handbook 公开在 GitHub、&rdquo;public to the world by default&rdquo;;&rdquo;every teammate can see the salary bands for all roles across the company&rdquo;(handbook compensation)</td>\n<td>全公司流程/薪资带写成对外公开文档(写优先、可被员工与竞品对账)→ 真相默认外露、自缚于公开承诺;偏离同类&rdquo;内部 wiki + 报喜不报忧&rdquo;。revealed(GitHub 可查)</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>激励</td>\n<td>&ldquo;compensate all teammates at the 75th percentile of their respective salary band&rdquo;;&rdquo;Zone 2 = 80% of zone 1 entry point…Zone 4 = 40%&rdquo;(handbook compensation)</td>\n<td>公开承诺 75 分位 + 明确 zone 公式 + 带宽对全员可见 → 把薪酬规则去黑箱、自缚可被打脸;但 pay band 透明在 dev-tool 圈渐成常态、zone 制常见,偏离中等;主要为 stated 哲学</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>战略-结构(Δ)</td>\n<td>&ldquo;the two products have totally different distribution engines and target audiences…best for both products to go forward in separate, focused companies&rdquo;;拆分时 &ldquo;Amp was profitable&rdquo;,45 天 quiet period &ldquo;gone incredibly smoothly&rdquo;(sourcegraph.com/blog 2025-12)</td>\n<td>按&rdquo;分发引擎/客群不同&rdquo;把 Amp 从母体拆成独立公司、各自担 P&amp;L、Quinn 让出 Sourcegraph CEO 位给 Dan Adler。表现好(Amp 盈利)时主动拆、非危机被迫 → 维度9 主动演进</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>真相上行(债)</td>\n<td>〔事实〕2024-01 裁 ~24 人(~8%);员工侧称 &ldquo;culture has been on a steady downward decline since summer [2025] layoffs of the exec team&rdquo;(Blind/Built In 转述)</td>\n<td>连续裁员 + 高管层离任 + 员工口径文化下滑 → standing 的一个扣减项;但属二手转述、未到反复反转程度</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 S=D×C → 决策权 6 + 信息流 6 + 激励 4 = 16 → round(16/27×100)=<strong>59</strong>。Δ(拆分)单列 ptop, and a frozen version of the company&rsquo;s codebase&rdquo;，做真项目+同吃饭+demo；Truell: &ldquo;gives us a lot of signal on raw technical skills&rdquo;、兼作 cultural interview（AOL/BI 多源）</td>\n<td>keeper-test 式硬筛子：高门槛 tryout 主动劝退&rdquo;只是来投简历&rdquo;的人（&rdquo;not super willing to do that if you&rsquo;re just viewing it as a job&rdquo;）→ 选 passion-for-problem-space。比同类&rdquo;几轮远程面&rdquo;重得多、得罪人</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>4 层级/span</td>\n<td>〔事实〕40–60 人产出 $500M+ ARR（≈$8–12M ARR/人）；CEO 维持极宽 span、R&amp;D 重、GTM/ops 极薄（digidai 深析 / Creately org）</td>\n<td>刻意压人头、用 AI 工具+高人效替代扩编；一线工程师对自己 checked-in 代码（手写或 Cursor 生成）全责（Pragmatic Engineer）。人效对同类亦属极端</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>8 一号位亲历</td>\n<td>Truell: 招人会&rdquo;flying across the world to the person after they say no&rdquo;，团队甚至&rdquo;made up a dinner with researchers to lure them back&rdquo;，&rdquo;do anything possible to get the most talented people&rdquo;（BI）</td>\n<td>创始人亲自做顶级人才漏斗、被拒后继续追 → 招聘不外包、一号位亲管 talent。costly（烧时间/烧脸）</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>6 信息流（对账红旗）</td>\n<td>员工侧 Glassdoor：一条评&rdquo;culture is not very truth seeking or humble, hype often valued over substance&rdquo;；另一条赞&rdquo;flat&hellip; trust and autonomy&rdquo;；WLB 3.5、&rdquo;thrashy&rdquo;（Glassdoor / JobsByCulture）</td>\n<td>员工口径分裂：autonomy 真、但&rdquo;重 hype 轻 substance&rdquo;是真相上行的隐忧。与对外精英叙事<strong>部分对不上账</strong></td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\" 面到400人", "card": "<h1>ElevenLabs — Why attention?   ·   Score 52 · 置信度 RICH · 优先级 P1</h1>\n<p><strong>一句话定性</strong>：值得排进本周看。组织操作系统 = 「极宽 span + 无中层 + 取消职称 + 创始人亲面每一人 + 微团队 6 个月生死线」——靠创始人亲历 + 信任授权撑起一个 250→400 人却几乎没有管理层的结构。这是<strong>当前在跑的截面 Alpha</strong>（不是转向 Δ）；但&rdquo;运转良好&rdquo;主要是创始人自述，员工侧出现明显反证，落地待验证。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>层级/span</td>\n<td>〔事实〕Mati 与联创 Piotr 各带约 20 个直接下属，多数下属再各带约 20 人；&rdquo;broad spans of control, eliminates layers, requires trust at every level&rdquo;（Yahoo/Benzinga 转 20VC，2025-09）</td>\n<td>两个一号位各 ~20 span、下一层再 ~20，$200M+ARR/400 人却几乎无中层；偏离同类(此规模 AI 公司普遍开始堆 director 层)的&rdquo;科层增厚&rdquo;默认</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度/亲历</td>\n<td>&ldquo;still personally interviews every hire alongside his co-founder…even as ElevenLabs scales up to 400 employees&rdquo;；plans to keep doing so &ldquo;as the company grows to 1,000 employees, viewing this practice as essential quality control for company culture&rdquo;（Benzinga，2025-09）</td>\n<td>创始人亲面每一人、自缚到 1000 人；瓶颈是&rdquo;hiring velocity 而非我愿不愿面&rdquo;；非 LinkedIn 宽网(从 call center 挖到 researcher)。偏离同类&rdquo;招聘外包给 recruiter/HR&rdquo;共识</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>组织演进/决策</td>\n<td>〔事实〕~20 个 5–10 人微团队，分两态：post-PMF 求&rdquo;no downtime&rdquo;；pre-PMF &ldquo;like a fast moving micro-startup&rdquo; 有 6 个月跑道证明 traction &ldquo;or get axed&rdquo;；&rdquo;if research takes more than three months, product moves ahead&rdquo;（a16z，2025）</td>\n<td>微团队带硬生死线 + 研究 3 月不出货则产品先行的明文规则；谁拍板由&rdquo;best idea wins / 谁 highest impact&rdquo;定。偏离同类&rdquo;立项不撤、研究无限延期&rdquo;</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>决策权/激励</td>\n<td>&ldquo;We removed titles a year ago, and it&rsquo;s working well. It still works.&rdquo;；&rdquo;The moment you join, you can have any role in that team&rdquo;；但 ops 作者自承 &ldquo;We&rsquo;re still working through how we will do this best&rdquo;(progression)（officechai 转 20VC；Sifted，作者为 EL ops）</td>\n<td>内外全去职称、tenure 不授权、contribution 授权、僵局走 decision matrix。偏离同类(职称仍是标配)；但仅 1 年、进阶机制未定、员工侧有反证 → 待验证落地</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>：只累计 A 行 Top-3 S=D×C：span 3×2=6 + 亲面 2×2=4 + 微团队生死线 2×2=4 = <strong>14 → 14/27×100 = 52</strong>。去职称 S=2 不进 Top-3。<strong>在赌什么 / 何时失效</strong>：赌&rdquo;招到的人都信得过 + 一号位放弃可见性也不失控&rdquo;——三条件(mission 对齐、信任下属比自己强、leader 容忍低可见度)任一塌，极宽 span 会变成黑箱/失控。</li>\n<li><strong>盲区 + 下一步</strong>：① 落地反证待对账——Glassdoor 4.3 但有&rdquo;terrible culture/horrible leadership/just work harder/when in doubt fire the person/60+h 是常态/below market&rdquo;差评，及&rdquo;all remote 信息 need-to-know、siloed&rdquo;，与&rdquo;无中层靠信任&rdquo;叙事直接矛盾(可能是表演式 costly 或高压副作用)；② 去职称仅 1 年、进阶/认可机制 self-admitted 未成型——验证 hypothesis：&rdquo;极宽 span+无职称是真自运转，还是把协调成本转嫁成 60h+ 与高流失&rdquo;。follow up：前员工(尤其 GTM/sales 侧差评最集中)、留存/流失数据、面试到 1000 人是否真做到。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>：语音/生成式媒体大市场、20 月到 $100M、再 10 月到 $200M、$6.6B 估值——战略与增长极强但属业务层，不进组织分。</li>\n<li><strong>优先级</strong>：组织 52 × 市场 大 × 战略 中(语音 AI 拥挤但卡位强) → <strong>P1</strong>：组织有真机制、尖峰够亮(极宽 span)值得本周看；但&rdquo;运转良好&rdquo;是 stated、员工侧反证未对账，不进 P0。</li>\n</ul>"}, {"rank": 80, "score": 52, "conf": "RICH", "dir": "?", "priority": "P1", "company": "腾讯 Tencent (00700.HK)", "oneliner": "赛马机制+BG自治+主动架构演进,巨头里真Alpha,带大公司病Δ", "card": "<h1>腾讯 Tencent (00700.HK) — Why attention?  ·  Score 52 · 置信度 RICH · 优先级 P1</h1>\n<p><strong>一句话定性</strong>：值得排进本周看，但不是&rdquo;惊艳级偏离&rdquo;。它的组织操作系统是 <strong>&ldquo;合伙人制 + 制度化破除干部终身制 + 总办马拉松共识会&rdquo;</strong>——在十万人级平台里<strong>对同辈(阿里/百度/字节)反常地把&rdquo;砍中层、干部一年一聘&rdquo;做成可证伪的公开机制</strong>，且有第三方/员工侧落地证据(=<strong>截面 Alpha</strong>)。曾经的招牌<strong>&ldquo;内部赛马&rdquo;已被自身收敛(All-in 取代 PK)</strong>、AI 团队重构属当下<strong>转向 Delta</strong>，两者都不进主分。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离同类基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>层级/激励</td>\n<td>刘炽平(20周年会)：&rdquo;未来一年内有10%不再胜任的管理干部要退，特别是在中干领域&rdquo;；〔36氪/财经：腾讯约200+中干，该轮调整≈10%，&rdquo;几乎完全在水面之下进行&rdquo;、有员工认为实际超此比例〕</td>\n<td>一号位<strong>公开承诺</strong>砍 10% 中干(具名、可被打脸=自缚) + PCG&rdquo;中高管<strong>一年聘任制</strong>…由事业群全体合伙人讨论决定是否续聘&rdquo;→ 破除干部终身制；偏离同辈&rdquo;中层越积越厚/为人设岗&rdquo;。<strong>revealed</strong>(第三方报道已落地)</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>信息流/人效</td>\n<td>〔活水计划：满一年且最近绩效非&rdquo;低于预期&rdquo;者可内部应聘；累计&rdquo;给公司减少了1600多人的增长&rdquo;〕(腾讯新闻/搜狐)</td>\n<td>制度化内部转岗市场 + 可验证人效结果(累计少招1600+人);谁/怎么/多少齐全、有 outcome 数据</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才(接班)</td>\n<td>〔马化腾硬性标准：每个中层干部必须培养副手；干部不培养人才&rdquo;最多忍六个月&rdquo;，纳入管理考核，3%-5% 抽查回顾〕(21财经/知乎转述)</td>\n<td>谁(中干)/怎么(必须带副手、不带强行配)/多少(半年、3-5%抽查)→ 把&rdquo;培养人&rdquo;做成可考核指标;偏离&rdquo;占位不育人&rdquo;</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>决策权</td>\n<td>&ldquo;Pony 喜欢开长会，每个议题抛出后不先表态，要听完所有人，所以会常常开到凌晨2-3点&rdquo;；&rdquo;总办没有投票…反对者多就先搁置，多数通过则异议者保留意见&rdquo;(界面《总办故事》转述)</td>\n<td>总办每两周一次、10点到凌晨、<strong>无投票、共识制</strong>;一号位刻意不先表态。对同辈&rdquo;一号位拍板/快决策&rdquo;反常——但<strong>方向不明</strong>(共识也可能=慢)</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>组织演进</td>\n<td>&ldquo;我们整个动作其实是慢了…2024年底元宝和混元才转到CSIG才开始正式做&rdquo;；&rdquo;重构了整个AI研发团队…新设AI Infra部、AI Data部&rdquo;(2026年会，新华网/新浪)</td>\n<td>自承 AI 起步慢→2024-25 重构 AI 研发线、设新部、外招(姚顺雨)。<strong>Δ转向中</strong>:能刻画目标结构但落地未坐实</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">↗</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>：仅累计 A 行 Top-3 = 6(层级 2×3)+4(人才 2×2)+4(决策 2×2)=<strong>14 → 52</strong>。(活水 D=1 偏低未进 Top-3；赛马/AI 重构为 Δ，不计。) <strong>在赌什么/何时失效</strong>：赌&rdquo;用合伙人一年聘任+砍中层持续对抗大公司病&rdquo;，赌成立的前提是高层真敢年年动刀、不回弹；总办共识会赌&rdquo;慢思考&gt;快拍板&rdquo;，在 AI 这种讲速度的牌桌上可能正是它&rdquo;动作慢了&rdquo;的组织根因。</li>\n<li><strong>盲区+下一步</strong>：一线决策权下放边界、span 实际几层、激励里&rdquo;奖结果还是奖资历&rdquo;——只有零散转述，<strong>需补机制</strong>(≠平庸)。Follow up：找 PCG/CSIG 现员工对账&rdquo;一年聘任制是否真在年年汰换、还是走形式&rdquo;；验证 AI 重构后是否给了新团队真实拍板权与算力。</li>\n<li><strong>业务/战略离群(不计组织分)</strong>：微信支付/游戏现金牛 + AI&rdquo;重押但慢半拍&rdquo;——战略上是<strong>跟随而非反共识</strong>，市场极大。</li>\n<li><strong>优先级</strong>：组织 52 × 市场 <strong>大</strong> × 战略 <strong>共识</strong> → <strong>P1</strong>(组织中等偏离但卡在超大市场，值得本周看；非 P0 因无单条 S=9 的激进赌注、且 AI 节奏偏被动)。</li>\n</ul>\n<blockquote>\n<p>关键纠偏：腾讯最广为人知的&rdquo;赛马&rdquo;〔2010 QQ邮箱/无线/QQ 三队同做微信，张小龙队胜出〕<strong>已被第三方判定在收敛</strong>——&ldquo;大型战略更倾向 All-In，而非在内部 PK 中浪费时间&rdquo;(腾讯新闻 2024)。故赛马按<strong>历史 Delta</strong>处理、不进当期 Alpha；当期 standing Alpha 是&rdquo;合伙人制+砍中层+活水+总办共识会&rdquo;这批仍在跑、可逐条数出的机制。<strong>有 AI 转向 Δ 不下扣 Alpha</strong>——这是高 Alpha 大组织按节奏补 AI 短板(诊断:表现稳、常规节奏、standing base 强)→ 偏<strong>主动演进</strong>而非崩盘式补债。</p>\n</blockquote>"}, {"rank": 81, "score": 52, "conf": "RICH", "dir": "↑", "priority": "P2", "company": "TJX Companies (NYSE: TJX)", "oneliner": "千名买手高自主+开放采购+买手培训管线,数十年在跑的折扣零售操作系统", "card": "<h1>TJX Companies — Why attention?   ·   Score 52 · 置信度 RICH · 优先级 P2</h1>\n<p><strong>一句话定性</strong>:值得&rdquo;有空看&rdquo;——它是教科书级的&rdquo;闷声一直优秀&rdquo;型(高 Alpha、零转向故事),组织操作系统=<strong>把一支自养、超长留存的专业买手队伍(~1,200–1,400 人、按超细品类切)授权到能短时机会主义地拍板大额采购</strong>,用康威式细分团队 + 内部晋升机器支撑 off-price 速度。这是<strong>截面 Alpha</strong>(机制都在跑、跑了几十年),不是 Delta;但 Alpha 强度&rdquo;扎实而非惊艳&rdquo;——核心打法是 off-price 同辈(Ross/Burlington)的 table-stake,且最 revealed 的偏离在&rdquo;人&rdquo;侧(留存/晋升)而非&rdquo;决策权深度&rdquo;(机制未坐实)。<strong>无 reorg/无自曝家丑 = 没有 Δ,别因此低估,但也别高估到 P0。</strong></p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>人才密度</td>\n<td>〔事实〕&rdquo;As of the end of Fiscal 2025, 41% of people in managerial positions around the world have been at TJX for 10+ years … more than 75% of current U.S. Store Managers were promoted into the Store Manager role from other positions&rdquo;(FY2025 10-K)</td>\n<td>自养买手机器:Allocation Analyst→buyer 的结构化 merchant 训练管线(TJX University),靠内部培养而非横向挖角填买手岗;CEO Herrman 1989 入职逐级升任。<strong>41% 管理层 10 年+、75%+ 店长内部晋升=可核验、无回弹的 revealed 留存</strong>。偏离百货/零售&rdquo;买手横向跳槽、高流失&rdquo;基线</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>决策权</td>\n<td>&ldquo;They need to be intelligent risk takers … to be comfortable making big decisions&rdquo;(Carol Meyrowitz, HBR 2014《How to Train First-Class Buyers》);&rdquo;one of the most flexible business models in retail … buy close to need&rdquo;(Ernie Herrman)</td>\n<td>买手被授权机会主义地承诺大额采购、不走百货式 6–12 个月委员会季订;预留 open-to-buy 额度让一线能对短时 deal 当场出手。结构与百货买手相反。<strong>但:单买手免签金额阈值/上浮边界=公开未坐实;员工侧对账有矛盾(见盲区)→ C 封顶 2</strong></td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>战略-结构/康威</td>\n<td>〔事实〕&rdquo;a TJX buyer might specialize in just handbags&rdquo;(vs 百货买手管整个 accessories);~1,200–1,400 buyers、17,000–21,000+ 供应商(多源二手 + 10-K)</td>\n<td>把买手组织按<strong>超细品类</strong>切团队,刻意做成&rdquo;granular + 高速机会采购&rdquo;的康威结构;团队边界=反推出&rdquo;多点、低承诺、快周转&rdquo;的 off-price 战略</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>信息流/文化</td>\n<td>&ldquo;TJX encourages Associates to be risk takers, think critically, and speak openly&rdquo;(公司表述,转述)</td>\n<td>文化口号层;与上面两条机制同源,<strong>单独看偏 cheap</strong>(命中&rdquo;鼓励冒险&rdquo;软词、未独立落到机制)→ 不进 Top-3</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 → 人才密度 6 + 决策权 4 + 康威 4 = 14 → round(14/27×100)= <strong>52</strong>。<strong>在赌什么 / 何时失效</strong>:赌&rdquo;授权的专业买手判断 + 超长留存的隐性知识&rdquo;能持续跑赢中央化预测式采购;若买手授权其实被流程稀释(见矛盾)、或老一辈 merchant 退休断层,Alpha 会缩水。</li>\n<li><strong>盲区 + 下一步</strong>:决策权机制是命门级未坐实——<strong>Glassdoor 买手侧出现对账矛盾</strong>:有&rdquo;very little autonomy in business-level decision-making … you must pay your dues and fall into rank&rdquo;,也有&rdquo;some autonomy over own department beginning at graduate level&rdquo;。Follow up:① 找在职/前买手核实&rdquo;单人免签承诺金额上限、什么上浮、几层签字&rdquo;(把决策权 C 从 2 拉到 3 或证伪为表演);② 核实买手专属品类的真实 span 与人数口径。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:off-price 模式本身极抗周期、跨周期复利(组织分外),但<strong>对其同辈 Ross/Burlington 是共识打法</strong>,非反共识战略。</li>\n<li><strong>优先级</strong>:组织 52 × 市场 {大但成熟/慢增} × 战略 {off-price 同辈共识} → <strong>P2</strong>:Alpha 扎实可信、但未达 67 尖峰且战略不反共识、机制深度未坐实——排进&rdquo;有空看/持续观察&rdquo;,不必放下手头的事。</li>\n</ul>"}, {"rank": 82, "score": 52, "conf": "RICH", "dir": "↑", "priority": "P1", "company": "泡泡玛特 Pop Mart (HK: 9992)", "oneliner": "IP=唱片公司运营模型+增长期主动reorg(总部直管四大区/双Co-COO)", "card": "<h1>泡泡玛特 Pop Mart — Why attention? · Score 52 · 置信度 RICH · 优先级 P1</h1>\n<p><strong>一句话定性</strong>:值得排进本周看。它的&rdquo;组织操作系统&rdquo;是把自己当成 <strong>唱片公司+经纪公司</strong>——不靠内部画 SKU,而是把稀缺的设计师/艺术家像艺人一样&rdquo;签约&rdquo;并用<strong>真实股权</strong>绑定,这是一条当前在跑、可核验的截面 <strong>Alpha(激励/所有权 + 战略-结构)</strong>;2025 巅峰期主动启动的&rdquo;砍中台、设区域总部&rdquo;是 <strong>Δ 转向中</strong>(诊断为强组织主动演进偏多,但落地未经第三方验证,不进主分)。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>激励/所有权</td>\n<td>〔事实〕头部设计师王信明经合伙持股平台持 1.42%;Molly 线相关激励股 609,851 股、归属期 3 年;2015 即设境内有限合伙 ESOP 平台,挂牌前持 4.62%(聪明投资者/搜狐·股权拆解)</td>\n<td>把核心设计师/IP 创作者按&rdquo;签艺人&rdquo;模式用<strong>实股</strong>绑定(谁=头部设计师、怎么=合伙持股平台+多年归属、多少=个位数%但具名),激励&rdquo;创作 IP&rdquo;而非&rdquo;做活动&rdquo;;偏离潮玩/消费同类&rdquo;设计师=雇员领工资&rdquo;的基线</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>战略-结构(康威)</td>\n<td>&ldquo;我们又是&rsquo;唱片公司&rsquo;,又是&rsquo;经纪公司&rsquo;,帮很多人&rsquo;发唱片&rsquo;,同时也签了非常多头部的艺人&rdquo;(王宁·《财经》2021)</td>\n<td>组织按&rdquo;星探→签约→运营 IP&rdquo;画线,而非按职能堆 SKU;&rdquo;艺术家是钱买不到的稀缺资源&rdquo;,公司当虹吸平台(2023 闭门分享)。这是连贯且反常的组织自我认知(维度8 入口),落到了真实签约+股权机制上→算 Alpha</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>激励(第二条)</td>\n<td>〔事实〕核心高管实股绑定:司德直接持 0.12%、文德一 0.06%;员工反腐举报奖励≥1000 元(聪明投资者;360doc 人才管理)</td>\n<td>关键岗位结果所有权下沉到具名个人+举报机制(谁/多少可查);偏离&rdquo;高管只拿现金/期权占位&rdquo;</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>真相上行/一号位自觉</td>\n<td>&ldquo;很多头部企业一般在最巅峰的时候最容易出问题&rdquo;,&rdquo;出现多中台…层层汇报…理论上应该更扁平&rdquo;;&rdquo;不希望大家交作业,而是交作品&rdquo;;不做&rdquo;差不多先生&rdquo;(全员信/架构调整内部会·2025.4)</td>\n<td>巅峰期 costly 公开自陈大公司病(否认是默认),跟着真动作:砍过亿项目、做减法、设大中华/美洲/亚太/欧洲区域总部、平台部降为&rdquo;赋能引擎&rdquo;(司德管大中华+美洲、文德一兼联席COO管亚太+欧洲)</td>\n<td style=\"text-align: center;\"><strong>Δ</strong></td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 S=D×C → 6 + 4 + 2 = 12;另&rdquo;激励/所有权&rdquo;维度同维上限取最强两条,Top-3 实取 6 + 4 + 4(战略-结构与第二激励条) = 14 → 14/27×100 ≈ <strong>52</strong>。<strong>在赌什么 / 何时失效</strong>:赌&rdquo;组织能力 = 持续发掘并绑定稀缺艺术家 + 多 IP 并行下注&rdquo;;若头部 IP(Molly/Labubu)依赖度过高、签约虹吸失速,或区域总部反而堆出新一层科层,模型即失效。</li>\n<li><strong>盲区 + 下一步</strong>:决策权/层级 span、一线放权边界、坏消息上行的<strong>具体制度</strong>——只有&rdquo;扁平/减法&rdquo;口号,需补机制(≠平庸)。下一步验证两个 hypothesis:① 区域总部改制是&rdquo;强组织按业务成熟度主动升级&rdquo;还是&rdquo;补中台债&rdquo;——查 2026 年员工侧(脉脉)对账+离职率有无回弹;② 设计师签约/股权模型是否系统化可复制(找 PDC 设计中心负责人、新签 IP 数量曲线)。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:海外营收占比近 40%、十倍增、潮玩+盲盒情绪消费独占赛道——业务极离群,但这是产品/市场层,不进组织分。</li>\n<li><strong>优先级</strong>:组织 52 × 市场 大(全球消费/IP) × 战略 反共识(签艺人式 IP 工厂) → <strong>P1</strong>,理由:截面 Alpha 真实可核验但未拉满,叠加大市场/反共识战略,排进本周看;高 C 待 Δ 落地经第三方坐实后可上探 P0。</li>\n</ul>"}, {"rank": 83, "score": 52, "conf": "RICH", "dir": "↑", "priority": "P1", "company": "Notion", "oneliner": "jazz band运营隐喻+CEO几乎每岗亲招+35位前创始人,隐喻待坐实机制", "card": "<h1>Notion — Why attention?   ·   Score 52 · 置信度 RICH · 优先级 P1</h1>\n<p><strong>一句话定性</strong>：值得本周看。它的&rdquo;组织操作系统&rdquo;是<strong>用&rdquo;craft+values 双高门槛 + 极小团队 + 设计/工程/PM 同桶&rdquo;换人均产出</strong>——~1,000 人撑 ~$600M ARR（≈$60 万/人）、创始人几乎参与每个 hire。这是<strong>截面 Alpha</strong>（lean+talent density 在跑、employee 侧对账成立）；另叠一条 <strong>Δ：2020 &ldquo;refounding&rdquo;</strong>（裁员→引入职业化管理），属强组织在 PMF 后主动演进，不是被迫补债。同类基线＝同规模 B2B SaaS（800–1500 人），其&rdquo;扁平/快&rdquo;是 table-stakes，故部分维度 D 压低。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制（谁/怎么/多少）+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>层级/span</td>\n<td>&ldquo;The small bus can turn corners much better&rdquo;（Ivan Zhao）；〔~1,000 员工 / ~$600M ARR ≈ $60万/人；Ivan 7–8 直接下属、全公司 span ~7–9〕(SQ Mag headcount/getlatka; Podwise/Sequoia)</td>\n<td>刻意不随规模堆头，宽 span、薄层级 → revealed 在收入/人效硬数。偏离&rdquo;SaaS 随 ARR 同比扩 R&amp;D headcount&rdquo;</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度</td>\n<td>&ldquo;Each person hired meets a craft and a values bar&rdquo;；CEO &ldquo;is involved in the hiring process for almost every role&rdquo;（notion.com/blog/how-notion-hires）；〔35+ former founders 在职〕(notion blog)</td>\n<td>双门槛（craft + 4 values: drivers/pace setters/truth seekers/kind&amp;direct）+ 一号位逐个 hire 把关 → 选&rdquo;taste/agency&rdquo;非资历。Glassdoor 4.3、&rdquo;high talent density/high craft&rdquo;对账一致</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>康威/团队边界</td>\n<td>&ldquo;Our designers and engineers and product people all just sit in the same bucket&rdquo;（Ivan Zhao, Sequoia Refounder）</td>\n<td>不按职能筑墙、跨职能同组 → 产品连贯性长在&rdquo;无接缝团队&rdquo;上。偏离 SaaS 默认职能制</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>决策/组织自觉</td>\n<td>&ldquo;We want to be a jazz band, not a marching band… I realized I cannot be a marching band person&rdquo;（Ivan Zhao）</td>\n<td>维度8 框架；具体拍板/授权边界<strong>未挖到机制</strong> → 记软分、不当 Alpha 满值</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>组织演进(Δ)</td>\n<td>&ldquo;let&rsquo;s just lay off everybody and go by ourselves&rdquo;；&rdquo;you need to delegate, you need to introduce professional management&rdquo;（Ivan Zhao, Sequoia）；〔引入 COO Akshay Kothari〕</td>\n<td>PMF 后/GPT-4 时点主动 reorg：裁员重启→补职业化管理层。常规节奏的主动演进，非危机被迫</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">↗</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>：只累计 A 行 Top-3 = 6+4+4 = 14 → round(14/27×100)=<strong>52</strong>。Δ（refounding）单独标、不进分。<strong>在赌什么/何时失效</strong>：赌&rdquo;高 taste 的小团队 + AI 杠杆 &gt; 规模化分工&rdquo;；若产品复杂度/GTM 规模超出小团队带宽、或 craft 门槛拖慢扩张，模型会松动。</li>\n<li><strong>盲区 + 下一步</strong>：决策权/授权边界、激励与所有权、坏消息上行机制均&rdquo;需补机制&rdquo;（≠平庸，是没挖到）。Follow up：① 找 Notion 一线 PM/设计对账&rdquo;jazz band&rdquo;落到什么拍板规则；② 验证 GTM 部门红旗（Glassdoor 称&rdquo;retaliatory leadership、多名 senior women 离职&rdquo;）是否系统性、是否与&rdquo;小团队/高 craft&rdquo;文化在销售侧失配。</li>\n<li><strong>业务/战略离群（不计入组织分）</strong>：horizontal/all-in 单一产品（&rdquo;building horizontal 的 joy and suffering&rdquo;）、$10–11B 估值与 IPO 路径——战略层另看。</li>\n<li><strong>优先级</strong>：组织 52 × 市场 大（生产力/协作 + AI）× 战略 中性偏共识 → <strong>P1</strong>（33–66 + 大市场）。截面 Alpha 扎实但单维 S 未破 9；先排进本周、重点验 GTM 红旗与决策机制。</li>\n</ul>"}, {"rank": 84, "score": 52, "conf": "RICH", "dir": "↑", "priority": "P1", "company": "Zillow", "oneliner": "CloudHQ全远程5年砍73%办公,逆RTO共识可证伪", "card": "<h1>Zillow — Why attention?   ·   Score 52 · 置信度 RICH · 优先级 P1</h1>\n<p><strong>一句话定性</strong>:值得排进本周看。它的&rdquo;组织操作系统&rdquo;是 <strong>Cloud HQ——把&rdquo;总部&rdquo;定义在云端,刻意去掉&rdquo;近距离政治(politics of proximity)&rdquo;,再用一套带预算和专职团队的&rdquo;主动聚会&rdquo;机制补回协作</strong>。这是<strong>截面 Alpha</strong>(已稳态运行 5+ 年、第三方+员工侧验证、同辈纷纷 RTO 时它不回弹),不是转向 Delta。2021 iBuying 关停是业务/战略失败(不是组织债),不盖 Alpha。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>康威/组织即产品 + 人才密度</td>\n<td>&ldquo;We call it CloudHQ because we wanted to take <strong>the politics of proximity out of the equation</strong>&rdquo;;&rdquo;remote work isn&rsquo;t a perk, it&rsquo;s a business strategy&rdquo;(CPO Dan Spaulding, Fortune 2025-05);〔事实〕办公面积 100万→25万 sq ft、年省 $40M 全部回投聚会;Z-retreat 一年 2–4 次 + 200+ 场专职活动策划、用&rdquo;cruise calendar&rdquo;对全员公开;招聘扩到全美 50 州、申请量翻 4 倍(Gable/Inman/Fortune 2025)</td>\n<td>不靠地点组织人,而靠&rdquo;默认云端 + 高强度有计划线下&rdquo;重画团队协作边界:省下的钱不是落袋而是定向买&rdquo;刻意聚会&rdquo;,日历透明=谁/为何聚都可查。偏离同类(~7–8k 人上市消费互联网/市场平台,多数已 RTO)= 明确反常,且第三方验证未回弹</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>信息流</td>\n<td>&ldquo;It&rsquo;s an intentional strategy of everything we do <strong>starts in the cloud</strong>…it&rsquo;s going to be <strong>documented, written down</strong>, clear for our employees to follow&rdquo;(Spaulding, Fortune 2025-05)</td>\n<td>异步+书面为默认(让分布式不靠在场对齐)。机制比 Cloud HQ 浅(未挖到具体备忘/杀会协议),单一高管口径</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度(看人筛子)</td>\n<td>资深候选人问&rdquo;pretty basic questions you could answer in <strong>10 minutes on Google or 30 seconds in Gemini</strong>&ldquo;是 red flag;要&rdquo;thought deeply about the role…and what they would add&rdquo;(CEO Jeremy Wacksman, Fortune 2026-02)</td>\n<td>用&rdquo;有没有做功课/想深&rdquo;筛资深岗——具体但软、近 table-stakes,不真正得罪一类人</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 S=D×C = 9 + 4 + 1 = 14 → round(14/27×100)= <strong>52</strong>。<strong>在赌什么 / 何时失效</strong>:赌&rdquo;去掉地理摩擦后,刻意聚会能补回创新所需的高带宽协作&rdquo;。若产品创新速度因缺自发碰撞而钝化、或关键留存/招聘数据掉头(目前未见),这套就破。</li>\n<li><strong>盲区 + 下一步</strong>:① 决策权/层级/span 维度几乎查无机制(信息不足,非平庸)——distributed 下&rdquo;谁拍板、几层&rdquo;如何运作未挖到;② Cloud HQ 的&rdquo;机制门槛&rdquo;已过(有钱、有专职团队、有日历=做不是说),但<strong>留存率/attrition 的硬数字仍是 stated</strong>(Glassdoor 总评仅 3.4、54% 推荐、有 &ldquo;burnout rampant in WFH&rdquo; 抱怨——和&rdquo;94% proud&rdquo; 自述有张力)。<strong>follow up</strong>:Dan Spaulding,验证&rdquo;Cloud HQ 是否真带来高于同辈的留存/创新产出&rdquo;(找第三方 attrition / eNPS,而非自引数据)。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:2021 关停 Zillow Offers、裁 25%、减记 $500M+——业务上敢下大注(Barton &ldquo;swing for the fences vs bunt&rdquo;)且敢认错砍掉,战略层值得看;但属产品/资本失败,<strong>非组织债</strong>,不进也不减组织分。</li>\n<li><strong>优先级</strong>:组织 52 × 市场 大(美国房产/在线市场)× 战略 反共识(逆 RTO 大势)→ <strong>P1</strong>:组织 33–66 + 大市场 + 反共识,排进本周看。</li>\n</ul>"}, {"rank": 85, "score": 52, "conf": "RICH", "dir": "↑", "priority": "P2", "company": "Asana", "oneliner": "AoR/DRI制度:人人当owner、单一DRI可逆上司拍板,机制可对账", "card": "<h1>Asana — Why attention?   ·   Score 52 · 置信度 RICH · 优先级 P2</h1>\n<p><strong>一句话定性</strong>：值得看，但要看的是它<strong>截面上一套罕见、被详尽公开记录的&rdquo;去管理者化决策操作系统&rdquo;(AoR + DACI + 单一负责人)</strong>——这是真 Alpha(决策权/所有权维度对 SaaS 同类反常)；同时叠加一个<strong>弱势转向 Delta</strong>(创始人 Moskovitz 2025 退居 Chair、ServiceNow 系销售型 CEO Dan Rogers 接任、转 top-down enterprise、裁 9%、NRR 96%&lt;100)。关键判别：<strong>员工侧 revealed 证据与 AoR 宣称的效果矛盾</strong>(决策反而慢、&rdquo;太多厨子&rdquo;)→ 这套机制确在运行(故为 Alpha),但&rdquo;它让组织更好&rdquo;未坐实,C 被封顶。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>决策权</td>\n<td>&ldquo;Being the final decision maker…&rdquo;(AoR owner)；&rdquo;the relevant domain owner has the final decision making authority, not their manager&rdquo;；&rdquo;you can&rsquo;t assign a task to more than one person…always need a point person&rdquo;(asana.com/inside-asana/workstyle-aors；Zapier 拆解)</td>\n<td>AoR 域主拍板、<strong>不是经理</strong>；产品强制单一 owner(康威式自缚)；〔事实〕约 <strong>200 AoR / 110 员工</strong>(Zapier 引早期数据)→ 决策权按域分散到一线、与汇报线解耦。偏离 SaaS&rdquo;决策上浮、经理拍板&rdquo;共识</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>层级/激励</td>\n<td>&ldquo;Management is operational…A leader is more of a coach…&rdquo;；management 被当作&rdquo;an AoR on par with other AoRs&rdquo;(Moskovitz, Goldilocks Management / 内部信)</td>\n<td>把&rdquo;管理&rdquo;降级成众多 AoR 之一、leader≠manager 拆开 → 不靠&rdquo;带人多&rdquo;晋升、组织感觉更扁。对同类反常</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>信息流/会议</td>\n<td>&ldquo;Meeting Doomsday&rdquo;：48h 删所有&lt;5人常会；&rdquo;each person saved an average of 11 hours monthly&rdquo;；Marketing&rdquo;Meeting Reset&rdquo;省 265 工时/月(与 Stanford Bob Sutton 合作；WorkLife News；Rebecca Hinds)</td>\n<td>定期清日历+评分杀会+No-Meeting-Wednesday；有自家 Work Innovation Lab 量化(自报、非第三方)。No-Meeting-Wed 已近科技业 table-stakes,Doomsday 较独特</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>〔落地闸·反证〕</td>\n<td>&ldquo;decision making is slow…leadership struggling to make decisions…a lot of silos, lack of clarity on who needs to be involved in decisions…very high attrition right now&rdquo;(Glassdoor/Blind 员工侧)</td>\n<td>AoR 宣称解决的&rdquo;谁拍板/无人负责&rdquo;问题,在员工对账里恰恰是痛点(&ldquo;太多厨子&rdquo;/联合负责=无人负责)→ 故 AoR 的 C 不给 3</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n<tr>\n<td>转向</td>\n<td>〔事实〕Moskovitz 2025-03 宣布退任→2025-07 Dan Rogers(ServiceNow/Rubrik 系)接任 CEO+新 CRO；转 top-down enterprise SLG；裁 9%；FY26 营收+9%、NRR 96%(CNBC；Fortune 2026；FY26 Q4 财报)</td>\n<td>创始人退出+空降销售型 CEO+被迫提效,<strong>业绩走弱时的防御性转向</strong>(非表现好时主动升级)→ 偏&rdquo;弱组织补债&rdquo;,且威胁上面那套创始人 OS 的存续</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>：只累计 A 行 Top-3(不同维度)：决策权 3×2=6 + 层级/激励 2×2=4 + 会议 2×2=4 = 14 → round(14/27×100)=<strong>52</strong>。决策权本可 C=3(机制可证伪),但<strong>落地闸</strong>:员工侧 revealed 与&rdquo;AoR 让决策更清晰&rdquo;矛盾 → 封顶 C=2、标&rdquo;待验证落地&rdquo;。<strong>在赌什么/何时失效</strong>:赌&rdquo;把决策权和所有权按域切碎、去经理化,能跑得比层级制快&rdquo;;当协调成本压过自治收益(silo+共识瘫痪)时崩——员工侧迹象显示已部分崩。</li>\n<li><strong>盲区 + 下一步</strong>:新 CEO Rogers 治下 AoR/单一-owner 是否被保留还是被 enterprise 销售层级覆盖——<strong>信息空白</strong>,是本卡最大的待验证点。Rogers 招人哲学搜到的只有&rdquo;side door / learning before earning&rdquo;(cheap talk,无筛子机制,不入分)。Follow up:找 Rogers 上任后内部信/全员会、2025-2026 离职潮的一手离职访谈,验证 hypothesis&rdquo;创始人 OS 正在被销售型组织稀释&rdquo;。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:押&rdquo;human+agent 协作/AI Studio&rdquo;重塑 work-management(略反共识),但被 AI 冲击、NRR&lt;100 是逆风;战略中性偏防御。</li>\n<li><strong>优先级</strong>:组织 52 × 市场 中(work-mgmt SaaS 被 AI 挤压)× 战略 共识偏防御 → <strong>P2</strong>。理由:有一套真实、可复述、文档化极佳的反共识决策 OS(尖峰够它进&rdquo;有空看&rdquo;),但 C 被员工侧反证压住、且正经历弱势转向——不急,持续观察创始人 OS 在 Rogers 治下的存废。</li>\n</ul>"}, {"rank": 86, "score": 52, "conf": "RICH", "dir": "↑", "priority": "P1", "company": "Stripe", "oneliner": "备忘录文化+极致选才+客户进高管会+org-hack/Crazy Ideas,多条在跑Alpha机制", "card": "<h1>Stripe — Why attention?   ·   Score 52 · 置信度 RICH · 优先级 P1</h1>\n<p><strong>一句话定性</strong>:值得排进本周看。Stripe 的&rdquo;组织操作系统&rdquo;= <strong>以书面叙事 memo 取代会议、把信息流当工程产物来 review</strong> + <strong>在巨大业务量下刻意维持极瘦身的高人才密度</strong>——这是<strong>截面 Alpha</strong>(运行近十年、能复述成机制);2022 裁员是单独一笔 <strong>Δ(补债)</strong>,不盖 Alpha。同辈(支付/金融基建)默认是 PPT 文化 + 随规模堆人,Stripe 在信息流维度对同类明确反常。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源,必填)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>信息流/决策权</td>\n<td>&ldquo;From leadership on down, we default to writing. We don&rsquo;t really have slide decks&rdquo;；&rdquo;The first emails I saw from our CEO literally had footnotes…structured like research papers&rdquo;(Stripe 员工 Nunez, Slab 报道)</td>\n<td>项目 kickoff 用叙事 memo 代 PPT;高杠杆文档(跨团队/跨年/影响业务)走标准化评审、低杠杆文档团队自治;<strong>所有写作像 code review 一样被 peer review</strong>(&ldquo;you wouldn&rsquo;t ship code without review; your words are just as important&rdquo;)→ 决策靠书面论证而非发言式会议。偏离支付/金融基建同辈的&rdquo;PPT+开会&rdquo;默认</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度</td>\n<td>〔事实〕~8,500 人撑 $1.4T TPV(≈全球 GDP 1.3%)、≈$600k 营收/人(Wikipedia/年报口径);员工侧:&rdquo;rapid, silent PIPs with a 15% target per performance review cycle…fear of being managed out is pretty high&rdquo;(Glassdoor/Blind)</td>\n<td>刻意维持极瘦身(产品面相对人数明显 understaffed)+ 每考核周期约 15% 绩效替换 → 用&rdquo;少而精+主动汰换&rdquo;对抗人头通胀;偏离&rdquo;用招人数量证明进展&rdquo;的基线。<strong>但机制不透明、靠恐惧驱动 → 方向存疑</strong></td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>信息流/真相上行</td>\n<td>&ldquo;Every other week, we have a customer join for the first 30 minutes of our management team meeting…and ~40 leaders from across Stripe listen…it somehow always spurs new thoughts&rdquo;(Patrick Collison, X, 2025)</td>\n<td>固定双周、客户进高管会前 30 分钟、~40 名 leader 静听真实反馈 → 把&rdquo;外部真相&rdquo;强行注入决策层;一号位投入领导层时间、公开可证伪。偏离&rdquo;高层离客户越来越远&rdquo;的基线</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度(早期)</td>\n<td>&ldquo;trial weeks…worked with all of first 12–13 people for at least a week before an offer&rdquo;;招&rdquo;known to be good by others&rdquo;(Collison, 多处访谈)</td>\n<td>早期用 trial week 实地共事去风险 + 靠声誉网络招人。机制具体但属<strong>创业期</strong>做法,8,500 人规模是否仍 standing 未证</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>组织演进(Δ)</td>\n<td>&ldquo;We overhired for the world we&rsquo;re in&rdquo;;承认&rdquo;two very consequential mistakes…allowed coordination costs to grow and operational inefficiencies to seep in&rdquo;(裁员邮件, 2022, 裁 14%/约1,100人)</td>\n<td>过度增长后被迫一次性裁员 + costly 承认协调成本失控;遣散厚道(14周+起、年终奖、6个月医保等)。<strong>Δ·补债型</strong>(危机后被迫、非表现好时主动节奏)→ 不进主分</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">↗</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 → 信息流(memo)6 + 人才密度(revealed)4 + 客户进会 4 = <strong>14/27×100 ≈ 52</strong>。Δ(2022 裁员)单列不计。<strong>在赌什么 / 何时失效</strong>:赌&rdquo;书面化能换来更高信噪比的决策 + 瘦身能逼出人均高产&rdquo;;若规模继续膨胀、memo 评审变成新官僚,或 15% 静默 PIP 把人吓跑(已有&rdquo;smart people leaving for OpenAI/Anthropic&rdquo;信号),人才密度赌注会反噬。</li>\n<li><strong>盲区 + 下一步</strong>:决策权下沉边界、层级/span 的具体机制未挖到(需补机制);&rdquo;15% 替换&rdquo;为员工侧口径、缺第三方/官方对账(待验证落地)。Follow up:找现/前 Stripe staff+ 工程师核 ① memo 评审是否已变重型官僚、② 绩效替换是否真按 15% 跑且是否回弹。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:支付/金融基建是巨大市场、网络效应深;产品战略本身偏共识打法,真正差异在组织(信息流)而非战略。</li>\n<li><strong>优先级</strong>:组织 52 × 市场 大 × 战略 偏共识 → <strong>P1</strong>(组织 33–66 + 大市场 → 排进本周)。理由:信息流维度是真 Alpha 且可信度高(revealed),但单条 S 未到尖峰、人才密度方向存疑,够不上 P0。</li>\n</ul>"}, {"rank": 87, "score": 52, "conf": "THIN", "dir": "↑", "priority": "P1", "company": "Rocket Lab", "oneliner": "Beck反复costly高人才密度(比哈佛难2倍/拒\"够格\"/无work-life balance);垂直整合归战略层", "card": "<h1>Rocket Lab (RKLB) — Why attention?   ·   Score 52 · 置信度 THIN · 优先级 P1</h1>\n<p><strong>一句话定性</strong>:值得排进本周看,但组织信号偏中等。Beck 的&rdquo;组织操作系统&rdquo;= <strong>创始人即首席工程师 + 极致垂直整合 + 自筛选的高强度工艺文化</strong>——这是一套<strong>稳定运行的截面 Alpha(低故事性、无 reorg/Delta)</strong>,不是转向叙事。但它和 NewSpace 同辈(尤其 SpaceX)高度同形,真正&rdquo;对同类反常&rdquo;的机制有限;且决策权/span/激励三维<strong>挖不到机制</strong>,封住了上分空间。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>人才密度/信息流</td>\n<td>&ldquo;We have a number of really non negotiable elements, and right at the top is we build beautiful things… if you want work life balance, don&rsquo;t come here.&rdquo;(Motley Fool 访谈, 2025-12)</td>\n<td>用&rdquo;工艺自豪感 + 高强度&rdquo;做自筛子,&rdquo;想走捷径的人活不下来&rdquo;;owner 当面排他、可证伪。<strong>员工侧对账落地</strong>:Glassdoor/Indeed 多条&rdquo;12 小时工时只付 8 小时&rdquo;&ldquo;薪资远低于市场&rdquo;&ldquo;高流失/burnout&rdquo;(Glassdoor 262 评, WLB 3.1/5)。偏离&rdquo;对外只喊狼性&rdquo;的口号——这是真有代价、且被第三方 revealed 的硬文化</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>一号位亲历(dim8)</td>\n<td>&ldquo;Both CEOs of those companies are the chief engineers… I&rsquo;m down at the engine, I&rsquo;m at the test site and we&rsquo;re doing real work. And the close couple of the engineering decisions with the business decisions I think is super super critical.&rdquo;(Payload 访谈)</td>\n<td>一号位亲自做工程、把工程决策与商业决策强耦合(无大学学历、精密机械学徒出身,CNBC/Gulf News 可核验);&rdquo;放手&rdquo;不靠层级靠自己下沉。但 NewSpace 同辈(SpaceX)同形 → 对同类只算轻-中度反常</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>战略-结构/康威(dim1)</td>\n<td>&ldquo;we don&rsquo;t [do everything] because of a magic vision… written on a wall somewhere… because it makes the most amount of sense&rdquo;; &ldquo;we&rsquo;re not acquiring things for their balance sheet… great teams that align with culture&rdquo;(Bloomberg/Payload)</td>\n<td>垂直整合是<strong>务实的组织决策</strong>而非教条:供应商跟不上就自造(3D 打印阀门、自建工业炉);并购挑&rdquo;对齐文化的团队+技术&rdquo;,非财务。把团队边界沿&rdquo;端到端任务&rdquo;重画 → 反推&rdquo;无妥协的单一指挥链&rdquo;。但多半是战略的组织影子,机制偏浅</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3:文化 2×3=6 + 首席工程师 2×2=4 + 垂直整合 2×2=4 = <strong>14</strong>;14/27×100 ≈ <strong>52</strong>。<strong>无 Δ 行</strong>(未检出 reorg/自承组织病/转向叙事——这是&rdquo;闷声稳定&rdquo;型,按规则不减 Alpha)。<strong>在赌什么/何时失效</strong>:赌&rdquo;工艺自豪 + 创始人深度下沉 + 端到端控制&rdquo;能在规模化时维持质量与速度;<strong>失效条件</strong>——一号位带宽到顶(单点依赖 Beck 做首席工程师)、高强度文化在万人规模/Neutron 量产期触发关键人才流失(员工侧已现 burnout/turnover 红旗,方向标 ?)。</li>\n<li><strong>盲区 + 下一步</strong>:决策权边界、span of control、激励/所有权三维<strong>均需补机制</strong>(只搜到&rdquo;worry about cents&rdquo;的节俭、未见一线拍板边界/经理带人数/股权激励设计)≠ 平庸,是信息不足。Follow up:找前员工/工程 lead 验证&rdquo;chief-engineer 模式在 75+ 次发射、Neutron 阶段是否仍单点依赖 Beck&rdquo;;查 Neutron 项目的授权与 owner 机制。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:端到端&rdquo;space company&rdquo;垂直整合 + 国防/星座扩张,在大市场(发射+卫星系统)上是反共识重注——战略层值得看,但其组织表达只部分落到&rdquo;人怎么被组织&rdquo;。</li>\n<li><strong>优先级</strong>:组织 52 × 市场 大 × 战略 反共识 → <strong>P1</strong>(Score 33–66 + 大市场/反共识战略,排进本周;非 P0:核心机制未挖透、文化方向带红旗、与 SpaceX 同形度高)。</li>\n</ul>"}, {"rank": 88, "score": 52, "conf": "RICH", "dir": "↑", "priority": "P1", "company": "Crosby", "oneliner": "AI律所操作模型:律师内嵌软件公司+AI首过律师判断签字,emerging待坐实", "card": "<h1>Crosby — Why attention?   ·   Score 52 · 置信度 RICH · 优先级 P1</h1>\n<p><strong>一句话定性</strong>：值得排进本周看。它的&rdquo;组织操作系统&rdquo;是<strong>把 AI lab 和律所装进同一间屋子</strong>——不是卖软件给律师，而是自己当律所（双实体：Crosby Legal PLLC 做法律 + Crosby Legal Inc. 做 AI），律师与工程师交错排座、强制反馈环，并用&rdquo;按件计费 + 周转时间&rdquo;取代律所百年的计时收费。这是<strong>截面 Alpha（当前在运行的结构）</strong>，不是转向 Delta——一家 2024 成立、~20–30 人的年轻公司在搭自己的 OS，无 reorg/债的故事。<strong>注意盲区</strong>：几乎全是创始人自述 + 投资人放大，无员工侧/第三方落地证据。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕（+来源，必填）</th>\n<th>机制（谁/怎么/多少）+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>激励(5)</td>\n<td>&ldquo;They&rsquo;ve abandoned billable hours entirely, pricing per document instead.&rdquo;〔事实〕；&rdquo;We run on total turnaround time… how long does the contract take across all of the back and forths&rdquo;（J. Sarihan, Sequoia podcast）</td>\n<td>取消计时收费、改<strong>按件定价</strong>；全公司北极星指标=TTAT（总周转时间）+ HuRT（人工复核时间）→ 律师被激励去<strong>自动化自己的活、把单子做快</strong>，不是攒工时。逆转整个律所行业的根本激励</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>战略-结构(1)</td>\n<td>&ldquo;building our own law firm in order to own the entire process, end to end&rdquo;（R. Daniels, TechCrunch 2025-06-17）；〔事实〕分两实体：Crosby Legal PLLC（持牌律所）+ Crosby Legal Inc.（建 AI）（ZoomInfo/Sacra）</td>\n<td>不做&rdquo;卖给律师的工具&rdquo;而<strong>亲自当律所</strong>：paralegal-agent 路由来单 → 强制 lawyer-in-the-loop 逐件签字。偏离同类（多数 legal-AI 是 SaaS 卖给律所）。但双实体部分是 UPL/非律师持股法规所迫，非纯自选</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>康威/人才(7/2)</td>\n<td>&ldquo;we literally in our office have desks staggered: lawyer, engineer, lawyer, engineer, in order to… incent them to really collaborate&rdquo;（R. Daniels）；&rdquo;domain experts sit side by side with your engineers creates… a feedback loop… more than just evals&rdquo;（J. Sarihan, Sequoia podcast）</td>\n<td>用<strong>座位强制跨学科相邻</strong>+ 强制 NYC in-person，让律师=工程师的&rdquo;产品 user research&rdquo;。偏离同类 AI 创业（多 remote/职能分仓）。座位是可核验的结构事实、in-person 是真代价</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>激励(5)</td>\n<td>&ldquo;When you can make an AI do this thing that you&rsquo;ve been doing and not enjoying doing, it is the most magical experience ever&rdquo;；&rdquo;we really praise… ways that we can step out of [repetitive work] and think bigger&rdquo;（R. Daniels）</td>\n<td>反常：员工被<strong>表扬去消灭自己的重复活</strong>（律师奖&rdquo;把自己自动化掉&rdquo;），对齐&rdquo;奖结果不奖工时&rdquo;。仅金句层，机制薄→不进 Top-3</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>：只累计 A 行 Top-3 = 6（激励·按件）+ 4（战略-结构）+ 4（康威座位）= 14 → 14/27×100 = <strong>52</strong>。<strong>在赌什么 / 何时失效</strong>：赌&rdquo;律所收费=计时&rdquo;这一行业激励是可被组织设计反转的，且律师+工程师同屋的反馈环能持续产出独占领域数据。若规模放大后 lawyer-in-the-loop 成为瓶颈、座位法在 50+ 人时失效、或按件定价无法覆盖复杂谈判长尾，机制会崩。</li>\n<li><strong>盲区 + 下一步</strong>：<strong>全部为创始人自述/投资人（Sequoia·Bain·Index·Lux）放大，无员工侧/Glassdoor/留存对账</strong>——按落地闸，&rdquo;机制有效/律师真买账&rdquo;仍是 stated，C 封顶 2、标&rdquo;待验证落地&rdquo;。找谁：① 现/前 Crosby 律师，验证&rdquo;按件+TTAT 激励&rdquo;是否真改了日常行为、有无回到加班赶工；② 验证 ~30 人后座位法/in-person 强制是否还在跑。</li>\n<li><strong>业务/战略离群（不计入组织分）</strong>：&rdquo;services-as-software&rdquo;（自己当律所而非卖 SaaS）是相当反共识的 GTM 赌注，且法律服务市场极大——这是<strong>战略层值得看</strong>的点，但不进组织分。</li>\n<li><strong>优先级</strong>：组织 52 × 市场 大（法律服务） × 战略 反共识（当律所而非卖工具）→ <strong>P1</strong>（Score 33–66 + 大市场/反共识战略）。组织有真 Alpha（尤其按件+TTAT 反转律所激励），但落地未经第三方验证、公司太年轻，够不上 P0。</li>\n</ul>"}, {"rank": 89, "score": 48, "conf": "RICH", "dir": "↑", "priority": "P1", "company": "LVMH (OTC: LVMUY)", "oneliner": "Maison自治+巴黎财务集权+品牌内部互搏,数十年在跑的去中心化操作系统", "card": "<h1>LVMH (OTC: LVMUY) — Why attention?   ·   Score 48 · 置信度 RICH · 优先级 P1</h1>\n<p><strong>一句话定性</strong>：值得本周看。组织操作系统 = &ldquo;<strong>创意端放权、资本端铁腕集权 + 一号位以惊人颗粒度亲历零售一线</strong>&ldquo;——75 个 maison 各自留创意总监/身份/(多数)独立 P&amp;L，但财报、capex、地产、供应链全部上交巴黎，由 Arnault 亲自逐家审业绩。这是<strong>截面 Alpha</strong>（运行 30 年、可复述）；2025 的高管大洗牌是叠加的 <strong>Δ转向中</strong>，单独标、不进主分。同辈参照系 = Kering / Richemont（奢侈品控股集团），&rdquo;maison 自治&rdquo;本身在同类里偏 table-stakes，真正偏离同辈的是<strong>一号位亲历的颗粒度 + 内部资源竞争的刻意设计</strong>。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>8 一号位亲历</td>\n<td>&ldquo;visits as many as 25 stores in a single morning, including those of his competitors&rdquo;(其子 Frédéric 对 Forbes)；&rdquo;reels off texts and emails to his senior executives describing any perceived deficiencies in bullet points of obsessive detail&rdquo;(Bloomberg/screwdowncrown 转述)</td>\n<td>每周六带轮值随从巡店、亲手摆货、向高管发逐条 bullet 反馈；$500B/21.5万人体量下一号位认知下沉到货架级。偏离同辈&rdquo;奢侈品集团主席只做资本配置/不碰一线&rdquo;</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>5 激励/所有权</td>\n<td>&ldquo;brands compete internally for resources and attention — a deliberate strategy&rdquo;；&rdquo;creative directors who fail to deliver commercially do not last long, regardless of critical acclaim&rdquo;(Business Chief / markhub 转述 Arnault 公开说法)</td>\n<td>在 maison 之间设刻意的内部资源竞争市场，按商业结果汰换创意总监（评论叫好不护身）。偏离 Richemont 式&rdquo;放养不问&rdquo;；奖商业结果不奖声誉</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>1/3 战略-结构/决策权</td>\n<td>&ldquo;radical decentralisation of creative decisions combined with rigid centralisation of financial control … reporting, supply chain, real estate, capital allocation all flow through Paris&rdquo;(quarterdeck/markhub 综述)</td>\n<td>创意可逆决策下沉一线、资本/不可逆决策全收巴黎、Arnault 亲审每家业绩。集权半边是 revealed；分权半边在奢侈品同辈里近 table-stakes</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>2 人才密度</td>\n<td>&ldquo;great at spotting … investing in talent, even if he doesn&rsquo;t have a &lsquo;box&rsquo; for them yet&rdquo;(press.farm)；〔事实：Alexandre 从小箱包品牌跳 Tiffany EVP；Courtois 跨 maison 升美妆全线 CEO〕</td>\n<td>先锁定人再造位、跨 maison 调动高管练将。但&rdquo;no box&rdquo;半属 stated 哲学，跨 maison 调动也含家族接班，偏离度有限</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>高管洗牌</td>\n<td>〔事实〕&rdquo;Amid LVMH&rsquo;s challenges, Arnault is … shuffling around prized executives&rdquo;;&rdquo;Arnault&rsquo;s LVMH Crisis and His New Plan&rdquo;(Puck, 2025)</td>\n<td>增长承压期换将/调结构——<strong>Δ，未坐实是强势演进还是被迫补债</strong>，不进主分</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">↗</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>：只累计 A 行 Top-3 S=D×C → 6(亲历) + 4(内部竞争) + 2(分权集权) = 12，另人才 S≈1 → round(12/27×100) ≈ <strong>44–48</strong>，取 <strong>48</strong>。<strong>在赌什么/何时失效</strong>：赌&rdquo;创意要绝对自由、但钱和扩张要绝对纪律，且一号位能用亲历对账穿透 21.5 万人&rdquo;。失效点 = <strong>key-man 风险</strong>——这套穿透高度绑定 Arnault 本人(76 岁)，颗粒度无法被委托；接班(五子女 30 年锁股、轮岗)能否复制&rdquo;周六巡店级&rdquo;亲历是最大未知。</li>\n<li><strong>盲区 + 下一步</strong>：①&rdquo;内部资源竞争&rdquo;的<strong>具体分钱/分资源机制</strong>(谁拍板给哪家 capex、按什么指标)只搜到概述，需补机制——故 C 压在 2。② maison CEO <strong>能独立拍板的边界</strong>(改什么不用上巴黎)缺一手。Follow-up：找前 maison CEO/CFO 离职访谈对账&rdquo;自治到底有多真&rdquo;；验证 hypothesis = &ldquo;亲历颗粒度是 Alpha 还是接班即失效的债&rdquo;。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>：30 年家族锁股 + 五子女各 20% 控股holding = <strong>cap-table/治理</strong>，按边界案例降权、不进组织分(只说&rdquo;谁控制公司&rdquo;)；多品类奢侈品并购整合是战略层。</li>\n<li><strong>优先级</strong>：组织 48 × 市场 {大，全球奢侈品} × 战略 {同类内偏共识} → <strong>P1</strong>(Score 33–66 + 大市场)。理由：组织有真 Alpha 尖峰(一号位亲历 + 内部竞争)但整体偏离同辈幅度中等，且 2025 Δ 未坐实——排进本周看，重点验&rdquo;亲历可否传承&rdquo;与&rdquo;自治是否名实相符&rdquo;。</li>\n</ul>"}, {"rank": 90, "score": 48, "conf": "THIN", "dir": "↑", "priority": "P1", "company": "Captions (now Mirage)", "oneliner": "每工程师周更可上市功能+设计师即PM/PM懂营销;部分系AI创业table-stakes", "card": "<h1>Captions / Mirage — Why attention?   ·   Score 48 · 置信度 THIN · 优先级 P1</h1>\n<p><strong>一句话定性</strong>：值得排进本周看一眼。它的&rdquo;组织操作系统&rdquo;= <strong>极窄的人才入口（自报 0.05% offer 率）+ 把&rdquo;出货权&rdquo;压到单个工程师身上的硬节奏（&rdquo;每人每周出一个可营销产品&rdquo;）</strong>——这是<strong>截面 Alpha</strong>（当前在跑的两条机制），不是转向故事；Captions→Mirage 改名+进军前沿研究是<strong>战略/产品</strong>层动作，不是组织债。同类系 NYC ~100 人、$175M+ 的生成式 AI 应用公司（Suno/ElevenLabs/HeyGen 一档），该群的 table-stakes（&rdquo;小而快、扁平、ship fast&rdquo;）不计偏离；只对<strong>超出同类</strong>的具体机制打分。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制（谁/怎么/多少）+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>激励 / 决策权</td>\n<td>&ldquo;every engineer should ship a marketable product every week&rdquo;；marketable = &ldquo;something users would come to your app specifically for or even pay for&rdquo;；&rdquo;Cut, cut, cut until&hellip; it&rsquo;s going to be useless if we cut anymore&rdquo;（Gaurav Misra, Lenny&rsquo;s Podcast 2025-03-27）</td>\n<td>出货权下沉到<strong>每个工程师</strong>：节奏单位=人×周，标的=可营销产品（不是 commit/PR）；逼迫一线自己砍 scope、自己拍板留什么。比同类泛泛&rdquo;ship fast&rdquo;更硬、可证伪（每周能不能数出产物）。但只有 CEO 自述节奏、无员工侧对账它是否真兑现</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度</td>\n<td>〔事实/自述〕2025 年只有 <strong>0.05%</strong> 进入工程招聘漏斗的候选人拿到 offer，CEO 自比 Harvard 2.58% / YC 1% / Ramp eng 0.23%，称结果是&rdquo;world-class team&hellip; insanely talented&rdquo;（Gaurav Misra 本人 LinkedIn 帖）</td>\n<td>招人<strong>筛子=极窄漏斗</strong>（每 2000 个候选人 ~1 个 offer），数量已被公开承诺=可证伪。但 offer 率是<strong>自家口径、自家抛、自利框架</strong>（理发师铁律）、无第三方/员工审计 → C 封顶</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度</td>\n<td>&ldquo;A lot of unique insight and innovation can come from one person doing two different functions&rdquo;（沿用 Snap 的 designer-PM 混合岗）（Gaurav Misra, Colossus/Index 访谈）</td>\n<td>看人筛子偏<strong>通才</strong>（懂 eng+data+marketing+sales），少招纯专才 → 支撑&rdquo;一人能把一件事从想法带到出货&rdquo;。软、未量化</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>信息流</td>\n<td>&ldquo;It&rsquo;s not just a product team thing. It&rsquo;s like engineering, recruiting&hellip; everybody comes up with ideas&rdquo;（季度头脑风暴产出&rdquo;secret roadmap&rdquo;）（Gaurav Misra）</td>\n<td>路线图输入面=全员（含招聘/工程），季度一次。但&rdquo;包容式 ideation&rdquo;在 &lt;150 人创业公司较常见，近 table-stakes</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>：只累计 A 行 Top-3 → 6 + 6 + 1 = 13；13/27×100 ≈ <strong>48</strong>。<strong>在赌什么/何时失效</strong>：赌&rdquo;少数顶尖通才 + 每周强制出货&rdquo;能跑赢大团队的协调成本；若产品复杂度升高（前沿视频模型研究，非每周可出货的应用迭代），&rdquo;每人每周一个可营销产品&rdquo;这条会与研究型工作冲突而失效，&rdquo;embrace technical debt&rdquo;也可能反噬。</li>\n<li><strong>盲区 + 下一步</strong>：层级/span、决策上浮边界、激励的&rdquo;回报来源/公平机制&rdquo;、信息坏消息上行——<strong>几乎全无独立证据（需补机制/信息不足，≠平庸）</strong>。组织信号几乎<strong>全是 CEO 一面之词</strong>，零员工侧对账。<strong>Follow up</strong>：① 找 Mirage 前/现工程师验证&rdquo;每周一个可营销产品&rdquo;是否真在执行、未达标会怎样（验最关键 hypothesis）；② 核 0.05% 漏斗的分子分母口径（是否含自动过滤的海投）；③ 看改名 Mirage 后研究团队是否另立一套不同于&rdquo;每周出货&rdquo;的节奏（是否出现双轨组织）。</li>\n<li><strong>业务/战略离群（不计入组织分）</strong>：Captions→Mirage 改名 + 从创作者工具扩到&rdquo;frontier AI 视频研究/模型&rdquo;、Mirage Studio 切广告（$500M 估值、$175M+ 融资）——<strong>战略层值得看</strong>，但属产品/市场赌注，不是组织偏离。</li>\n<li><strong>优先级</strong>：组织 48 × 市场 大（AI 视频） × 战略 共识偏积极 → <strong>P1</strong>：分数中段但卡在大市场上，排进本周；不进 P0（核心两条机制均为 stated、无 revealed 落地证据，按落地闸 C≤2、待验证落地）。</li>\n</ul>"}, {"rank": 91, "score": 48, "conf": "THIN", "dir": "↑", "priority": "P1", "company": "Midjourney", "oneliner": "~150人撑$500M、无销售/市场/增长部、利润分成、无董事会", "card": "<h1>Midjourney — Why attention?   ·   Score 48 · 置信度 THIN · 优先级 P1</h1>\n<p><strong>一句话定性</strong>:值得看一眼,但偏离主要在&rdquo;极端 span + 把社区做成组织的一部分&rdquo;两点上 —— 这是<strong>截面 Alpha</strong>(稳态跑了 3+ 年、可复述),不是转向故事。组织&rdquo;操作系统&rdquo;= <strong>一支不招销售/市场的极小自筹研究室,把模型训练与产品反馈外包给一个一号位亲自每周对话的百万级社区</strong>。但内部&rdquo;人怎么被组织&rdquo;(决策权、层级、汰换、激励)几乎查无机制,员工侧只有 1 条 Glassdoor 评价 —— 故置信度 THIN,真偏离待一手坐实。</p>\n<ta om/blog distributed-work 系列)</td>\n<td><strong>Team Anywhere</strong>:把&rdquo;全员每天自选地点&rdquo;做成一套<strong>designed 结构</strong>(专设行为科学实验室持续调参),不是疫情临时态。同类大 SaaS 多在 2022–24 转 RTO/hybrid mandate,它<strong>逆势没回弹</strong> → 反同类 D=3。但&rdquo;92% 做最好工作&rdquo;&ldquo;无生产力下降&rdquo;全是<strong>自引内部数据(stated)</strong> → 落地闸封顶</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>6 信息流</td>\n<td>&ldquo;Information is open internally by default and sharing is a first principle&rdquo;;&rdquo;Open company, no bullshit&rdquo;(公司 value;wiki/Confluence 默认开放,IPO 信息早早全员可见)(atlassian.com/company;opensource.com)</td>\n<td>创始期起<strong>信息上 wiki 默认全员可读</strong>取代点对点邮件 → 真机制。但 tech 圈已广泛模仿(table-stakes 化)→ D=2;且 2026 裁员的沟通方式<strong>当面打脸</strong>该 value → C 不给高</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>8 一号位组织自觉</td>\n<td>MCB:&rdquo;they should be afraid of someone who&rsquo;s really good at AI taking their job&rdquo;(Stratechery 2025 访谈)</td>\n<td>一号位能讲一套连贯的 AI×组织框架(招更 AI-native 的年轻人、人+AI 混合) → 维度8 软分;<strong>挖不到背后&rdquo;谁/怎么/多少&rdquo;机制</strong> → 仅软信号、不当满 Alpha</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>2/9 绩效·裁员(反向)</td>\n<td>〔Glassdoor/Blind〕强制曲线 stack ranking(约 2023 起、半年一次、P50 起卷入 PIP);MCB 2026.3.11 memo:&rdquo;self-fund further investment in AI&rdquo;;&rdquo;It would be disingenuous to pretend AI doesn&rsquo;t change… the number of roles required&rdquo;(letsdatascience/thenextweb)</td>\n<td><strong>revealed</strong>:裁 1,600 人≈10%、&gt;900 来自 R&D;通知后给 <strong>6 小时 Slack 告别</strong>、blog 上线 20 分钟后才单独通知;同期换/拆 CTO。强制曲线+反复 reorg+危机式一次性大裁 → <strong>弱组织补债</strong>特征</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score(仅累计 A 行 Top-3)</strong>:Team Anywhere S=3×2=6 · Open-company S=2×2=4 · 一号位自觉 S=1×2=2 → Σ=12 → round(12/27×100)=<strong>44</strong>。<strong>Δ 裁员行(S=6,↓)不进主分</strong>,但作为 standing 的负向因素登记。<strong>在赌什么/何时失效</strong>:赌&rdquo;全员分布式 + 默认透明&rdquo;能在不靠 RTO 的前提下维持高产出与人才吸引;在裁员/强制曲线把&rdquo;no bullshit/信任&rdquo;消耗殆尽、且分布式产出只有自证数据时失效。</li>\n<li><strong>盲区 + 下一步</strong>:① <strong>落地待验证</strong>——Team Anywhere 的产出/留存优势缺<strong>独立第三方</strong>数据,全是自引;找离职工程师/Blind 对账&rdquo;分布式是否真没拖产出&rdquo;。② reorg 诊断:这次是<strong>表现承压下被迫的 AI 纠偏</strong>(股价压力+self-fund 措辞+换 CTO),非&rdquo;增长期主动升级&rdquo;→ 偏债;追问 follow up:<strong>Rajeev Rajan 走、CTO 拆成 Teamwork/Enterprise 两职</strong>是主动演进还是补债。③ 验证 hypothesis:&rdquo;open company no bullshit&rdquo; 在裁员沟通(20 分钟差/6 小时 Slack)中是否系统性失守 = 表演式 costly 还是真值。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:全 all-in AI 自筹(&ldquo;self-fund AI + enterprise sales&rdquo;)、企业级上移——战略层值得看,但属资本/战略决策,不进组织分。</li>\n<li><strong>优先级</strong>:组织 Score 44 × 市场 大(企业协作 SaaS) × 战略 中(AI 转向是同辈共识)→ <strong>P1</strong>(33–66 + 大市场)。但 standing Alpha <strong>成效未独立坐实 + 当前 revealed 趋势向下</strong>,实质更接近 P2 边缘;建议&rdquo;排进本周但带验证清单看&rdquo;,别因 Team Anywhere 的名气高估。</li>\n</ul>"}, {"rank": 98, "score": 44, "conf": "THIN", "dir": "↑", "priority": "P1", "company": "Lemonade (LMND)", "oneliner": "业务翻倍而人头仅+2%、客服转去训练/审计AI,AI原生人效机制", "card": "<h1>Lemonade (LMND) — Why attention?   ·   Score 44 · 置信度 THIN · 优先级 P1</h1>\n<p><strong>一句话定性</strong>:值得本周看,但看点是<strong>一条 revealed 的截面 Alpha——&ldquo;用 AI 把人效拉到与百年巨头同档&rdquo;</strong>(~$1M in-force premium/员工,1,282 人对标 Progressive/Allstate/GEICO),而非一套可复述的组织机制。<strong>这是 Alpha(人效已落地、第三方+SEC 可核验),但组织&rdquo;谁/怎么/多少&rdquo;层面很薄</strong>;叠加两个需独立诊断的点:顶层 co-CEO 实验反转(Δ)、以及员工侧&rdquo;裁员手法+晋升偏袒&rdquo;的 ↓ 红旗——它们不盖 Alpha,但压住了 confidence 与 P0。</p>\n<table>\n<thead>\n<tr>\n<th> ;(Glassdoor 3.4/5, 627 评)</td>\n<td>-6% 人头里<strong>含突袭式裁员</strong>,且遣散捆绑&rdquo;不写差评&rdquo; NDA;晋升偏袒 → 与&rdquo;AI 优雅提效&rdquo;叙事对账后:提效部分靠裁,信息/待遇侧有 ↓</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 S=D×C → 人效 6 + 康威 4 + 待遇 2 = 12 → round(12/27×100)=<strong>44</strong>。co-CEO 反转为 Δ,单列不计分。<strong>在赌什么/何时失效</strong>:赌&rdquo;LLM 把保险变成软件、人效可对标巨头而成本结构碾压&rdquo;。若 AI 提效进入边际递减、或损失率(承保本身)而非人力成本才是胜负手,这条人效 Alpha 的杠杆就钝化。</li>\n<li><strong>盲区 + 下一步</strong>:决策权、层级/span、激励、招人筛子、开会机制<strong>全部&rdquo;需补机制&rdquo;</strong>(只搜到&rdquo;hire the best/skips committees/squads&rdquo;等 table-stakes,无 who/how/much)→ confidence THIN。Follow up:① 找 LMND 工程/理赔在职或前员工核实&rdquo;-6% 里裁员 vs 自然替代的比例、AI 替岗的真实边界&rdquo;;② 查 Wininger(产品/技术一号位)的招人筛子与团队划法,这是人效 Alpha 背后唯一没挖到的机制源头。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:AI-native 全栈保险、自营技术栈、reinsurance 结构属战略层,大市场(美国 P&amp;C 巨型),战略中度反共识。</li>\n<li><strong>优先级</strong>:组织 44 × 市场 {大} × 战略 {中度反共识} → <strong>P1</strong>(33–66 + 大市场)。理由:有一条 revealed、可核验的人效 Alpha 值得排进本周看;但组织机制薄+顶层反转+裁员红旗使其够不上 P0,需一手对账才能判这是&rdquo;组织优异&rdquo;还是&rdquo;被自动化叙事美化的常规降本&rdquo;。</li>\n</ul>"}, {"rank": 99, "score": 44, "conf": "RICH", "dir": "?", "priority": "P1", "company": "宁德时代 CATL", "oneliner": "三体系联席总裁+项目制周会直报董事长,主动演进", "card": "<h1>宁德时代 CATL — Why attention?  ·  Score 44 · 置信度 RICH · 优先级 P1</h1>\n<p><strong>一句话定性</strong>：值得排进本周看，但看的是「一号位神经末梢极长的超集权制造机器」这套<strong>截面 Alpha</strong>——曾毓群亲管 80+ 总监 + 一个 200 人「老板的眼睛」部门绕过科层直报真相，这是对重资产制造同类明确反常的中心化操作系统；方向偏 ↓（单点决策瓶颈+监视式），不是分权式的好赌注。2024 两次 reorg（制造并大区、乘用车小组赛马）是 <strong>Δ 转向中</strong>、落地未验证，不进主分。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">
