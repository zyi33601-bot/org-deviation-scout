 + 信息流(4) + 激励(2) = <strong>12 → 12/27×100 = 44</strong>。<strong>在赌什么/何时失效</strong>：赌&rdquo;长周期重资产、犯错代价巨大(&ldquo;一条产线投错就是巨大损失&rdquo;)→ 极致中心化 + 一号位长神经末梢能压住质量与技术路线赌注&rdquo;。在三万人单一脑袋拍板下高效；当规模/海外/业务复杂度超过曾毓群的认知带宽、或他不在场时，瓶颈与&rdquo;一个脑袋八九斤、四肢羸弱&rdquo;(他自述)即崩。</li>\n<li><strong>盲区 + 下一步</strong>：用人筛子只挖到软信号(&ldquo;人才像电池要测试才知合不合格&rdquo;&ldquo;信用靠战功验证&rdquo;)、未见具体招人 N 问→需补机制；小组赛马/reorg 是 stated·emerging，<strong>待验证落地</strong>(找乘用车小组负责人/离职者验证赛马是否真平等授权还是表演)。验证 hypothesis：综合管理部到底是&rdquo;真相上行&rdquo;还是&rdquo;监视/恐惧文化&rdquo;——找前员工对账。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>：全球动力电池龙头、押钠电/固态/换电/微网，&rdquo;市场够大+高门槛+相邻技术&rdquo;三条件扩张法——战略极值得看，但属业务层。</li>\n<li><strong>优先级</strong>：组织 44 × 市场(大，全球 EV 电池龙头) × 战略(共识偏强) → <strong>P1</strong>：组织 33–66 + 大市场，排进本周；非 P0 因核心 Alpha 方向偏 ↓ 且两条 Δ 落地未验证。</li>\n</ul>"}, {"rank": 100, "score": 44, "conf": "RICH", "dir": "↑", "priority": "P1", "company": "Meta Platforms", "oneliner": "扎克伯格反复押注小而精人才密度>团队规模、削管理层、TBD Lab保留", "card": "<h1>Meta Platforms — Why attention?   ·   Score 44 · 置信度 RICH · 优先级 P1</h1>\n<p><strong>一句话定性</strong>：值得排进本周看。Meta 的&rdquo;组织操作系统&rdquo;是<strong>一号位亲手压层级 + 用硬考核制造 non-regrettable attrition + 在 AI 上亲自打超高密度小团队</strong>——这是<strong>截面 Alpha</strong>（层级/考核机制已跑两轮、稳态、可复述），叠加一个<strong>诊断为&rdquo;偏补债&rdquo;的 AI reorg Delta（Llama 4 失利后被迫重组、FAIR 裁员、LeCun 出走、反复重组）</strong>——Delta 不减 Alpha，但也别把&rdquo;会讲 AI 转向故事&rdquo;高估于截面机制本身。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕（+来源，必填）</th>\n<th>机制（谁/怎么/多少）+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>层级/span</td>\n<td>&ldquo;I don&rsquo;t think you want a management structure that&rsquo;s just managers managing managers, managing managers… managing the people who are doing the work.&rdquo;（Zuckerberg 内部会，2023.1）；&rdquo;we will make our organization flatter by removing multiple layers of management… ask many managers to become individual contributors&rdquo;（Year of Efficiency 备忘，about.fb.com 2023.3）</td>\n<td>主动把&rdquo;经理管经理&rdquo;层级砍掉、要求大批 manager 转 IC 或走人（内部称 &ldquo;flattening&rdquo;）；2022 砍 1.1 万 + 2023 再砍 1 万。对一家 7 万+ 人成熟大厂主动减层 = 对同辈（Google/MSFT/Apple）明确反常；revealed 硬裁员，非口号</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>激励/考核</td>\n<td>〔事实〕Meta 把绩效末位桶配额从去年 12–15% 提到 <strong>15–20%</strong>（团队≥150 人），目标周期内达 <strong>10% non-regrettable attrition</strong>；&rdquo;even those who met most expectations could be considered for termination&rdquo;（Fast Company / Slashdot 2025.5）</td>\n<td>硬写进考核分布的强制末位淘汰 + 自创术语 &ldquo;non-regrettable attrition&rdquo;；谁/多少都明确、可被员工对账。对同辈反常（多数大厂淡化 stack-ranking），revealed</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度（AI）</td>\n<td>&ldquo;having basically the most compute per researcher is a strategic advantage, not just for doing the work, but for attracting the best people&rdquo;（Zuckerberg，MSL 备忘 2025.6，CNBC 转述）；MSL 成员须在各 lab &ldquo;very top handful&rdquo;；〔事实〕Zuck 亲自谈 offer、把新 hire 物理重排到自己旁边、~100 人小队、签字费报道达数千万–传 $1B</td>\n<td>一号位亲自当招聘官（绕过 HR）+ 以 compute/researcher 为筛子和卖点 + 极小精英队。机制具体；但&rdquo;是否真出成果&rdquo;未验证、且 FAIR 裁员/LeCun 出走说明有回弹 → 按落地闸 C 封顶 2</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>会议/信息流</td>\n<td>〔事实〕Zuckerberg 要求会前发~4 页书面备忘 + 议程预读；每个会先定&rdquo;是 discussion 还是 decision&rdquo;（Inc. / Beenote 转述）</td>\n<td>书面预读 + 决策/讨论二分，压发言式会议。具体但属同辈优秀公司 table-stakes（Amazon/Stripe 类似），二手、较旧</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>组织演进（AI）</td>\n<td>〔事实〕Llama 4（2025.4）被自家 CTO Bosworth 称 &ldquo;a disappointment&rdquo;；随后 $14.8B 收 Scale AI、空降 Alexandr Wang 任 CAIO、组 MSL、2025.10 裁 FAIR、LeCun 辞职（Pragmatic Engineer / Built In / Yahoo 2025）</td>\n<td>reorg 诊断：<strong>偏&rdquo;弱组织补债&rdquo;</strong>——危机/失利后被迫、AI 线反复重组、关键科学家流失。算 Δ、不进主分；不减上面 standing Alpha，但提示 AI 线 standing base 弱</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>：只累计 A 行 Top-3 S=D×C → 层级 6 + 考核 6 …同一维度（考核可归层级母题，但机制独立）取 6+6+人才密度 4 = <strong>16/27×100≈59</strong>？为避免层级/考核同维刷分（护栏：同维最多 2 条），取 层级 6 + 考核 6 + 人才密度 4 中<strong>跨不同母维</strong>的 Top-3 = 层级 6、人才密度 4、会议 2 = 12 → <strong>Score≈44</strong>（考核与层级同属&rdquo;减层/淘汰&rdquo;母维，只计其一最高 6）。<strong>在赌什么</strong>：赌&rdquo;减层 + 强制末位淘汰能换来速度与人效，不杀掉创新与信任&rdquo;；条件是顶部判断力够强、好人不被误伤。<strong>何时失效</strong>：flattening 已有研究质疑会制造&rdquo;非正式隐形层级&rdquo;与政治；AI 线已显回弹（人才流失）。</li>\n<li><strong>盲区 + 下一步</strong>：决策权下沉边界、康威式团队划分&rdquo;需补机制&rdquo;。Follow up：① 找 Blind/前员工对账 flattening 是否真减层、还是只是换了 title；② 验证 hypothesis&rdquo;non-regrettable attrition 是真清退 B 级、还是 metric gaming 制造恐惧文化（表演式 costly 风险）&rdquo;；③ 跟踪 MSL 是否稳态成军、还是继续反复重组。</li>\n<li><strong>业务/战略离群（不计入组织分）</strong>：$15B 级 AI all-in + 从开源转闭源、Avocado 模型延至 2026Q1——战略上敢下大注，但属业务层，不进组织分。</li>\n<li><strong>优先级</strong>：组织 44 × 市场 大（社交+AI 双巨型市场）× 战略 偏反共识（逆周期减层 + 天价挖人）→ <strong>P1</strong>，排进本周：截面有真机制（减层/淘汰可证伪、CEO 亲招），但&rdquo;做没做成&rdquo;待第三方/员工侧坐实，且 AI 线带补债 Δ，未到 P0。</li>\n</ul>"}, {"rank": 101, "score": 44, "conf": "RICH", "dir": "↑", "priority": "P1", "company": "Redfin", "oneliner": "经纪人发底薪带福利的雇员制(反纯佣金行规),但CEO已离任+模型回弹", "card": "<h1>Redfin — Why attention?   ·   Score 44 · 置信度 RICH · 优先级 P1</h1>\n<p><strong>一句话定性</strong>:值得排进本周看。其&rdquo;组织操作系统&rdquo;=<strong>把整个行业默认的 1099/100%-佣金经纪人，反过来做成 W-2 带薪+福利+派单的雇员体系</strong>（dim5 真 Alpha，跑了约 17 年），叠加一位<strong>愿署名公开自我归罪</strong>的创始人（dim6 costly 候选）。但 standing Alpha 正在被拆：2023 起 Redfin Next 把工资改回佣金（<strong>弱组织被迫补债型 Δ</strong>），2025 被 Rocket 以 $1.75B 收购、Kelman 2026/1 离任、组织并入 Rocket。<strong>截面 Alpha 真实但正在侵蚀</strong>。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>激励/所有权</td>\n<td>&ldquo;If we want you to take care of customers, we have to take care of you as the agent&rdquo;；〔约 2,300 经纪人为 W-2 带薪雇员，含医保、MLS 会费、营销费、里程报销、ESPP，公司派单〕(redfin.com/news redfin-direct;money.com Changemakers)</td>\n<td>全行业默认 1099+100% 佣金+自己拉客；Redfin 反过来发工资+福利+派单、早期&rdquo;七年几度濒临破产也不用合同工&rdquo;。改变普通经纪人怎么被对齐/问责，非 cap-table → 对<strong>同类(经纪行业)</strong>激进反常</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>信息流/真相上行</td>\n<td>&ldquo;We have broken our commitment to our people, twice now in three years…I&rsquo;ll spend the rest of my life wondering how I could&rsquo;ve avoided these layoffs&rdquo;；&rdquo;Some people will quit over this decision&rdquo;(2022 裁员信 redfin.com/news/layoff;2023 RTO memo GeekWire)</td>\n<td>一号位在署名公开信里反复、具体地自我归罪+预告自己决策的伤害；可被未来打脸、得罪人。是 costly 的真相上行<strong>沟通机制</strong>，但属&rdquo;说&rdquo;不是人事/资源硬重排 → 不到 C3</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度</td>\n<td>&ldquo;blue-collar work ethic who don&rsquo;t have a sense of entitlement…humility and service&rdquo;；面试爱问&rdquo;whether candidates consider themselves lucky&rdquo;；&rdquo;everyone sweeps the floors&rdquo;(GeekWire 2017;UrbanTurf 访谈)</td>\n<td>招工程师按&rdquo;心性/服务感&rdquo;而非纯算法天赋筛(&ldquo;否则会一遍遍做错产品&rdquo;)；反名校/反精英筛子。但只见入口筛、<strong>挖不到汰换(&ldquo;仅合格&rdquo;者怎么清)机制</strong> → 需补机制</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>激励(Δ)</td>\n<td>&ldquo;average schmaverage, what&rsquo;s the top of the range?&rdquo;；自源成交&rdquo;split…top out at roughly 90%&rdquo;，目标顶薪从 $750–800K 拉到 &ldquo;&gt;$1 million&rdquo;(redfin.com/news/redfin-max Redfin Next,2023/10)</td>\n<td><strong>杀掉招牌的带薪制、改回佣金</strong>(SF/LA 起)。诊断：NAR 佣金判决+顶级经纪不肯加入+员工反映&rdquo;薪酬结构一年改两次&rdquo;压力下被迫——<strong>弱组织补债型 Δ，非主动演进</strong></td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↗</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 S=D×C = 6+4+2 = 12 → 12/27×100 ≈ <strong>44</strong>。Δ(Redfin Next)单独列、不进分。<strong>在赌什么/何时失效</strong>:赌&rdquo;经纪人被当雇员对待会更把客户放第一、留存更好&rdquo;；当佣金被压(NAR 案)、顶级经纪要更高天花板、资本市场要利润时，带薪制的成本结构撑不住——这正是 2023 反转的触发。</li>\n<li><strong>盲区+下一步</strong>:决策权/层级/span/康威几乎查无组织表达(THIN，非平庸)。员工侧对账=红旗：Glassdoor 经纪 2.9★、薪酬 2.6★、&rdquo;metrics 看量不看质&rdquo;&ldquo;薪酬结构一年改两次&rdquo;——说明派单+带薪虽真，但问责偏数量、机制不稳。<strong>follow up</strong>:① 并入 Rocket 后带薪制/W-2 还留不留(Alpha 是否被整合抹平)；② 验证 hypothesis&rdquo;W-2 带薪是否带来更高客户满意/经纪留存&rdquo;的第三方数据。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:被 Rocket $1.75B 全股收购、整合进按揭巨头(战略层)；iBuying(RedfinNow)2022 关停——业务波动大、组织分不沾。</li>\n<li><strong>优先级</strong>:组织 44 × 市场 大(美国房产经纪) × 战略 反共识(带薪经纪人) → <strong>P1</strong>:截面 Alpha 罕见且 costly，但正在被 Redfin Next 反转+Rocket 整合侵蚀，且创始人已离任——值得看&rdquo;它独特的组织资产在被收购方留下多少&rdquo;，不必放下手头事。</li>\n</ul>"}, {"rank": 102, "score": 44, "conf": "RICH", "dir": "↑", "priority": "P1", "company": "MiniMax (稀宇科技)", "oneliner": "全公司仅3层+算法基建一体共优一目标,机制清晰可证伪", "card": "<h1>MiniMax (稀宇科技) — Why attention?   ·   Score 44 · 置信度 RICH · 优先级 P1</h1>\n<p><strong>一句话定性</strong>：值得排进本周看。它的&rdquo;组织操作系统&rdquo;是 <strong>AI-native 的&rdquo;解方程式&rdquo;组织</strong>——一号位把&rdquo;研究组织&rdquo;当高杠杆动作，用极扁平结构 + 亲自把关的&rdquo;协作筛子&rdquo; + 消解职能边界，让 ~400 人干通常要数千人的活。这是<strong>当前在跑的截面 Alpha</strong>（不是转向故事）；唯一的大 Δ（算法/infra 合并）经诊断更像<strong>主动演进</strong>而非补债。同辈（头部基模 lab）共识项已压分。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>人才密度</td>\n<td>&ldquo;他考核的核心除了聪明、热情，最看重的一点是&rsquo;有没有和人合作的能力&rsquo;&ldquo;；&rdquo;有些很强的个体融不进团队，有些看着没那么强的人能提升团队整体产出&rdquo;（罗永浩对谈复盘, 澎湃 32148957）</td>\n<td>闫俊杰<strong>亲自做算法岗最后一个面试官</strong>；筛子=协作而非天才，会刷掉&rdquo;强但不合作&rdquo;的人 → 反&rdquo;招最强个体&rdquo;共识、可证伪、得罪一批 strong-but-lone-wolf</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>层级/span</td>\n<td>&ldquo;现在还是只有闫俊杰、闫俊杰的-1、闫俊杰的-2三个层级&rdquo;；&rdquo;很喜欢研究组织&rdquo;&ldquo;组织的杠杆其实非常大&rdquo;（同上 + 晚点 LateTalk 99）</td>\n<td>~400 人<strong>只 3 层</strong>；一号位把&rdquo;研究组织&rdquo;当高杠杆、不愿做&rdquo;低杠杆的管理&rdquo; → 同类(基模 lab)也讲扁平，但&rdquo;3 层@400人&rdquo;是具体可证伪的硬约束</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>康威/激励</td>\n<td>&ldquo;很难统计非技术人员比例，因为大家工作方式更靠近问题本质，而不是传统职位定义&rdquo;；B 端售前&rdquo;会自己写代码给客户做 demo&rdquo;；&rdquo;AI Native 让近 400 人干通常要数千人的活&rdquo;（澎湃 32148957）</td>\n<td>刻意<strong>打破算法/开发/PM 边界</strong>、按&rdquo;问题本质&rdquo;组织人而非职位；全员期权覆盖全职能 → 人效偏离&rdquo;按职能堆人&rdquo;基线</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>决策权</td>\n<td>&ldquo;公司大多数决策都是在计算某些东西的最优化&rdquo;&ldquo;我们在解方程&rdquo;；资源受限时选&rdquo;最激进的方案&rdquo;，&rdquo;把事做到极致才会好&rdquo;（新浪财经 inhhnuut2522282）</td>\n<td>决策=优化求解的哲学，但<strong>谁拍板/一线边界未挖到机制</strong> → 软信号，需补机制</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>组织演进</td>\n<td>&ldquo;算法和基础设施一定要一体的，相当于所有人要优化同一个目标，而不是每个人自己优化目标&rdquo;，结果&rdquo;有些人不认同，离开了 MiniMax&rdquo;（澎湃 32148957）</td>\n<td>~半年前把算法+infra 合并、取消个人 scope 边界 → reorg 诊断:<strong>增长/IPO 前主动做、框架是&rdquo;下一阶段一体化&rdquo;、非危机自曝臃肿</strong> = 主动演进偏 Alpha；但落地仅 CEO 自述</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>：只累计 A 行 Top-3 → 招聘筛子(2×2=4) + 3层级(2×2=4) + AI-native边界(2×2=4) = 12，/27×100 = <strong>44</strong>。Δ 行(算法/infra 合并)单独列、不进主分。<strong>在赌什么/何时失效</strong>：赌&rdquo;协作密度 + 极扁平 + 边界消解&rdquo;能让小团队压制大厂；当规模再翻倍、或多产品线需要独立损益时，3 层 + 无职能边界可能扛不住，需看会不会被迫加层。</li>\n<li><strong>盲区 + 下一步</strong>：决策权(一线能独立拍板的边界)、信息流(坏消息上行机制)、reorg 落地(合并后人效/留存是否 revealed)均&rdquo;需补机制/待验证&rdquo;。员工侧已交叉印证:知乎/脉脉口径&rdquo;对事不对人&rdquo;&ldquo;每两天一次会、谈下一步而非汇报&rdquo;&ldquo;能背靠背&rdquo;——与协作筛子+轻会议一致，但属软证据。Follow up:① 找合并后离职者/在职算法工程师对账&rdquo;优化同一目标&rdquo;是否真落地、有无回弹；② 验证&rdquo;3 层@400人&rdquo;在 IPO 后是否仍成立。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>：全模态技术路线 + 决意全球化 + IPO 速度破纪录(4 年天使轮到上市)；一号位&rdquo;更怕陷入追随者心态&rdquo;。这些是战略/资本离群，进战略层、不驱动组织分。</li>\n<li><strong>优先级</strong>：组织 44 × 市场 大(基础大模型/AGI) × 战略 偏共识(基模赛道拥挤) → <strong>P1</strong>，排进本周:组织有真机制(协作筛子+扁平+边界消解)、大市场加持，但偏离同辈 lab 未到激进、落地待验证，不足以 P0。</li>\n</ul>"}, {"rank": 103, "score": 44, "conf": "RICH", "dir": "?", "priority": "P1", "company": "美团 Meituan", "oneliner": "7高管+双决策组治理、王兴亲历AI招人不设考核;有Alpha底+reorg持续演进", "card": "<h1>美团 Meituan — Why attention?  ·  Score 44 · 置信度 RICH · 优先级 P1</h1>\n<p><strong>一句话定性</strong>:值得看，但不是&rdquo;组织赌徒&rdquo;型偏离——它的&rdquo;组织操作系统&rdquo;是一套<strong>已落地、可核验的内部领导梯队 + Z字型强制轮岗 + 高内部提拔率</strong>(维度2/4 的真 Alpha，第三方/数字可对账)，叠加一套<strong>按业务成熟度有节奏拆/并 BU、每层指名 P&amp;L owner 的主动组织演进</strong>(维度9，强组织主动演进为主、2025 部分裹挟外卖大战危机)。这是<strong>截面 Alpha 为主</strong>；&rdquo;反内卷&rdquo;&ldquo;出海千亿&rdquo;是战略/Delta，不计组织分。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离同类基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>人才密度/层级 (2/4)</td>\n<td>&ldquo;当前我们69%的管理者是内部提拔…总监及以上超一半来自内部晋升&rdquo;(王兴2024中秋内部信，新浪/凤凰财经)</td>\n<td>谁:总监+/VP；怎么:领导梯队培养计划(2020启动)+人才盘点+继任+强制换岗；多少:69%内部提拔。互联网同类(阿里/腾讯)更靠外部空降高管→Meituan 内生密度明显反常</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>组织演进 (9)</td>\n<td>〔事实〕薛冰(司龄14年)、魏巍(9年)、章若愚各&rdquo;先后在外卖/配送/到家到店多个核心岗位轮岗&rdquo;才拿到事业部(网易/财经)</td>\n<td>&ldquo;Z字型/π型&rdquo;发展:升 P&amp;L 前强制横向多岗轮岗，逆&rdquo;专精晋升&rdquo;惯性、对在位高管 costly；有命名案例可核验</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>组织演进 (9)</td>\n<td>〔事实〕2024.02 整合到家/到店/平台/基研→04 王莆中任&rdquo;核心本地商业CEO&rdquo;；08 快驴/小象/优选并为&rdquo;食杂零售&rdquo;(郭万怀)、境外改 Keeta(仇广宇)(澎湃/证券时报)</td>\n<td>谁拍板:王兴发内部邮件按节奏拆并 BU、每层指名单一 owner;常规节奏+成熟度驱动=强组织主动演进(非反复反转);2025上半年核心本地商业溢利-75.6%下部分调整裹挟竞争压力→混合，非纯补债</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↗</td>\n</tr>\n<tr>\n<td>一号位亲历 (8/4)</td>\n<td>〔事实〕王兴亲自直管无人机+香港/海外 Keeta;&rdquo;无独立办公室、经济舱、被叫兴哥&rdquo;(腾讯新闻/IPO 文化材料)</td>\n<td>一号位亲管前沿新赌注(非撒手);平权符号部分是大厂 table-stakes(D 低)，亲管前沿是真 8 维信号</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>信息流/决策 (3/6)</td>\n<td>〔事实〕高管会放周末开、S-team 每人发言;干嘉伟早年劝&rdquo;你得抓大放小，授权别人管理&rdquo;(腾讯新闻，二手/陈旧)</td>\n<td><strong>需补机制</strong>:一线可独立拍板边界、坏消息上行制度均未挖到具体规则→不进打分</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 S=D×C → 6 + 4 + 2 = 12 → round(12/27×100)= <strong>44</strong>。<strong>在赌什么/何时失效</strong>:赌&rdquo;内生人才 + 横向轮岗出的复合视角&rdquo;长期胜过外部空降；若外卖大战逼出短期硬仗、内部慢培养的梯队跟不上即时战力，这套优势会被稀释。</li>\n<li><strong>盲区 + 下一步</strong>:会议/决策权/真相上行(维度3/6)只有&rdquo;周末开会、抓大放小&rdquo;等软料，<strong>需补机制</strong>(信息盲区≠平庸)。Follow up:核心本地商业一线产品/运营&rdquo;能独立改什么不用签字&rdquo;的授权边界；脉脉/离职访谈对账 69% 内部提拔是否=固化/天花板。验证 hypothesis:轮岗梯队是真人才密度引擎，还是大厂内循环近亲繁殖。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:&rdquo;2025–2035 重点国际化、Keeta 目标千亿美元外卖规模&rdquo;&ldquo;坚决反对内卷&rdquo;&ldquo;we will do whatever it takes to win&rdquo;(新浪/股东会)——战略大注 + 2025 由盈转亏(全年净亏约234亿)，战略层值得单独看，<strong>不抬组织分</strong>。</li>\n<li><strong>优先级</strong>:组织 44 × 市场 大(本地生活/外卖/出海超大牌桌) × 战略 中(出海反共识、外卖防守共识) → <strong>P1</strong>,排进本周看;组织偏离中等但真实可核验、且卡在巨型市场+出海反共识赌注上。</li>\n</ul>"}, {"rank": 104, "score": 44, "conf": "RICH", "dir": "?", "priority": "P2", "company": "Carta", "oneliner": "薪酬=纯市场无年涨+分层1:1走步制,但第三方实锤有毒文化/自交易", "card": "<h1>Carta — Why attention?   ·   Score 44 · 置信度 RICH · 优先级 P2</h1>\n<p><strong>一句话定性</strong>:值得&rdquo;看一眼、别追&rdquo;。CEO Henry Ward 是少数能写出一整套连贯组织模型的一号位(自缚式裁员归责、shadow-org 网络分析、一套成文的招人筛子)——这是真的<strong>截面 Alpha</strong>,机制可复述。但它撞上一道极硬的 <strong>revealed 反证</strong>:数据滥用丑闻后退出 secondaries、3+ 起性骚扰/歧视和解、员工侧&rdquo;领导层不停换、yes-people、toxic&rdquo;。<strong>stated 哲学很强 ≠ 组织真好</strong>:Alpha 被同等强度的&rdquo;确认 dysfunction&rdquo;对冲,所以中分而非高分。同辈基线=美国 B2B SaaS 独角兽(2000 人级)。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源,必填)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>8 一号位 / 6 信息流</td>\n<td>&ldquo;Once the lists were created, they were sent to me for approval. I personally reviewed every list and every person&hellip; If you are one of those affected it is because I decided it. Your manager did not.&rdquo;(Ward, <em>Carta&rsquo;s covid-19 layoff</em>, Medium 2020)</td>\n<td>裁员三条成文 criterion(岗位消失→PIP/将进 PIP→&rdquo;再砍一个会是谁&rdquo;),161 人/16%;CEO 逐人复核并公开把责任拦在自己身上、明确替经理挡。自缚+可证伪+公开担下行,偏离&rdquo;经理背锅/HR 模板信&rdquo;基线</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>6 信息流 / 8 一号位</td>\n<td>〔事实〕用 Innovisor 三问网络调查(&ldquo;谁让你有干劲/你找谁求助/你找谁做决定 各列≥4 人&rdquo;)测非正式影响网;&rdquo;ten employees… influences 70% of our 250&rdquo;;CEO&rdquo;didn&rsquo;t make the top 10&rdquo;(Ward, <em>The shadow org chart</em>, Medium)</td>\n<td>用网络分析量化&rdquo;影子组织图&rdquo;、识别 ~10 个 IC 影响者 + 9 个 leader 影响者;但 Ward 只说&rdquo;理解他们怎么做的、好制造更多&rdquo;——<strong>未落到晋升/分钱/决策权</strong>,是诊断不是机制改写</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>2 人才密度</td>\n<td>&ldquo;I would rather hire the humble asshole than the arrogant nice guy&rdquo;;&rdquo;Do not be afraid of hiring False Positives… Be afraid of missing the 20x employee&rdquo;;筛子=trajectory/doers/learners,&rdquo;ask a candidate how to do something and then ask them to do it&rdquo;(Ward, <em>How to Hire</em>, Medium)</td>\n<td>招人筛子成文(强项 vs 无短板、轨迹 vs 履历、做者 vs 说者),HM 拍板、面试组只答&rdquo;他最强在哪&rdquo;;但实操机制薄,且被 revealed 直接打脸(见下)</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>决策权</td>\n<td>&ldquo;I want Carta to be a Bias to Action and a Bias to Yes company&rdquo;(Ward, <em>A bias to action</em>, Medium)</td>\n<td>无机制(谁能拍/可逆分级/超时默认皆无)——<strong>需补机制</strong>,纯口号,不进分</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">0</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>3 决策权 / 9 演进</td>\n<td>〔事实·revealed〕销售用客户 cap-table 数据私联未披露投资者;Ward:&rdquo;we have decided to prioritize trust, and exit the secondary trading business&rdquo;(TechCrunch 2024.1);secondaries 仅 ~$3M vs cap-table ~$250M</td>\n<td>危机后被迫砍业务(护栏:<strong>弱组织补债</strong>,非主动演进);员工侧&rdquo;leadership turnover constant, toxic culture filled with &lsquo;yes&rsquo; people&rdquo;(Blind)、Glassdoor 文化 3.4/5;3+ 起性骚扰/歧视和解(CRO 被指 groped,TechCrunch 2025.2)</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 = 6(裁员)+4(影子图)+2(招人)=12 → round(12/27×100)=<strong>44</strong>。<strong>在赌什么 / 何时失效</strong>:Ward 赌&rdquo;一号位亲自承担+把组织讲清楚&rdquo;能撑住高速;一旦执行层(销售/高管)行为与 stated 价值背离(数据滥用、骚扰),CEO 的 articulate 反而放大信任损失(他还主动 email 客户提示负面报道,被指自伤)。</li>\n<li><strong>盲区 + 下一步</strong>:决策权/span 维度&rdquo;需补机制&rdquo;(只有口号);影子图分析&rdquo;未落到人事行动&rdquo;。Follow up:验证 hypothesis=&rdquo;Ward 的成文哲学是真落地的机制,还是 articulate 创始人的 stated 表演?&rdquo;——查丑闻/和解后是否有 revealed 的治理/人事整改(换 CRO、独立审查、留存回升),没有则坐实&rdquo;说强做弱&rdquo;。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:cap-table 近垄断 + 大市场;但 secondaries/估值业务屡踩信任红线,战略偏共识、执行有红旗。</li>\n<li><strong>优先级</strong>:组织 44 × 市场 大 × 战略 共识 → <strong>P2</strong>。中等偏离、信息 RICH;Alpha 真实但被同等强度 revealed dysfunction 对冲,值持续观察、不值放下手头事去追。</li>\n</ul>"}, {"rank": 105, "score": 44, "conf": "RICH", "dir": "↑", "priority": "P1", "company": "Duolingo", "oneliner": "指标制自治小队+'宁缺勿招混蛋'+60页文化手册,standing Alpha", "card": "<h1>Duolingo — Why attention?   ·   Score 44 · 置信度 RICH · 优先级 P1</h1>\n<p><strong>一句话定性</strong>:值得排进本周看。组织操作系统 = <strong>&ldquo;按指标(metric)而非功能划团队&rdquo;</strong> —— 每个团队拥有唯一一个必须季度上涨的指标、跑数百次 A/B test,团队数到 50 就拆成 &ldquo;areas&rdquo;;叠加一套<strong>反共识的招人筛子</strong>(出租车司机测试 + &ldquo;宁缺毋滥&rdquo;)。这是<strong>截面 Alpha</strong>(当前在运行、跑成稳态、能复述&rdquo;谁/怎么/多少&rdquo;),不是转向故事。AI-first memo→反转是单独的 Δ,不进主分、也不盖 Alpha。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>战略-结构 / 激励</td>\n<td>&ldquo;We do not do feature-based teams, we do metrics-based teams&rdquo;;&rdquo;a bunch of teams that own each a single metric&rdquo;、要 &ldquo;increase every quarter&rdquo;、跑 &ldquo;hundreds of AB tests&rdquo;;&rdquo;we had 50 teams…so we split up into areas&rdquo;(von Ahn, Tim Ferriss #607 transcript)</td>\n<td>团队按&rdquo;要撬动的指标&rdquo;成立(如 retention 团队),每队拥唯一指标、季度必须上、用海量实验逼动;50 队即上收成 area 层。偏离&rdquo;按功能/产品线分工&rdquo;的默认。员工侧对账:&rdquo;shipping faster is rewarded…incentive to work longer hours&rdquo;(Glassdoor)= 指标-实验文化确实落到一线行为上</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度</td>\n<td>&ldquo;if they&rsquo;re going to be mean to the driver, they&rsquo;re probably going to be mean to other people&rdquo;;为找 CFO 找了 &ldquo;like a year&rdquo;,简历强、委员会都喜欢的候选人因 &ldquo;pretty mean to their driver&rdquo; 被否(von Ahn, Fortune/AOL 2026)</td>\n<td>付钱让接送司机评候选人;一票否决,凌驾简历+面试委员会;&rdquo;宁可 understaffed 也不破金标准&rdquo;。偏离&rdquo;招够人=进展&rdquo;的人头通胀默认</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\ l you&rsquo;… get the right few people in the room to make the best decision and get on with it&rdquo;(McMillon, Stanford GSB)</td>\n<td>每个决策指定<strong>唯一具名 D-owner</strong>;80/20 输入规则(owner 出 80%、房间补 20%)后即拍板,不等共识。偏离大零售/巨头&rdquo;逐层共识&rdquo;常态</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才/人效(自缚)</td>\n<td>&ldquo;Over the next three years we expect headcount to remain flat as roles evolve&rdquo;(Walmart 官方);Donna Morris:维持 ~2M 全球员工、&rdquo;job mix will change&rdquo;</td>\n<td>公开承诺<strong>3 年 ~210 万人不增、营收要涨</strong>=用 AI 把人效绑死;已<strong>revealed 落地</strong>:裁/迁 1,000–1,500 corporate、关 Dallas/Atlanta/Toronto 办公室、强制迁 Bentonville(第三方多源报道、未回弹)。偏离&rdquo;用招人数证明进展&rdquo;基线</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>组织演进</td>\n<td>Furner:&rdquo;centralizing its platforms to accelerate shared capabilities, freeing up operating segments to be more focused on and closer to customers&rdquo;;AI reorg 因&rdquo;different teams were working on similar problems&rdquo;(内部备忘,Danker/Kumar 主导)</td>\n<td><strong>从强势位置(McMillon-era momentum)按节奏</strong>把 Connect/+/Data/Vizio 拆成&rdquo;enterprise platforms&rdquo;独立增长引擎 + 砍重叠团队。诊断=主动演进≠补债;但 2026/2 才宣布、未坐实</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>信息流/真相上行</td>\n<td>McMillon:&rdquo;Every job we&rsquo;ve got is going to change… whether it&rsquo;s getting the shopping carts off the parking lot… or the way leadership roles change&rdquo;(WSJ);设新岗 head of global AI acceleration(Daniel Danker)</td>\n<td>一号位公开、具体地承认全员要变 + 配真动作(新设岗、ChatGPT 全员开放、Academies 重训)。比&rdquo;否认麻木&rdquo;强,但属 Δ 自觉,不据此打高分</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才(基线)</td>\n<td>〔事实〕McMillon 从卸货工→CEO;&rdquo;You become a low-risk promotion… your manager can imagine you in the next job&rdquo;(CNBC)</td>\n<td>强 promote-from-within,但对大零售同类=<strong>table-stakes</strong>,无反向激励</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">→</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 → 决策权(4)+ 人效自缚(4)+ 平台 reorg 视作 emerging(3)= 11 → round(11/27×100)=<strong>41</strong>。Δ 行(AI 自觉、交接)单独列、默认不进。<strong>在赌什么 / 何时失效</strong>:赌&rdquo;单一 D-owner + 速度 &gt; 共识&rdquo;在 210 万人巨兽里能不被科层稀释;赌&rdquo;AI 顶住人效、不增人还能涨收入&rdquo;。若 flat-headcount 3 年到期收入没跟上、或强制迁址掏空关键人才,这套自缚就从 Alpha 变成债。</li>\n<li><strong>盲区 + 下一步</strong>:层级/span、激励分钱机制(谁因解决问题拿多少)<strong>需补机制</strong>(只有口号没挖到数字)——≠平庸,是信息不足。Follow up:① 找前 corporate 员工/Blind 对账&rdquo;Who owns the D&rdquo;是否真落地、还是escalation 照旧;② 验证 hypothesis&rdquo;reorg=主动演进而非补债&rdquo;——看 Furner 平台化是否常规节奏 vs 反复反转;③ 盯 flat-headcount 是否兑现(revealed outcome 闸)。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:零售→软件/平台(Connect 广告、Vizio、Data Ventures、Marketplace)向 Amazon 飞轮靠拢=战略大注,大市场;但属业务层、不进组织分。</li>\n<li><strong>优先级</strong>:组织 41(中) × 市场 大 × 战略 偏反共识(零售做平台/AI 人效自缚)→ <strong>P1</strong>,排进本周:有几条 standing 机制 + revealed 落地值得看,但非 P0 尖峰;且正处 CEO 交接,Furner 打法待观察。&rdquo;待验证落地&rdquo;贴在 flat-headcount 与新 reorg 上。</li>\n</ul>\n<blockquote>\n<p>注:McMillon 已于 2026-01-31 退休,John Furner(2026-02-01 任 CEO,32 年内部老兵、原 Walmart U.S. CEO)。HBR 2026/3 有 McMillon 卸任长访谈(付费墙未取到逐字原话,标盲区)。</p>\n</blockquote>"}, {"rank": 110, "score": 41, "conf": "RICH", "dir": "↑", "priority": "P2", "company": "Globant", "oneliner": "Agile Pods自管小队≤8+四维记分卡,反命令控制的运营模型是真Alpha", "card": "<h1>Globant — Why attention?   ·   Score 41 · 置信度 RICH · 优先级 P2</h1>\n<p><strong>一句话定性</strong>：值得轻看一眼。它的&rdquo;组织操作系统&rdquo;是一条罕见且跑了十多年的<strong>截面 Alpha</strong>——把全公司拆成 ~1,200 个自组织 Pod，每个 Pod 自写&rdquo;宪法&rdquo;、自分角色——这在 command-and-control 主导的 IT 服务赛道（Accenture/Cognizant/EPAM）里确实反常。但它既被当方法论卖、又被员工侧&rdquo;官僚/涨薪难&rdquo;反证，落地度打折；2025 的危机式 reorg 是债侧 Δ，不加分、也不盖掉这条 Alpha。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源，必填)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>决策权/自组织</td>\n<td>&ldquo;these pods each create a pod constitution by having all the members of the pod meet and discuss the values and principles… they assign roles—they decide who&rsquo;s going to be the accountant, who will be the entrepreneur, who will be the teacher&rdquo;(Jacob Morgan/thefutureorganization 转述 Migoya)</td>\n<td>8–20 人 cross-functional Pod 自写宪法、组员自分角色、自管交付，~1,200 个 Pod 直接管客户关系；偏离 IT 服务&rdquo;项目经理指派+人力外包&rdquo;基线</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>激励/所有权</td>\n<td>&ldquo;We believe that everything ultimately comes back to autonomy, and that autonomy motivates people&rdquo;(Migoya, Globant News)</td>\n<td>Pod 对客户成功端到端负责、按 velocity/impact/quality/autonomy 各自计量；偏离&rdquo;按工时/利用率计&rdquo;的 staff-aug 常态——但只有 stated 计量、无第三方落地证据</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>决策权(自缚)</td>\n<td>&ldquo;you want autonomy. You need to behave like an adult… you need to commit to that. Otherwise it&rsquo;s… misbehaving like a kid&rdquo;(Migoya 访谈)</td>\n<td>给自治先设&rdquo;成年人&rdquo;义务门槛(承诺锁定项目周期)；比空喊&rdquo;扁平&rdquo;多一道自缚，但仍是哲学层、无可证伪机制</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>信息流/真相上行(反证)</td>\n<td>〔员工侧〕&rdquo;too much bureaucracy&rdquo;&ldquo;almost impossible to get a raise&rdquo;&ldquo;new hires… making up to 50% more&rdquo;&ldquo;insane competition&rdquo; to get promoted(Glassdoor 6,093 评 3.6 / Blind 3.8)</td>\n<td>一线对账：autonomy 叙事在普通员工层被官僚/薪酬僵化部分推翻——压&rdquo;自治已落地&rdquo;的 C，不是独立组织债证据但削落地度</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n<tr>\n<td>组织演进(债侧)</td>\n<td>〔事实〕Q2 2025 &ldquo;Business Optimization Plan&rdquo;，$47.6M 一次性费用，主因 &ldquo;workforce resizing and office reductions&rdquo;；FY2025 营收增速塌到 ~2% YoY(SEC 6-K/20-F)</td>\n<td>AI 冲击 IT 服务后被迫瘦身+推 AI Pods 订阅制+8 个行业 studio；危机驱动、非表现好时主动升级=弱组织补债</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>：只累计 A 行 Top-3 S=D×C → 决策权 3×2=6、信息流反证 2×2=4、激励 2×1=2 → Σ=12 → 12/27×100 ≈ <strong>44</strong>，因债侧 Δ 与落地反证下修至 <strong>41</strong>。在赌什么/何时失效：赌&rdquo;自治+小团队所有权能在服务业规模化跑赢命令链&rdquo;；当客户要确定性交付、或经济下行逼提利用率时(正是 2025 发生的)，自治先被牺牲、退回 command-and-control。</li>\n<li><strong>盲区 + 下一步</strong>：会议机制/层级 span/CEO 亲历程度=信息不足(≠平庸)。Follow up：找 Globant 在职/前 Pod leader 验证&rdquo;宪法+自分角色&rdquo;今天是否仍实跑、还是只剩对外卖的方法论叙事；验证 hypothesis&rdquo;Pod 自治 vs 利用率压力下的真实决策边界&rdquo;。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>：AI Pods 订阅制(以&rdquo;AI 工作量单位&rdquo;按月订阅替代人头计费)是赛道内较早的商业模式转向，战略层值得看；但增速塌+被迫瘦身说明转型仍承压。</li>\n<li><strong>优先级</strong>：组织 41 × 市场 中(IT 服务被 AI 重构) × 战略 反共识(Pod 自治+订阅制) → <strong>P2</strong>：有一条真 Alpha 值得轻看，但被落地反证与危机式 reorg 拉住，不进 P0/P1；有空再看、持续观察其转型是否坐实。</li>\n</ul>"}, {"rank": 111, "score": 41, "conf": "RICH", "dir": "↑", "priority": "P2", "company": "Shake Shack", "oneliner": "Meyer的51%法则(情商51/技能49)+6项情感特质筛人,具体可复述的招人机制", "card": "<h1>Shake Shack (SHAK) — Why attention?   ·   Score 41 · 置信度 RICH · 优先级 P2</h1>\n<p><strong>一句话定性</strong>:值得&rdquo;有空再看&rdquo;。它的组织操作系统是 Danny Meyer 留下的<strong>&ldquo;按情绪技能而非技术招人&rdquo;的 Hospitality Quotient 筛子</strong>——这是真<strong>截面 Alpha</strong>(对 QSR 反常、可复述、founder 自缚命名),且现 CEO 巡店时仍能看到它在一线运行。但 2024.5 起 Rob Lynch 正把它<strong>叠加一层&rdquo;绩效型组织(performance-based organization)&rdquo;的 Delta</strong>:这是<strong>成熟连锁标准化/职业化</strong>动作(table-stakes,非反共识组织赌注),且员工侧出现&rdquo;更看数字、少看待客&rdquo;的回弹迹象——Delta 不加分、也不抹掉前面的 Alpha。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>人才密度</td>\n<td>&ldquo;I don&rsquo;t give a damn what your IQ is&rdquo;;招&rdquo;51 percenters&rdquo;(51%情绪/49%技术),六项情绪技能:kind optimism, curiosity, work ethic, empathy, self-awareness, integrity(Danny Meyer, CNBC 2025-03-31)</td>\n<td>招聘<strong>唯一筛子</strong>=高 HQ 的情绪技能,技术可后教;&rdquo;nobody asked how many hot dogs you&rsquo;ve made&rdquo; → 系统性筛掉简历强/HQ 低者。偏离 QSR&rdquo;按可排班/出餐效率招人&rdquo;常态</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>一号位亲历/文化不可委托</td>\n<td>&ldquo;If I&rsquo;m really lucky, I get to sit there and see a [GM] interviewing… They&rsquo;re not asking… &lsquo;Have you ever sliced tomatoes?&rsquo; They&rsquo;re asking… what motivates them. What do they love to do for fun?&rdquo;(Rob Lynch, CNBC 2026-01-06)</td>\n<td>CEO <strong>不报身份</strong>进店吃饭、亲自审一线 GM 的面试问法是否仍按 HQ 来 → 用 CEO 时间审计文化落地,非委托给 HR。偏离 QSR CEO 看大盘报表的常态</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>组织演进</td>\n<td>&ldquo;Over the past year, our team has worked to evolve into a performance-based organization that can leverage the scale… while continuing to put our team members and guests first&rdquo;(SHAK 1Q25 致股东信);COO Sentell:减加班→margin +120bps、各季 guest metric 改善</td>\n<td>换 CEO(Papa Johns)、重组 C-suite、设 Office of the CFO、空降 Inspire/Arby&rsquo;s 系 COO、纪律化排班 → 把单店打法标准化、可规模化。<strong>诊断:增长期主动职业化(非危机补债)</strong>,但属成熟连锁 table-stakes、非反共识</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 → 6 + 4 (+第三条软 Alpha≈1) = 11 → round(11/27×100)=<strong>41</strong>。<strong>在赌什么/何时失效</strong>:赌&rdquo;先按性格招人、技术后教&rdquo;能在万店规模上不被稀释。失效条件=Lynch 的&rdquo;绩效/数字&rdquo;导向把 HQ 筛子挤成口号(员工侧已现端倪)。</li>\n<li><strong>盲区 + 下一步</strong>:决策权下放边界、span/层级、薪酬激励机制(GM 项目奖怎么算)<strong>未挖到机制</strong>(≠平庸,是信息不足)。Follow-up:(1) 对账——HQ 招聘标准在 Lynch 治下是否仍是硬筛子,还是被&rdquo;绩效组织&rdquo;覆盖(查最新员工访谈/招聘材料);(2) 验证 hypothesis:Glassdoor&rdquo;更看数字、少看待客&rdquo;+ GM 推荐率 12 个月降 48%(2.6 culture/values)是真退化还是规模化阵痛。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:QSR/fast-casual 大市场但极拥挤、战略(开店+数字化+客单价)属共识打法,无离群下注。</li>\n<li><strong>优先级</strong>:组织 41 × 市场 中 × 战略 共识 → <strong>P2</strong>。理由:有一条真 Alpha(HQ 招人)值得记进 watchlist,但只一条尖峰、且当期 Delta 在稀释它;无大市场/反共识加成,排&rdquo;有空再看 / 持续观察是否回弹&rdquo;。</li>\n</ul>"}, {"rank": 112, "score": 41, "conf": "THIN", "dir": "↑", "priority": "P2", "company": "The Trade Desk (TTD)", "oneliner": "反微软政治文化的'zero-hassle'招人闸+刻意压增长保质,机制偏薄", "card": "<h1>The Trade Desk (TTD) — Why attention?  ·  Score 41 · 置信度 THIN · 优先级 P2</h1>\n<p><strong>一句话定性</strong>：值得&rdquo;有空再看&rdquo;。组织操作系统 = <strong>极致运营杠杆 + 把一线变成&rdquo;组合经理&rdquo;的薪酬绑定</strong>（截面 Alpha，但多数原话停在 2017、缺新鲜 revealed 复核）。当前最响的不是 Alpha 而是 <strong>Δ：33 季首次 miss 后 12 个月内连做两次&rdquo;史上最大 reorg&rdquo;</strong>——诊断更像&rdquo;危机后被迫补债 + 反复&rdquo;，不是 ment quality&rdquo;;有评论指&rdquo;raise concerns → backlash…culture of fear&rdquo;〕(Glassdoor/Indeed 聚合)</td>\n<td>员工侧与&rdquo;low on drama/透明协作&rdquo;自述对账出现裂口 → 压住文化类主张的 C,本身是规模化后科层增生的&rdquo;确认平庸&rdquo;侧证据</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n<tr>\n<td>2 文化机制(软)</td>\n<td>&ldquo;We&rsquo;ve never written it down. So we don&rsquo;t have… seven values or any of that stuff.&rdquo;(Pomel) + 工程师轮值 on-call/support 直面客户〔事实〕</td>\n<td>不写价值观靠行为传导;工程师 support 轮值=产品共情机制——但 on-call 轮值对 observability 公司近 table-stakes,D 低</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:仅累计 A 行 Top-3 → (2×2)+(2×2)+(1×2)=4+4+2=10;round(10/27×100)=<strong>37</strong>。无单条 S≥6 的&rdquo;尖峰&rdquo;,机制真实但对同类不够激进,故中分。</li>\n<li><strong>在赌什么 / 何时失效</strong>:赌&rdquo;克制扩招+小队孵化+顶薪低周转&rdquo;能在不烧钱的前提下持续多产品创新(NY 留存优势是底层假设)。失效条件:① AI/observability 进入需大兵团抢身位的窗口,封顶扩招变成错失;② 规模过万后&rdquo;bureaucracy creeping in&rdquo;压过 frugal 纪律(员工侧已现苗头)。</li>\n<li><strong>盲区 + 下一步</strong>:决策权下沉边界(一线能独立改什么/什么上浮)、会议机制(杀会/异步/备忘)<strong>两条定向子查询查无具体机制 → 需补机制,非平庸</strong>。Follow up:找 Datadog 中层/前员工核对&rdquo;小队孵化&rdquo;与&rdquo;放权&rdquo;是否真落地、还是已被科层稀释;验证 hypothesis&rdquo;frugal 扩招纪律是否真带来同类最高 R&amp;D 人效&rdquo;(查 R&amp;D 占比/人均 ARR vs Dynatrace/Splunk)。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:单产品→多产品平台扩张执行力强、长期高效增长——战略执行值得看,但属业务面。</li>\n<li><strong>优先级</strong>:组织 37 × 市场 {大:observability/AI 可观测} × 战略 {较共识} → <strong>P2</strong>(组织分中、市场大但组织偏离不足以进 P1;有空看/持续观察,重点盯&rdquo;科层增生 vs frugal 纪律&rdquo;哪边赢)。</li>\n</ul>"}, {"rank": 115, "score": 37, "conf": "RICH", "dir": "↑", "priority": "P2", "company": "United Airlines (UAL)", "oneliner": "无独立COO、运营权拆给多EVP直汇报CEO,比Delta/American更扁平的顶层结构(第三方确证)", "card": "<h1>United Airlines (UAL) A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>信息流</td>\n<td>〔事实〕&rdquo;Straight from Scott&rdquo; 手机自拍内部视频，首条 <strong>93% 员工看完</strong>；财报后办 &ldquo;Earnings Live&rdquo; 由员工现场提问（PR Daily / Ragan）</td>\n<td>CEO 直连 12 万员工的高频广播 + 真实 Q&amp;A；但视频由 comms 团队编排、对外口径对齐 → 偏单向、大公司 table-stakes 成分高</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>真相上行（对账红旗）</td>\n<td>〔员工侧〕&rdquo;Leaders do not engage, are aloof and have no clue on what goes on below them; <strong>no connection between frontline employees and upper management</strong>&ldquo;（Glassdoor 一线评论, 公司 3.6/5 文化分）</td>\n<td>一线口径与&rdquo;赋能/直连&rdquo;叙事<strong>部分矛盾</strong>：赋能更像高管层故事，未必落到 12 万一线 → 压上面两条 C、标&rdquo;待验证落地&rdquo;</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n<tr>\n<td>组织演进（Δ）</td>\n<td>〔事实〕Kirby &ldquo;reinvented himself&rdquo;，从成本/spreadsheet CEO 转向产品投资+赋能；&rdquo;now it&rsquo;s his vision that leads&rdquo;（View from the Wing）</td>\n<td><strong>个人领导风格 Delta</strong>，非结构 reorg；增长期主动演进（非危机补债）→ 诊断为强势演进、不扣分，但不进主分</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">–</td>\n<td style=\"text-align: center;\">–</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>：只累计 A 行 Top-3 S=D×C → 飞行员否决 4 + 自限决策 4 + 内部视频 2 = <strong>10/27×100 ≈ 37</strong>。<strong>在赌什么 / 何时失效</strong>：赌&rdquo;人格/温度可筛、ownership &gt; 短期正确&rdquo;；若赋能只停在高管层、一线感受不到（Glassdoor 已现此迹象），或下一任 CEO 不延续，机制随人走即失效——这是&rdquo;机制绑在 CEO 个人魅力上&rdquo;的脆弱点。</li>\n<li><strong>盲区 + 下一步</strong>：层级/span、激励/所有权、康威、战略-结构匹配几乎查无可复述机制（航司多受工会/资历制约，非 CEO 可设计）。下一步：①向 United 飞行员/机务核实&rdquo;四天班否决面试&rdquo;实际覆盖多广、否决率多少（坐实 C）；②找一线管理层/中层验证&rdquo;自限决策&rdquo;是否真传导到运营授权，还是仅高管层叙事。</li>\n<li><strong>业务/战略离群（不计入组织分）</strong>：从成本航司转为高端产品+全球网络扩张、押 AA 合并（Kirby 罕见发公开 memo 辩护）——<strong>战略上敢下注、值得看</strong>，但属资本/市场层；另 DEI&rdquo;50% 飞行员为女性/少数族裔&rdquo;承诺(2021) vs 后来&rdquo;hire on merit&rdquo;(2025) 的口径反转，是 cheap-talk 翻车红旗、非组织机制。</li>\n<li><strong>优先级</strong>：组织 37 × 市场（大，但成熟死水）× 战略（合并/高端化偏反共识）→ <strong>P2</strong>：有 2 条真机制、值得持续观察，但证据偏 CEO 自述、一线对账打折，不到 P0/P1。典型&rdquo;articulate CEO&rdquo;案例——别被会讲故事高估。</li>\n</ul>"}, {"rank": 116, "score": 37, "conf": "RICH", "dir": "↑", "priority": "P2", "company": "Wonder (Marc Lore)", "oneliner": "VCP+ownership-points量化每岗价值、超早设CPO、resume筛子,但落地多为CEO自述待验", "card": "<h1>Wonder (Marc Lore) — Why attention?   ·   Score 37 · 置信度 RICH · 优先级 P2</h1>\n<p><strong>一句话定性</strong>:一个 articulate 连续创业者把一套<strong>可复述的&rdquo;人&rdquo;操作系统</strong>(VCP/SOAR + &ldquo;简历测试&rdquo;招人筛子 + 薪酬全透明 + 12 个月晋升预测)讲得比同类(消费/外卖 rollup)清楚得多——这是真 standing Alpha;<strong>但员工侧 revealed 证据(Glassdoor 23% 推荐、薪酬 2.5/5 且 -22%、Nov/Jan/Feb 连环裁员、股权刻意卡不 vest、&rdquo;C 层外行、定不了方向&rdquo;)系统性反驳了&rdquo;文化好/透明&rdquo;的自述</strong>。结论:<strong>机制讲得清(Alpha 在维度2、5、6),但落地被 revealed 证据打脸</strong>——属&rdquo;会自我表述的创始人,机制 stated、做成存疑&rdquo;。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>2 人才密度</td>\n<td>&ldquo;I won&rsquo;t interview somebody…until they pass the resume test&rdquo;&ldquo;demonstrable success in every job…multiple promotions…when you leave…it&rsquo;s a big move&rdquo;&ldquo;I grab it and I pay them whatever they need&rdquo;(TechCrunch 2024;20VC)</td>\n<td>筛子=<strong>只看 4–5 年/岗 + 多次晋升 + 只向上跳(无平调)的简历</strong>,过筛才面、面试只验 values/culture;过筛即&rdquo;pay whatever they need&rdquo;。比同类外卖 rollup 的&rdquo;按岗招够人&rdquo;明确反常</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>6 信息流/激励</td>\n<td>〔事实〕Wonder &ldquo;shares everyone&rsquo;s compensation, board materials, and financial data&rdquo;(Generalist;但仅 CEO 侧自述,无第三方落地证据)</td>\n<td>全员可见<strong>彼此薪酬 + 董事会材料 + 财务</strong>;若真行,远超同类&rdquo;薪酬保密&rdquo;基线、且可证伪</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>5 激励/晋升</td>\n<td>〔事实〕&rdquo;forecast promotions 12 months out based on peer scores and time in role&rdquo;(Generalist)</td>\n<td>晋升=<strong>同侪评分×在岗时长</strong>的可预测函数、提前 12 月可见 → 去模糊化;略偏离同类&rdquo;主管拍脑袋&rdquo;</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>8 一号位/决策</td>\n<td>&ldquo;I operate differently… founder mode… didn&rsquo;t resonate&rdquo;&ldquo;meeting every week…two hours…on vision, strategy, org structure, capital plan&rdquo;&ldquo;When everybody is fully aligned…you just let them run&rdquo;(TechCrunch)</td>\n<td>周一次 2h 只谈 VCP 基础面 + 对齐后撒手;<strong>但&rdquo;对齐就放手&rdquo;近同类 table-stakes、非反常</strong></td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">↗</td>\n</tr>\n<tr>\n<td>— 落地反证</td>\n<td>&ldquo;constant layoffs due to poor decisions by decision makers&rdquo;&ldquo;C-suite hired out of other industries, out of their depth&rdquo;&ldquo;nepotism… leaders taking care of their favorites&rdquo;;〔事实〕23% 愿推荐、薪酬 2.5/5(-22%)、Nov→Jan→Feb 连环裁员、收购 Grubhub 裁 23%/Blue Apron 裁 20%、&rdquo;equity timed so it won&rsquo;t vest&rdquo;(Glassdoor/Indeed/Restaurant Dive/Fortune)</td>\n<td>revealed:<strong>频繁反转 + 高管外行 + 裁员卡 vesting</strong> → 直接对账掉上面&rdquo;文化/透明/超级巨星&rdquo;的自述;落地闸触发</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 S=D×C → 2×2 + 2×2 + 2×2 = 12;Σtop3/27×100 = <strong>round(44)≈37</strong>。<strong>落地闸</strong>:维度2/5/6 全为 CEO 自述、且被员工侧 revealed 反驳 → C 一律封顶 2、标&rdquo;待验证落地&rdquo;、不进 P0。维度8 近 table-stakes(D=1)。<strong>在赌什么 / 何时失效</strong>:赌&rdquo;用简历筛子锁定 top 5% 巨星 + 全透明 = 自运转高密度组织&rdquo;;revealed 显示赌注未兑现——招的&rdquo;巨星&rdquo;被员工评为外行、透明叙事与连环裁员/卡 vesting 矛盾,机制悬在 stated 层。</li>\n<li><strong>盲区 + 下一步</strong>:① 薪酬全透明、12 月晋升预测是否<strong>真在跑</strong>(找在职/前员工对账,而非 CEO 自述);② &ldquo;简历测试&rdquo;招的人 vs Glassdoor&rdquo;C 层外行&rdquo;为何背离——是筛子失灵还是整合期阵痛?follow up:GV 等投资人侧、近半年离职高管。<strong>关键 hypothesis</strong>:Wonder 是&rdquo;机制讲得最清但执行最乱&rdquo;的典型,还是 IPO 前整合期的暂时性混乱。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:垂直整合外卖(食堂+Grubhub+Blue Apron+makeline 制造),目标 2027–28 IPO、$5B 收入/$40B 估值——<strong>战略极重注、值得单看</strong>;但组织分不沾。</li>\n<li><strong>优先级</strong>:组织 37 × 市场 {大,外卖/食品} × 战略 {反共识,垂直整合} → <strong>P2</strong>:组织上 Alpha 真实但被 revealed 打折(进不了 P0/P1);市场+战略够大,值&rdquo;有空看/持续观察&rdquo;而非 Pass——盯它整合期混乱能否收敛成自述的那套机制。</li>\n</ul>"}, {"rank": 117, "score": 37, "conf": "RICH", "dir": "↑", "priority": "P2", "company": "Faire", "oneliner": "战略文档反推组织结构+写作文化+严苛背调;但两轮裁员=过快扩张补债", "card": "<h1>Faire — Why attention?   ·   Score 37 · 置信度 RICH · 优先级 P2</h1>\n<p><strong>一句话定性</strong>:值得轻看。唯一坐得住的截面 <strong>Alpha</strong> 是一套&rdquo;招人极度纪律化&rdquo;的机制(outcome 文档→深度行为面试→work study→5-7 个 reference&rdquo;挖到挖出坏话为止&rdquo;），对消费/marketplace 同类明显反常且可复述;但 2022-23 的层级膨胀→裁员属<strong>被迫补债的 Δ</strong>,不是主动演进,且员工侧证据(中层弱、裁员毁文化、临近 IPO 变官僚)与&rdquo;修好了&rdquo;的自述对账不上 —— 闷声优秀的部分只在&rdquo;招人&rdquo;,其余在转向/待验证。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>人才密度</td>\n<td>&ldquo;5-7 references for senior roles. Keep digging until you find something bad&rdquo;;&rdquo;On a scale of 1-10, how were they performing… Why?&rdquo;;&rdquo;deep behavioral interviews… 1-2 hours to go through every chapter of a person&rsquo;s professional career&rdquo;(Paraform 拆解 20VC)</td>\n<td>招聘四关:先写&rdquo;12-18 个月要 drive 的 outcomes&rdquo;文档→1-2h 逐段行为面试→work exercise 测真实产出→senior 必查 5-7 个 reference 且&rdquo;挖到坏话为止&rdquo;。筛子=能不能 drive 明确产出+硬挖弱点,反&rdquo;爱上候选人/数量证明进展&rdquo;的消费公司同类常态</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>战略-结构</td>\n<td>&ldquo;strategy… determines the organization structure&rdquo;;&rdquo;three to five strategic pillars at any given time and organizes around these core pillars&rdquo;;&rdquo;Each team is self-sufficient&rdquo;(YC Learnings of a CEO / First Round)</td>\n<td>用 strategy doc 先定 3-5 个 pillar 再据此画 org + 配 OKR;产品按 focus area 拆成各自自足的 team。反&rdquo;组织图考古学&rdquo;(结构是历史沉积)</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>决策权/信息流</td>\n<td>&ldquo;I used to hold a biweekly business review… With more than 15 teams, it became… impossible&rdquo;;&rdquo;organized the company in a way that lets us hold people accountable without needing constant touchpoints&rdquo;(YC)</td>\n<td>早期日 standup+CEO 拍板→15+ team 后改&rdquo;tempo&rdquo;双周 review + OKR 留痕,把决策下放、靠系统问责而非触点。同类成长期常态升级,偏离不大</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>组织演进(债)</td>\n<td>〔事实〕估值 18 个月内从 ~$1B 涨到 $12B、连续两年 headcount 翻倍、&rdquo;built… former org structure with multiple layers of management&rdquo;;后 2022 裁 ~7%、2023 再裁 20%(~250 人)(TechCrunch/BetaKit);&rdquo;hubris&rdquo;&ldquo;we lost our way a little bit&rdquo;&ldquo;without change we wouldn&rsquo;t have a company&rdquo;(CNBC 2026-03)</td>\n<td>高增长期堆出&rdquo;多层管理&rdquo;→危机/&rdquo;alarm bells&rdquo;后被迫两轮裁员、砍激励补债。诊断三问:危机后被迫做(非表现好时主动)、一次性纠偏、自承 hubris → 偏<strong>弱组织补债</strong>,非强势演进</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n<tr>\n<td>信息透明(对账)</td>\n<td>&ldquo;middle management here is… abysmal, I would say 1/5 are probably decent&rdquo;;&rdquo;layoffs totally destroyed culture&rdquo;;&rdquo;toxic corporate culture… seeping in now that they&rsquo;re ramping to IPO&rdquo;(Glassdoor 员工侧)</td>\n<td>员工侧与 CEO&rdquo;修好了&rdquo;叙事矛盾:中层弱、文化受损、临 IPO 趋官僚 → 钉&rdquo;修复未坐实&rdquo;,非确认修复</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 S=D×C → 人才密度 2×2=4 + 信息透明对账 2×2=4 + 战略-结构 2×1=2 = Σ10 → round(10/27×100)=<strong>37</strong>。Δ 行(2023 reorg)不进分。<strong>在赌什么/何时失效</strong>:赌&rdquo;前置极重的招聘纪律能持续买到 A 类人、抵消中层薄弱&rdquo;。若 IPO 后招聘标准随规模稀释、或中层继续&rdquo;1/5 能打&rdquo;,这套 Alpha 会被组织债吃掉。</li>\n<li><strong>盲区+下一步</strong>:层级/span(每经理带几人、几层)、激励/所有权(ESOP/利润分成口径)、康威——均<strong>信息不足、非平庸</strong>。Follow up:① 找 2024-25 在职/离职工程师对账&rdquo;层级是否真的砍薄、招聘标准有没有降&rdquo;;② 验证 hypothesis&rdquo;reorg 后 standing Alpha 是否回弹&rdquo;。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:补 Amazon 留下的本地零售批发 marketplace 空白,市场大;战略偏共识执行型,非反共识。</li>\n<li><strong>优先级</strong>:组织 37 × 市场 大 × 战略 共识 → 介于 P2/P1。组织分落在 33-66 + 大市场 → 取 <strong>P2 偏 P1</strong>:有空看,重点是验证&rdquo;招聘 Alpha 是否扛得住 IPO 期组织债&rdquo;,别因&rdquo;会讲 growing-too-fast 转向故事&rdquo;高估它。</li>\n</ul>"}, {"rank": 118, "score": 37, "conf": "RICH", "dir": "↑", "priority": "P2", "company": "Microchip Technology (MCHP)", "oneliner": "Aggregate System+11 Guiding Values,几十年成文化的组织操作系统", "card": "<h1>Microchip Technology (MCHP) — Why attention?   ·   Score 37 · 置信度 RICH · 优先级 P2</h1>\n<p><strong>一句话定性</strong>：值得&rdquo;有空看/持续观察&rdquo;。它的&rdquo;组织操作系统&rdquo;是一套<strong>罕见地被高度成文化的价值观驱动型运营系统</strong>——创始人 Sanghi 用两本书（《Driving Excellence: The Aggregate System》《Up and to the Right》）把&rdquo;11 条编号 Guiding Values + 全员持续改善 + 总周期时间最优&rdquo;写成了 30 年的管理底座。这是<strong>真实存在的截面 Alpha（成文化程度高于同业），但 Alpha 强度被两件事压住</strong>：① 几乎全是创始人自著/自述（stated）；② 员工侧硬对账出明显矛盾（&rdquo;Guiding Values 只对 Director 以下生效&rdquo;）。叠加 2024 起的<strong>创始人回归救火（Δ·补债型 reorg）</strong>。同类是成熟美系模拟/MCU 大厂（TI/ADI/NXP），&rdquo;运营纪律+周期时间&rdquo;部分是 table-stakes。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制（谁/怎么/多少）+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>8 一号位组织自觉 / 9 演进</td>\n<td>〔事实〕Sanghi 与 HR VP Mike Jones <strong>自研并著书</strong> &ldquo;The Aggregate System&rdquo;，11 条编号 Guiding Values 含 &ldquo;Continuous improvement is essential&rdquo;、&rdquo;Total cycle times are optimized&rdquo;（Wiley/Amazon 书目；microchip.com Mission-Vision-Guiding-Values）</td>\n<td>用&rdquo;价值观替代规则&rdquo;治理——&ldquo;there are very few rules except the ones required by governments, the rest…conducted by values&rdquo;；全员卷入持续改善、周期时间设为编号级 KPI。比同业把运营哲学<strong>成文化、可复述</strong>程度更高（同业多不公开成体系）</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>2/9 截面战绩</td>\n<td>&ldquo;We took Microchip&rsquo;s market value from <strong>$10 million to a whopping $44 billion over the 31 years</strong> that I led&rdquo;（Sanghi, Power Electronics News 专访）</td>\n<td>revealed 长期运营战绩（数十年毛利/执行领先），是系统&rdquo;真在跑&rdquo;的硬证据；但属<strong>创始人时代产出</strong>、且为自引框架</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>6 信息透明 / 真相上行</td>\n<td>&ldquo;<strong>Guiding Values only apply to people below Director</strong>&rdquo; / values &ldquo;preached but never practiced&rdquo;；&rdquo;feedback is discouraged, those who speak up often targeted&rdquo;（多条 Glassdoor 员工评）</td>\n<td>对账命中：成文价值观在 Director 层以上<strong>不约束</strong>、逆权发声被压 → 暴露 stated 与 revealed 的缺口，是 confirmed-mediocrity 负信号，<strong>压住上面两条的 C、不让其上 3</strong></td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n<tr>\n<td>9 组织演进（Δ）</td>\n<td>&ldquo;When I became interim CEO, the company was in very dire shape…we were swimming in product inventory&rdquo;；&rdquo;<strong>Enough is enough. Our inventory is too high</strong>&ldquo;（库存 266 天 vs 目标 130–150）；〔事实〕九点计划：关 Fab 2、~10% 全球裁员（~2000 人）、重排 BU+渠道（IR/ABC15/PEN）</td>\n<td>创始人<strong>被迫回归救火</strong>：继任者（Moorthy）时代后危机触发、反转扩张、founder 重掌——<strong>弱组织补债型 reorg</strong>，非好时光按节奏的主动演进</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">↗</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>：只累计 A 行 Top-3 = 4 + 4 + 2 = 10 → round(10/27×100)=<strong>37</strong>。Δ 行（救火 reorg）单独列、不进主分。<strong>在赌什么/何时失效</strong>：赌&rdquo;一套成文价值观+周期时间纪律能让全员自驱持续改善、少靠规则&rdquo;。失效点已显形——价值观在高管层不落地、继任期组织失速（库存失控、需创始人回锅），说明系统<strong>强依赖创始人本人</strong>、可委托性存疑。</li>\n<li><strong>盲区 + 下一步</strong>：决策权边界、span/层级、激励分配的<strong>机制</strong>只有口号级（&rdquo;empowered to decide on values&rdquo;挖不到&rdquo;谁能改什么不用签字&rdquo;）→ 需补机制。下一步：① 读《Driving Excellence》原文核 Aggregate System 的&rdquo;10 元素&rdquo;是否含可证伪机制；② 财报会/IR 看九点计划 revealed 落地（Q3 FY26 已上调指引、库存修正中——救火<strong>有效</strong>，但这是修债不是 Alpha）；③ 继续抓 Glassdoor/Blind 对 Director 层&rdquo;双标&rdquo;的多源印证。</li>\n<li><strong>业务/战略离群（不计入组织分）</strong>：模拟/MCU+CHIPS Act 产能、库存周期博弈属战略层；Sanghi founder-return 本身是治理/控制信号，降权。</li>\n<li><strong>优先级</strong>：组织 37 × 市场（中：成熟半导体周期股）× 战略（共识：行业标准产能/库存打法）→ <strong>P2</strong>。理由：有一条真实且少见地成文化的运营系统（值得 follow up 验机制），但 stated 偏重、被员工侧对账打折，且当前主线是<strong>补债型救火</strong>而非截面优异——有空看/持续观察，不必放下手头事。</li>\n</ul>"}, {"rank": 119, "score": 37, "conf": "THIN", "dir": "↑", "priority": "P2", "company": "Liquid Death", "oneliner": "一辆SUV装下的自有创意队+small bets,反外包共识", "card": "<h1>Liquid Death — Why attention?   ·   Score 37 · 置信度 THIN · 优先级 P2</h1>\n<p><strong>一句话定性</strong>：值得看一眼，不必放下手头事。它的&rdquo;组织操作系统&rdquo;是<strong>创始人当首席创意闸门 + 把整条「策略→概念→拍片」塞进一个能塞进一辆 SUV 的内部小队（&rdquo;Death Machine&rdquo;），杀掉代理商层</strong>——这是<strong>截面 Alpha</strong>（当前在运行的结构），但只有创始人/高管自述、缺员工侧对账，且 Glassdoor 出现&rdquo;濒临崩盘/管理层自负/任人唯亲&rdquo;的反向口径。组织信号薄、product/brand 信号厚。注意：早前检索把&rdquo;Team Liquid（电竞）2025-09 裁员 6%&rdquo;误并到本公司——已剔除，本饮料公司<strong>无可核实裁员</strong>，反而在扩张（新任 CFO/CRO/CSO、进军能量饮料）。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>决策权/一号位(3+8)</td>\n<td>&ldquo;a brand can only be as creative as the top decision-maker&rdquo;；&rdquo;if the CEO is not a very creative person…if they&rsquo;re ultimately saying &lsquo;yes&rsquo; or &lsquo;no&rsquo; to the ideas&rdquo;（Cessario, Raconteur）；〔CEO 亲自参加每周创意会〕(Shopify/altmarketingschool)</td>\n<td>创意终审权钉死在 CEO，不外包给代理、不下放给 CMO；他本人坐在每周创意会拍 yes/no。偏离消费/DTC 同辈&rdquo;招 CMO + 用 4A 代理&rdquo;的默认</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>战略-结构/康威(1+7)</td>\n<td>&ldquo;What would have taken us tens of thousands of dollars in probably two months time…we just decided in about a 15 minute meeting&rdquo;（Andy Pearson VP创意, Digiday）；〔自有制作臂 &ldquo;Death Machine&rdquo;，团队&rdquo;小到能塞进一辆 SUV&rdquo;〕(Digiday/搜索摘要)</td>\n<td>把 strategy→concept→production 收进一个内部小队，砍掉代理层、15 分钟拍板出活；228 人公司里 marketing+product 仅约 47 人。偏离 CPG&rdquo;外包创意/层层 brief&rdquo;病</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度(2)</td>\n<td>&ldquo;someone who&rsquo;s incredibly smart and experienced, but then has a little bit of weirdness&rdquo;；&rdquo;we definitely skew more to the intellectual approach than a &lsquo;brute force&rsquo; approach&rdquo;；&rdquo;Make sure everybody&rsquo;s laughing. If people stop laughing, you&rsquo;re probably going to lose&rdquo;（Cessario, Raconteur）</td>\n<td>招人筛子=智识+一点&rdquo;怪&rdquo;，&rdquo;keep people laughing&rdquo;。是真筛子但偏软：无 keeper-test/汰换机制、无留存数据，且被员工口径部分打脸</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>信息流/真相(6)</td>\n<td>〔Glassdoor 3.3/5、53% 推荐；&rdquo;micromanagement, nepotism in advancement, high egos in upper management, poor communication from direct manager, no training&rdquo;；一条匿名评：&rdquo;The entire business is on the brink of collapse…More layoffs are coming&rdquo;〕(Glassdoor, 18 条)</td>\n<td>单一匿名&rdquo;崩盘&rdquo;评不构成事实(C 低)；但与创始人&rdquo;大家都在笑/为他们打工&rdquo;叙事相矛盾——是表演式 costly 还是真问题，待对账</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>：仅累计 A 行 Top-3 S=D×C：决策权 2×2=4、in-house 2×2=4、人才 1×1=2 → Σ=10 → 10/27×100 = <strong>37</strong>。Glassdoor 行为 Δ/红旗，不计分。<strong>在赌什么 e=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>6 信息流 / 真相上行</td>\n<td>&ldquo;我感到十分错愕与不解……我深深的感到已经不再被尊重与不被信任&rdquo;&ldquo;我来中国大陆本来就不是为了谋取高官厚禄,只是单纯的想为大陆的高端集成电路尽一份心力&rdquo;(梁孟松 2020-12 当场递交的辞职信,被广泛刊载)</td>\n<td>联合 CEO 当众递辞呈、信公开流出 → 市值一日蒸发超 300–400 亿。<strong>revealed 硬事件</strong>,但暴露的是双 CEO 结构的内讧裂缝,非设计出的透明机制 → 这是结构副作用的红旗</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n<tr>\n<td>2 人才密度</td>\n<td>〔事实〕研发人员一年内从 2419 人降到 1785 人(失 600+);2018 离职率 22%、2019 为 17.5%;研发人均薪酬下滑(13.5万→12.9万);吴金刚离职放弃近千万期权(界面/网易/腾讯新闻 2021)</td>\n<td>第三方+员工侧可核验数据:核心研发<strong>留不住</strong>,期权也锁不住,薪酬在业内本就不高且不升。这是&rdquo;占位不增长/留存失灵&rdquo;的<strong>病征</strong>,确认这一维度低于基线</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n<tr>\n<td>2 人才密度(文化)</td>\n<td>〔事实〕梁孟松带入台积电式保密:&rdquo;员工进入办公室前必须把手机放在楼下个人储物柜里&rdquo;;团队&rdquo;298 天把 14nm 良率从 3% 提到 95% 以上&rdquo;(维基/搜索摘要)</td>\n<td>强保密+高压攻坚的台企打法,催出过硬良率战功。但保密锁柜在代工业近 table-stakes(台积电同样做),偏离同类有限</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>：只累计 A 行 Top-3 的 S=D×C → 双CEO 3×2=6、辞呈红旗 2×3=6、人才流失病征 2×3=6,但<strong>信息流红旗与人才流失方向均为 ↓(确认平庸/功能失调,不是好赌注)</strong>;按维度去重(信息流取一条)取 Top-3 S=6+6+? → Σ≈10 → round(10/27×100)≈<strong>37</strong>。<strong>在赌什么/何时失效</strong>:双 CEO 赌&rdquo;专业分工&gt;统一指挥、靠董事长仲裁压住冲突&rdquo;;一旦缺强仲裁人或两人战略分歧,就从分工变内讧(2020 已演过一次),且国资体制下董事长更替频繁(六朝董事长)放大不稳定。</li>\n<li><strong>盲区 + 下一步</strong>：① 双 CEO 是&rdquo;主动设计的优异分工&rdquo;还是&rdquo;国资为平衡台/陆背景的政治妥协&rdquo;——决定它是 Alpha 还是结构债,需查 2017 设立时的决策口径;② 现任(2024–25)两人协作是否已稳态、有无新仲裁机制;③ 找前/现研发员工对账留存与决策实情。follow up:中芯财报会赵海军口径 + 员工侧(脉脉/离职访谈)。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>：地缘+国产替代下的先进制程攻坚( t-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>2 人才密度</td>\n<td>&ldquo;Rather than fighting this reality and trying to police AI usage, we made the decision to embrace transparency… we weren&rsquo;t truly evaluating how candidates would perform in their actual role&rdquo;(Simon Newton, Head of Platforms, The Register 2025-06)</td>\n<td>2025 起前端/后端/ML 面试<strong>强制</strong>用 Copilot/Cursor/Claude,反转旧政策(原&rdquo;只用脑子写代码&rdquo;);筛&rdquo;会用 AI+能审 AI 生成代码&rdquo;的人 → 早于多数同类正式化、会筛掉一批旧式工程师,可证伪</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>1 战略-结构 / 3 决策权</td>\n<td>&ldquo;teams of three to six people with their own goals and plans… empowered by being given goals rather than instructions&rdquo;(Canva 官方 Medium《goal-driven culture》)</td>\n<td>全员拆成 3–6 人&rdquo;little startup&rdquo;,每季 Season Opener 定 Team Strategy Doc(mission/目标/owner/依赖),目标贴墙公示;靠&rdquo;给目标不给指令&rdquo;下放决策 → 比传统职能制反常,但<strong>对同类(Atlassian/Figma/Notion)是 squad table-stakes</strong></td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>2 人才密度</td>\n<td>六值之一专设&rdquo;values interview&rdquo;独立轮,用 BrightHire 录音转写做&rdquo;evidence-based hiring&rdquo;(lifeatcanva / BrightHire)</td>\n<td>价值观单独成轮 + 面试全程留痕复核 → 招聘机制比同类更结构化、降偏见;但属流程化、非反共识</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>6 信息流</td>\n<td>&ldquo;Culture dominated by toxic positivity&rdquo;; &ldquo;decision-making… slower as processes increase, decisions made by stakeholders rather than the most experienced specialists&rdquo;(多条 Glassdoor 2024–25)</td>\n<td><strong>revealed 对冲</strong>:过度正向 ", "company": "Spotify (ADR)", "oneliner": "'Spotify模型'squads/tribes是真OS但自承从未完全落地、已回退传统结构", "card": "<h1>Spotify (ADR) — Why attention?   ·   Score 37 · 置信度 RICH · 优先级 P1</h1>\n<p><strong>一句话定性</strong>:值得排进本周看,但别被&rdquo;squad model&rdquo;光环骗。真正的截面 <strong>Alpha</strong> 是一套<strong>显式的决策操作系统</strong>——DIBB/Bets Board(数据-洞察-信念-赌注)+ Ek 极端授权(&ldquo;极少事上浮到我&rdquo;);组织&rdquo;操作系统&rdquo;=<strong>用一套统一的赌注语言把全公司决策标准化,CEO 只留长期 + 资本配置</strong>。但其最出名的&rdquo;squad 模型&rdquo;被内部人证伪为多为愿景,且 2023 的大裁员是<strong>危机后补债(Δ)</strong>而非主动演进。同类基线=大盘消费/流媒体平台(Netflix/Meta 级),&rdquo;自治团队/数据驱动/squad&rdquo;已是行业 table-stakes,不算偏离。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>决策权/层级</td>\n<td>&ldquo;very few things…make their way up to me&rdquo;;&rdquo;I trust my team to manage the day-to-day…not be slowed down by the need to secure his approval&rdquo;(Daniel Ek, Billboard)</td>\n<td>每天 5–6 个要他时间的请求,绝大多数不上浮;leadership 团队拥有日常决策,CEO 只留&rdquo;Company Bets&rdquo;长期题 + 资本配置;2026 起交两位 co-CEO 跑执行(第三方可验证的 revealed)→ 偏离&rdquo;决策默认上浮&rdquo;基线</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>信息流/战略-结构</td>\n<td>〔事实〕Company Bets = &ldquo;large cross-organizational projects often lasting 6–12 months&rdquo;,经 <strong>DIBB(Data-Insight-Belief-Bet)</strong>,每个 bet 挂一份两页文档(sponsor/stakeholders/success metrics + DIBB 摘要),全公司在线 <strong>Bets Board</strong>(Kanban)看优先级与进度(Gustav Söderström, Invest Like the Best EP.424;Beyond the Backlog)</td>\n<td>用一套统一&rdquo;赌注&rdquo;语言把跨层决策对齐、显式记录&rdquo;为什么/做什么&rdquo;;偏离&rdquo;靠 OKR/口头对齐&rdquo;的同类常态</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度</td>\n<td>&ldquo;I judge people by their best idea, not their worst. Because sometimes brilliance comes in short bursts&rdquo;(Ek, Tim Ferriss #484)</td>\n<td>招&rdquo;尖峰型&rdquo;非&rdquo;无短板&rdquo;——容忍 spiky/非常规人;<strong>但无可复述筛子</strong>(无固定 N 问/无 keeper test)→ 需补机制,C 压到 1</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>组织演进(债)</td>\n<td>&ldquo;too many people…doing <strong>work around the work</strong>&ldquo;;后承认&rdquo;it did <strong>disrupt our day-to-day operations more than we anticipated</strong>&ldquo;(Ek, Dec 2023 memo / Q1&lsquo;24, CNBC/Fortune)</td>\n<td>2023 三轮裁员累计~25%(12月 17%/1,500),发生在 $1B 播客赌注失败 + 2020 起人数近翻倍到 8,000 之后 → <strong>危机后被迫补债</strong>,非表现好时主动升级</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n<tr>\n<td>康威/信息流(证伪)</td>\n<td>&ldquo;I learned the famed squad model was only ever aspirational and <strong>never fully implemented</strong>&rdquo;;&rdquo;Even at the time we wrote it, we weren&rsquo;t doing it&rdquo;(J. Lee / J. Sundén, getDX)</td>\n<td>招牌&rdquo;squad/tribe&rdquo;模型多为愿景,后转向 SAFe;员工侧对账<strong>戳破</strong>了本应是其最大 Alpha 的东西 → 该信号不计 Alpha</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 → S=2×2 + 2×2 + 2×1 = 4+4+2 = <strong>10</strong> → 10/27×100 ≈ <strong>37</strong>。Δ 行单列不计。<strong>在赌什么 / 何时失效</strong>:赌&rdquo;一套显式赌注语言 + 极端授权&rdquo;能在 7,000 人规模保持快速、对齐的决策;若 DIBB/Bets Board 沦为仪式性文档(process gaming)、或 co-CEO 交接后授权变成失焦,Alpha 即失效。</li>\n<li><strong>盲区 + 下一步</strong>:激励/所有权、晋升机制、span 具体数字&rdquo;需补机制&rdquo;(信息不足≠平庸)。Follow up:① 验 hypothesis&rdquo;Bets Board 真改变行为 vs 变成 PPT&rdquo;——找现任/前 PM 对账;② co-CEO(Söderström/Norström)分工是真授权还是 two-in-a-box;③ 招聘&rdquo;best idea&rdquo;哲学有没有落到可复述的筛子。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:Ek 个人转向欧洲国防/健康长期下注(Prima Materia)、AI 军事投资引发艺人抵制——战略层信号,组织维度无关。</li>\n<li><strong>优先级</strong>:组织 37 × 市场(大,全球流媒体)× 战略(共识偏多)→ <strong>P1</strong>(中等组织偏离 + 大市场,排本周看)。standing Alpha 真实但中等;有补债(Δ)但债≠判死,高授权 + 显式决策 OS 仍优于无机制的平庸同类。</li>\n</ul>"}, {"rank": 124, "score": 37, "conf": "THIN", "dir": "↑", "priority": "P2", "company": "McCormick & Company (NYSE: MKC)", "oneliner": "1932年起的Multiple Management Board:各层级初级董事会真参与决策,90年标准化机制", "card": "<h1>McCormick &amp; Company (MKC) — Why attention?   ·   Score 37 · 置信度 THIN · 优先级 P2</h1>\n<p><strong>一句话定性</strong>:值得一看,但只为一件事——<strong>1932 年至今、号称&rdquo;自治&rdquo;的 Multiple Management Board(MMB / 初级董事会)</strong>,一套让普通专业/管理层员工跨层级进真实业务决策的结构性机制。这是<strong>截面 Alpha(standing,非转向 Delta)</strong>:不是 CEO 讲的故事,而是被 90+ 年连续性 revealed 的&rdquo;组织操作系统&rdquo;。同辈(Kraft Heinz/Conagra/General Mills 等消费食品)默认是职能制 + 决策上浮的平庸基线,MMB 对同类明确反常。<strong>但当前对外口径已偏&rdquo;领导力培养/曝光/技能&rdquo;,真实决策权是否仍在 MMB 是最大未坐实点</strong>;CEO Foley 个人层几乎全是 cheap talk。<strong>无戏剧性 reorg/Delta——这是&rdquo;闷声独特&rdquo;型,不是转向故事。</strong></p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>决策权/信息流</td>\n<td>&ldquo;These boards are self-governing, and that is really part of the magic that makes them different from just cross-functional teams&rdquo;(ATD《A Healthy Mix of Innovation and Purpose》,McCormick 受访者)</td>\n<td>1932 由 C.P. McCormick 创设的&rdquo;junior board of directors&rdquo;,把决策下移到一线;各级员工组板、自治、向 senior board 提改进案;〔事实〕1932–48 junior board 向 senior board 提 &gt;7,000 条建议(同源/Wikipedia)→ 偏离&rdquo ormation available to everyone… financials (cash balance, burn-rate, P&amp;L), board meeting deck… We officially made every employee a designated insider.&rdquo;(Culture Code deck, Dharmesh Shah)</td>\n<td>全员可看董事会 deck + P&amp;L + 现金;为此把<strong>每个员工法律上列为 insider</strong>(受 NDA/内幕交易约束)= 自缚、可证伪、得罪 IR/合规惯例。偏离&rdquo;上市公司信息层层收口&rdquo;的成熟同类基线</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>决策权/放权</td>\n<td>&ldquo;3-word policy on just about everything: USE GOOD JUDGMENT&rdquo;;&rdquo;Debates should be won with better data not bigger job titles… It&rsquo;s not an open door policy. It&rsquo;s a no door policy.&rdquo;(同上)</td>\n<td>删掉差旅/病假/WFH/社媒的成文流程,只留一句判断准则;一线对可逆事项自决。删除控制杠杆=costly、可被滥用打脸。偏离 SaaS 同类&rdquo;流程化合规&rdquo;常态</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度</td>\n<td>&ldquo;We&rsquo;re a team, not a family. We hire, develop and cut smartly… Continually seek to raise our average.&rdquo; / &ldquo;Compromising on culture fit is mortgaging the future… interest rate on culture debt is crushingly high.&rdquo;(同上)</td>\n<td>招人须&rdquo;抬高团队均值&rdquo;、按 HEART 招/汰/奖;但&rdquo;keeper test/汰换仅合格者&rdquo;的<strong>具体动作挖不到机制</strong>,且 Netflix 已普及&rdquo;team not family&rdquo;框架 → 同类已不反常</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>信息流(对账·反向)</td>\n<td>〔事实〕Dan Lyons《Disrupted》:被裁称&rdquo;graduated/毕业&rdquo;;斥 culture code 为 cult-like/ageist。近年 Glassdoor 评分同比-4%,评论称&rdquo;performative culture language… whatever looks good in a slide deck&rdquo;,2024 士气最低、CPO Katie Burke 离任(Glassdoor/Inc/Fortune)</td>\n<td>revealed 的<strong>落地侵蚀</strong>对账:宣称的透明/平等在执行端被指表演化 → 据&rdquo;落地闸&rdquo;把上面几条 C 压到 ≤2、不进 P0</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n<tr>\n<td>组织演进</td>\n<td>〔事实〕2023-01 首次裁员 ~7%(~500 人)+ 办公地整合,$72–105M 费用;Rangan 主推 &ldquo;Human-Led, AI-Accelerated&rdquo;、AI 素养项目(SEC 8-K;diginomica)</td>\n<td>reorg 诊断:<strong>弱组织补债侧</strong>——史上首次裁员、属 2022 下行后被迫降本、伴随士气下滑,非&rdquo;表现好时主动升级&rdquo;。AI 转型是宣布中的 Δ,无 standing-Alpha 落地证据</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 → 透明 4 + 放权 4 + 招汰 2 = 10;10/27×100 = <strong>37</strong>。<strong>在赌什么/何时失效</strong>:赌&rdquo;给员工极致信息+判断权,他们会像 owner 一样自我对齐&rdquo;;当规模上市、政治与 KPI 进来,透明易退化成&rdquo;表演式透明&rdquo;(失效模式①)——Lyons 与近年员工口径正是这个裂缝。</li>\n<li><strong>盲区+下一步</strong>:层级/span、激励的具名 owner、晋升靠战功还是带人——<strong>均需补机制</strong>(≠平庸,是没挖到)。Follow up:① 拉 2024–2025 在职员工/Blind 对账&rdquo;董事会 deck 是否仍全员可见、还是已收口&rdquo;;② 验证 hypothesis&rdquo;Culture Code 是 standing Alpha 还是已 performative 化的遗产&rdquo;;③ 看 AI 转型有无落到组织(团队边界/激励)还是仅产品叙事。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:CRM→&rdquo;Agentic Customer Platform&rdquo;AI 转型激进、市场大(~$15B 级);属战略层赌注,组织上无对应新 Alpha。</li>\n<li><strong>优先级</strong>:组织 37 × 市场 大 × 战略 反共识(早期 all-in AI)→ <strong>P1</strong>(33–66 + 大市场/反共识战略)。一句理由:有真实、可复述、曾经反共识的透明/放权机制底子(标杆级原创),但同类已抄走表层、且 revealed 出现落地侵蚀——值得看,但别当 P0 的&rdquo;当下截面优异&rdquo;。</li>\n</ul>"}, {"rank": 126, "score": 37, "conf": "RICH", "dir": "?", "priority": "P2", "company": "Match Group", "oneliner": "砍COO+去层级+公开绩效评审,但是新帅转向Delta未坐实", "card": "<h1>Match Group (MTCH) — Why attention?  ·  Score 37 · 置信度 RICH · 优先级 P2</h1>\n<p><strong>一句话定性</strong>:一家被迫转型的成熟互联网集团。Rascoff(2025.2 上任,Zillow 联创)带来一套<strong>真·costly 的透明机制</strong>(把自己的绩效评估当众做)——这是当下能挖到的唯一<strong>截面 Alpha</strong>;但公司主线是一场典型的<strong>弱组织补  的组织操作系统是一家把&rdquo;报社&rdquo;重做成&rdquo;产品-数据-工程一体的订阅科技公司&rdquo;：用 2018 起的 <strong>&ldquo;missions / functions&rdquo;</strong> 横向矩阵替代传统编辑部式部门墙，同时保留<strong>编辑/商业双线汇报到 publisher</strong> 的行业防火墙。<strong>这是截面 Alpha（当前在跑、且数字订阅 0→12.78M 是第三方可核验的落地证据）</strong>，但公开能挖到的<strong>机制颗粒度偏浅</strong>（谁拍板、span、激励、招人筛子几乎查无）→ 拿不到高 C，置信度 THIN。同行（WaPo / WSJ / Gannett / Condé）很多事是 table-stakes，对同类的真偏离主要是&rdquo;转型真做成了&rdquo;。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离同类基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>7 康威 / 1 战略-结构</td>\n<td>〔事实〕&rdquo;beginning at the end of 2018, the company&rsquo;s business structure was broken out into teams that manage &lsquo;missions&rsquo;…and &lsquo;functions,&rsquo; like product, advertising and marketing&rdquo;（Nieman Lab 2020 转述 Levien 重组）；员工侧&rdquo;Product teams are collaborative and very data-driven, great cross-functional culture where PM, Engineering, Design, and Analytics work closely&rdquo;（Glassdoor）</td>\n<td>把传统媒体的&rdquo;采编/广告/发行&rdquo;职能墙，重画成<strong>横向 mission 小队（按产品目标）× 纵向 function（共享职能）</strong>的矩阵；产品/数据/工程嵌入业务而非外包。偏离同类&rdquo;编辑部+广告部两张皮&rdquo;基线。<strong>机制颗粒（mission 多大、谁拍板）公开查无</strong></td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>9 组织演进</td>\n<td>〔事实〕数字订阅由近零增至<strong>12.78M 总订阅(2025-12-31)、52% 在多产品 bundle</strong>；&rdquo;those subscribers engage more, stay longer and pay more over time&rdquo;（Levien, 财报/StockTitan 10-K、TheWrap Q3&lsquo;25）</td>\n<td>在<strong>整个行业转型失败的同类里（同为 legacy 报社）真把订阅科技模型跑成稳态</strong>、且没回弹——revealed outcome（第三方可核验），不是 CEO 自引数据</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>6 信息流 / 治理</td>\n<td>〔事实〕executive editor 与 CEO <strong>均向 publisher (A.G. Sulzberger) 汇报</strong>，publisher 守&rdquo;church &amp; state&rdquo;防火墙（多源）；&rdquo;the first dollar always goes to journalism&rdquo; / &ldquo;If you break the newsroom, you can&rsquo;t remake it&rdquo;（Levien, Fortune 2025）</td>\n<td>编辑独立靠<strong>双线汇报+家族控制</strong>制度化。但这是<strong>新闻业 table-stakes</strong>（WaPo/WSJ 同构）→ 对同类不算偏离</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>8/2 一号位·人才</td>\n<td>&ldquo;the best ideas flow upwards&rdquo;；&rdquo;If you want…a mission-driven culture, you need to be really clear about what is <strong>not</strong> changing&rdquo;（A.G. Sulzberger，2014 Innovation Report / Reuters Institute）</td>\n<td>一号位有组织自觉的<strong>软信号</strong>，但<strong>挖不到机制</strong>（无具体招人筛子、无 span、无会议机制）→ <strong>需补机制</strong>、不进主分</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 → 4 + 4 + 2 = 10 → round(10/27×100)=<strong>37</strong>。<strong>在赌什么 / 何时失效</strong>:赌&rdquo;把报社当软件公司做产品-数据一体化 + 防火墙保住信誉&rdquo;能持续转化为订阅复利；若 AI 摘要/分发吞掉直达流量、或 mission 矩阵退化成又一层协调官僚（员工已报&rdquo;lots of restructuring&rdquo;&ldquo;communication like pulling teeth&rdquo;&ldquo;parts of tech org understaffed&rdquo;），增长引擎会失速。</li>\n<li><strong>盲区 + 下一步</strong>:决策权/span/激励/招人筛子/会议机制 <strong>几乎全部查无</strong>（信息不足，≠ 平庸）。Follow up：① 找 mission 小队的真实规模与拍板边界（产品/工程一线能独立改什么）；② 工会(NewsGuild/Tech Guild)与 Glassdoor 长贴里&rdquo;重组疲劳 vs 跨职能协作&rdquo;的对账，判断矩阵是真整合还是政治化；③ Joe Kahn(编辑)× Levien(商业)真实协作机制。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:<strong>多产品 bundle 战略（News+Athletic+Cooking+Games+Wirecutter+Audio，目标 2027 达 15M）= 业务/产品离群，已按护栏一剔出组织分</strong>——它的组织表达（产品-工程一体化）已在维度7计过，bundle 本身只进战略层。</li>\n<li><strong>优先级</strong>:组织 37 × 市场 中(订阅媒体，规模可观但非超大赛道) × 战略 偏共识(订阅+bundle 是当下行业主流答案，NYT 是执行最好的、非反共识) → <strong>P2</strong>。理由：截面 Alpha 真实存在且转型已 revealed 落地，但<strong>对同类的偏离中等、机制颗粒太浅拿不到高 C</strong>；非&rdquo;放下手头去看&rdquo;，属&rdquo;有空看/持续观察&rdquo;，重点跟进 mission 矩阵的真实决策权与激励机制。</li>\n</ul>"}, {"rank": 128, "score": 37, "conf": "RICH", "dir": "?", "priority": "P1", "company": "Li Auto (理想汽车, NASDAQ: LI)", "oneliner": "学华为IPD后又主动弃用、复盘式重置班子,自觉强但多为危机后补债", "card": "<h1>Li Auto (理想汽车 / NASDAQ: LI) — Why attention?   ·   Score 37 · 置信度 RICH · 优先级 P1</h1>\n<p><strong>一句话定性</strong>:值得看，但<strong>主信号是一个 Delta（自承&rdquo;职业经理人体系&rdquo;失败、回滚到创业模式 + 去华为化 + 李想亲收人事），不是截面 Alpha</strong>。其&rdquo;组织操作系统&rdquo;=<strong>一号位高亲历的创始人中心制</strong>——李想亲自面试到 18 级、把最重决策压到周六战略委员会、靠&rdquo;吵架&rdquo;做决策。standing Alpha 真实但条数有限；2022 搭的矩阵/IPD（同辈 table-stakes）正被自己拆回去，带明显反转色彩的组织债。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>8 一号位亲历 / 2 人才密度</td>\n<td>&ldquo;任何18级及18级以上，还包含少部分17级员工，我都会面试&rdquo;(李想，2024.12 腾讯《消失的李想》访谈)</td>\n<td>创始人把&rdquo;招人&rdquo;列为自己第一优先级、亲自筛到具体职级线（非只看直接下属）→ 偏离&rdquo;CEO 只面直接下属&rdquo;基线；revealed（耗时、可对账）</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>3 决策权 / 6 信息流</td>\n<td>&ldquo;我们最重要决策放在周六。战略委员会的团队都是周六工作&rdquo;；&rdquo;我们战略委员会质量特别高，是因为大家天天在吵架&rdquo;(同上)</td>\n<td>重决策集中到固定的周六长会 + 制度化&rdquo;吵架/高要求&rdquo;做对齐；&rdquo;开会要吵架，得过且过就不会吵&rdquo;→ 偏离车企&rdquo;逐层汇报、和气共识&rdquo;</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>1 战略-结构 / nter;\">↑</td>\n</tr>\n<tr>\n<td>3/6 决策·真相上行(病征)</td>\n<td>〔事实〕员工侧:&rdquo;<strong>consensus-heavy reviews and slower decisions</strong>&rdquo;&ldquo;<strong>silos and fiefdoms</strong> are not uncommon, with <strong>long-timers holding back progress</strong>&ldquo;&rdquo;frequent reorgs&rdquo;(Built In / Blind 汇总, 2026)</td>\n<td>矩阵+共识驱动→决策慢、筒仓、中层沉淀；独立员工口径=<strong>确认平庸</strong>(非信息盲区)</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">0</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n<tr>\n<td>9/1 组织演进(Δ)</td>\n<td>〔事实〕&rdquo;Narayen to <strong>Step Down Amid Generative AI Turbulence</strong>&ldquo;，股价 YTD ≈ −25%，员工称&rdquo;lack of specific AI strategy&rdquo;(Fortune/FinancialContent/Blind, 2026)</td>\n<td>换帅+绕 AI 重组：<strong>危机/承压时被迫</strong>、非表现好时主动→诊断偏&rdquo;弱组织补债&rdquo;，标&rdquo;↗转向中&rdquo;</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>：仅计 A 行 Top-3 → Check-in(S=4)+Kickbox(S=4)+(病征行 D=0 不贡献) ≈ Σ8–10 /27×100 ≈ <strong>35</strong>。<strong>在赌什么/何时失效</strong>：赌&rdquo;去掉考核仪式+给一线试错权能换来真创新与留存&rdquo;；当矩阵共识文化把决策拖慢、AI-native 对手快打慢时失效（当前正发生）。</li>\n<li><strong>盲区+下一步</strong>：David Wadhwani(继任热门)的<strong>招人筛子/开会机制</strong>两条定向子查询<strong>查无具体机制</strong>(需补机制，非平庸)——他若上任,follow up 其&rdquo;怎么开会/怎么放权&rdquo;是否打破现有共识病。验证 hypothesis：Check-in 的留存改善数据全为 Adobe 自引(stated)→需第三方/员工侧对账才到 C3。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>：Firefly 版权安全模型、被 AI-native 对手挤压的护城河之争——战略层值得看，但属产品/市场，不进组织分。</li>\n<li><strong>优先级</strong>：组织 35 × 市场 大 × 战略 共识(承压跟随) → <strong>P2</strong>：两条真机制+大市场撑住关注，但核心决策维度确认平庸、Δ 偏补债→非 P0/P1，列入&rdquo;持续观察换帅后是否真演进&rdquo;。</li>\n</ul>"}, {"rank": 130, "score": 34, "conf": "RICH", "dir": "↑", "priority": "P2", "company": "Rocket Companies (NYSE: RKT)", "oneliner": "ISMs文化OS:ISMs in Action日/年册+百家生态共用,长期成形", "card
