le=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n<tr>\n<td>2 人才密度</td>\n<td>&ldquo;In the 0-to-1 world… entrepreneurial types who have <strong>seen failure</strong>… In the 1-to-100… growth, leadership mindset, analytics&rdquo;;&rdquo;inject your company with talent that can <strong>infect the rest of the populace</strong>&ldquo;(Krishna, a16z)</td>\n<td>按&rdquo;公司处于 0-1 还是 1-100&rdquo;切招人筛子 + 用少量高密度 AI 人才&rdquo;感染&rdquo;存量组织 → 有筛子雏形;但纯 CEO 自述、无 keeper-test/无员工侧坐实、对硅谷系产品 CEO 属常见话术</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>2/5 人效(revealed)</td>\n<td>〔事实〕26,000(2021)→14,700(2023)→<strong>14,200</strong>(2024);CFO Brown:&rdquo;Head count down… that is the <strong>power of AI</strong>&ldquo;;Rocket Logic Docs 省&rdquo;<strong>1 million hours</strong>&ldquo;(National Mortgage News)</td>\n<td>用 AI 替代/压缩 origination 人力当组织杠杆 → 第三方报道的硬数字(revealed)。但 deviation 弱:2024-25 抵押/金融科技同类普遍如此(table-stakes),且周期性裁员混杂</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>9 演进(Δ)</td>\n<td>〔事实〕收 Mr. Cooper($14.2B,2025/10 闭)、Redfin;Jay Bray 任 Rocket Mortgage 总裁兼 CEO、Kelman 续掌 Redfin,<strong>均直接向 Krishna 汇报</strong>;35+ 整合工作流(SEC 8-K/425)</td>\n<td>控股式结构:各业务保留为 BU、由原 CEO 领、直汇报一号位 → <strong>M&amp;A 驱动的结构变动,不是危机补债也非纯主动演进</strong>;诊断为&rdquo;strategy-driven reorg&rdquo;,org 表达普通(标准 holdco)</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">↗</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3:ISMs(D2×C2=4)+ 人才筛子(D2×C1=2&hellip; 取与人效并列)+ AI 人效 revealed(D1×C3=3)→ Σtop3≈9 → <strong>9/27×100≈34</strong>  a decision is made is much more important than WHAT… the vast majority [of decisions] aren&rsquo;t worth more than 10 minutes&rdquo;;&rdquo;a staff meeting on Monday, a business meeting on Wednesday, a product meeting on Friday… everybody knew which meeting the decisions were made at&rdquo;(Girouard, First Round《Speed as a Habit》)</td>\n<td>每个决策先定时间预算+谁给输入+何时出答案;Type-2(可逆)当假设直接 ship、错了再改;固定三会、每会明确&rdquo;谁在此拍板&rdquo;→ 偏离&rdquo;多收集数据/共识不拍板&rdquo;的默认引力</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>授权/context-not-control</td>\n<td>&ldquo;Well, your job is to figure out what we need to do instead&rdquo;;&rdquo;That&rsquo;s what I hired you to figure out&rdquo;(First Round profile)</td>\n<td>一线认定策略错时,CEO 不接管而把&rdquo;想替代方案&rdquo;的决策权推回给人;招高管&rdquo;靠 references 而非面试&rdquo;→ 偏离决策上浮/CEO 日历塞满细节</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才筛子</td>\n<td>&ldquo;Be smart, but know you might be wrong&rdquo;——要&rdquo;incredibly bright people… that realize they&rsquo;re not infallible&rdquo;(Girouard 访谈)</td>\n<td>招人筛&rdquo;智识谦逊+好奇心&rdquo;;联创 Paul Gu 早期作为年轻 Thiel Fellow 入伙、14 年后内部接任 CEO(revealed)</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>演进(接班)</td>\n<td>〔事实〕&rdquo;Paul and I have been building Upstart side by side for almost 14 years… another 14&rdquo;;CTO/联创 Paul Gu 2026/5 任 CEO,Girouard 转执行董事长(Upstart IR, 2026/2)</td>\n<td>计划性、联创内部接班、非危机触发(diagnose=强组织主动演进,非补债)→ 单独标</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">↗</td>\n</tr>\n<tr>\n<td>演进(债)</td>\n<td>〔事实〕&rdquo;3 separate organization-wide layoffs and restructures over 1.5 years&rdquo;(Glassdoor 员工);7%(2022/11)+20%(2023/2)裁员</td>\n<td>反复 reorg=真债,但由放贷业务的利率周期冲击驱动、headcount 已企稳;不掩盖上面 standing Alpha</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 S=D×C → 决策(4)+授权(4)+筛子(1)=9 → 9/27×100=<strong>33</strong>。<strong>在赌什么 / 何时失效</strong>:赌&rdquo;快错可逆 &gt; 慢对&rdquo;,在可逆决策占多数的软件/产品域成立;一旦核心是高风险不可逆决策(放贷信用模型、合规),&rdquo;10 分钟拍板&rdquo;文化可能伤人——这正是 2022–23 反复 reorg 暴露的边界。</li>\n<li><strong>盲区 + 下一步</strong>:层级/span、激励所有权、信息透明制度<strong>需补机制</strong>(只有泛泛&rdquo;管理很透明&rdquo;的员工口径,无具体制度)。Follow up:① 找前员工对账&rdquo;Speed as a Habit&rdquo;是否真落到一线授权、还是退化成&rdquo;老板快拍、下面背锅&rdquo;(员工提&rdquo;tough bosses/high stress&rdquo;);② 验 hypothesis:Paul Gu 接任后这套速度 OS 是被强化还是稀释。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:AI 信用承销(以 ML 替 FICO)是其大赌注、市场大,但在 fintech 里属已知主线、非组织信号——战略值得看,组织上是&rdquo;中等 Alpha + 已企稳的周期性债&rdquo;。</li>\n<li><strong>优先级</strong>:组织 33 × 市场 大 × 战略 偏共识 → <strong>P2</strong>:有一条可复述、员工对得上的真机制(决策速度 OS),够&rdquo;有空看/持续观察&rdquo;;但证据偏 CEO 自著、且未达 revealed&rdquo;因此跑赢&rdquo;,不进 P1/P0。</li>\n</ul>"}, {"rank": 132, "score": 33, "conf": "RICH", "dir": "?", "priority": "P2", "company": "Nike", "oneliner": "Hill削层级+sport offense重排班子,业绩下滑后补债型Delta", "card": "<h1>Nike (NKE) — Why attention?   ·   Score 33 · 置信度 RICH · 优先级 P2</h1>\n<p><strong>一句话定性</strong>:值得&rdquo;持续观察&rdquo;而非&rdquo;放下手头去看&rdquo;。Nike 当下几乎是一个纯 <strong>Delta(转向中)</strong>故事——新 CEO Elliott Hill(2024.10 回归、32 年老兵)正在<strong>逐字逆转</strong>前任 Donahoe 的 CDA reorg(把&rdquo;按性别/年龄分的 men&rsquo;s/women&rsquo;s/kids&rdquo;改回&rdquo;按单项运动组队&rdquo;),并削层、把 4 个地区 GM 直接挂到自己下面。诊断:这更像<strong>弱组织被迫补债/反转一次失败 reorg</strong>(危机后、营收/份额下滑、还吃了证券集体诉讼),不是强组织按节奏的主动演进。截面 <strong>Alpha(当前在跑且坐稳)很薄</strong>——新结构仅几个月、未成稳态、效果未 revealed。RICH=信息很多,但多是 stated/转向中,不是已坐实的组织优异。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>层级/span</td>\n<td>&ldquo;the senior leaders of Nike&rsquo;s four Geographies will now join the SLT, reporting to me&rdquo;;&rdquo;we&rsquo;ve eliminated the EVP, Chief Technology Officer role on the SLT…we&rsquo;re eliminating the role of EVP, Chief Commercial Officer&rdquo;(Hill 内部备忘,SGB 2025)</td>\n<td>4 个地区 GM(大中华 Dong、EMEA Grebert、北美 Peddie、APLA Sparks)直挂 CEO;砍掉 CCO/CTO 两个 SLT 岗(在任高管离职),新设 COO(Venky)。削层=可证伪的真动作,但<strong>仅 2025 末、未成稳态、效果未 revealed</strong> → 落地待验证</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>战略-结构(康威)</td>\n<td>〔从&rdquo;men&rsquo;s/women&rsquo;s/kids&rdquo;改回&ldquo;&lsquo;sport obsessed&rsquo; teams…singular sports like running and football&rdquo;〕(SneakerFreaker 2025);&rdquo;sport offense…accelerate Win Now&rdquo;(Nike 8-K FY25)</td>\n<td>按单项运动重画跨职能团队边界(逆 Donahoe 的 consumer-construct);康威式用团队边界设计产品架构。但这是<strong>对一次失败 reorg 的反转</strong>、且刚铺开 → 债的修复、非 standing 优异</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度</td>\n<td>〔Hill 上任后关键晋升全给 20–45 年老兵(Amy Montagne 20y 等)〕;首席创新官 John Hoke 称其为 &ldquo;the refounder&rdquo;;内部信称员工 &ldquo;family&rdquo;(Digiday/Fortune 2025)</td>\n<td>看人筛子=赌&rdquo;文化承载者/老兵&rdquo;,系统性回拉 outsider 时代流失的人。轻度排他(押内部),但属&rdquo;回归型&rdquo;非反共识机制</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>信息流/演进</td>\n<td>&ldquo;I&rsquo;m so tired, and I know you are too, of talking about fixing this business…I want to move to inspiring and driving growth&rdquo;(Hill, Fortune 2026)</td>\n<td>一号位公开自陈痛点+宣布修(Δ 级 ↑,真相上行)。但前任债是<strong>确认平庸</strong>:〔$2B 三年降本、裁 ~1,600、砍批发、份额流失;证券集体诉讼指 Donahoe/Friend 误导投资人 DTC 成效〕(Retail Dive/Cohen Milstein 2025)</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">↗</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3:层级 S=4、人才 S=2,真正在跑的 standing Alpha 仅两条且偏薄(战略-结构按 Alpha 算亦 4 但同属&rdquo;reorg 反转&rdquo;、与层级强相关)→ 取 4+4+2≈10/27×100≈<strong>33</strong>。<strong>在赌什么/何时失效</strong>:赌&rdquo;老兵+按运动组队+削层&rdquo;能复原被 consultant-DTC 打散的产品引擎;若新结构又演化成另一套矩阵层级、或老兵班子抗拒外部新血,则只是把钟摆荡回去。</li>\n<li><strong>盲区+下一步</strong>:<strong>&ldquo;怎么开会/决策机制&rdquo;几乎查无</strong>(只有&rdquo;keep score&rdquo;金句,需补机制——不进分);新结构的 span、一线拍板边界、晋升靠战功还是带人,均未 revealed。Follow up:看 FY26–27 财报里份额/留存是否回升(验落地、是否回弹)、地区 GM 直挂后决策是否真的更快、老兵 vs 外部人才比例。</li>\n<li><strong>业务/战略离群(不计组织分)</strong>:回归&rdquo;运动专精/批发回补&rdquo;——是<strong>回到共识/补课</strong>,非反共识大注;市场极大但打法不离群。</li>\n<li><strong>优先级</strong>:组织 33 × 市场 大 × 战略 共识(回归基本盘)→ <strong>P2</strong>。理由:Score 33 落在 33–66 下沿,但战略偏共识、组织优异主要是 stated/转向中且带明确组织债 → 不够 P1;持续观察落地即可。</li>\n</ul>"}, {"rank": 133, "score": 30, "conf": "RICH", "dir": "↑", "priority": "P2", "company": "Flowers Foods (NYSE: FLO)", "oneliner": "6000名独立配送商拥有territory、按利润而非工资分钱,真所有权机制但是DSD行业table-stakes", "card": "<h1>Flowers Foods (FLO) — Why attention?   ·   Score 30 · 置信度 RICH · 优先级 P2</h1>\n<p><strong>一句话定性</strong>：值得&rdquo;持续观察&rdquo;而非优先看。它唯一真正反常的组织机制——把最后一公里交给 ~4,700 个&rdquo;拥有自己 territory、自负盈亏&rdquo;的独立分销商（IDP/DSD 残值索取者模型）——是<strong>截面 Alpha</strong>，但同时被法院<strong>正在判决拆除</strong>（加州已被迫买回、转雇员制），这是一条罕见的<strong>第三方 revealed 信号</strong>，把这条 Alpha 的方向打成 ↓/?。除此之外是一家典型 CPG：2017 Project Centennial 把组织收编成 2 BU + 集中职能（防御性提效，非大胆下注），CEO 谈人才全是 cheap talk，会议机制查无信号。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕（+来源）</th>\n<th>机制（谁/怎么/多少）+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>5 激励/所有权</td>\n<td>〔事实〕&rdquo;~4,700 IDPs hold distribution rights within defined geographic territories… Because IDs own their own distribution rights, they are incentivized to maximize sales and control costs&rdquo;（Flowers Operations 页 / DCFmodeling）；〔事实〕~5,800 territories、~4,600 已售给 IDP</td>\n<td>谁=独立分销商；怎么=买断 territory 排他权、做该路线残值索取者（不是计件雇员）；多少=~4,700 个。把&rdquo;周二谁去补货/控损耗&rdquo;变成 owner 自利对齐。偏离基线=多数 CPG 用自有/计件物流；但在<strong>鲜食烘焙同类</strong>（Bimbo、Pepperidge）里 DSD/分销商是半 table-stakes，故 D 中等</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>9 组织演进（债）</td>\n<td>〔事实〕加州 $135M 和解、&rdquo;spend over \\$64M to buy back territories and discontinue its independent distributor program in California&rdquo;、12 个月内全部转雇员制；历史上 ~26 起 misclassification 诉讼（PRNewswire / Food Business News / Staffing Industry Analysts）</td>\n<td>第三方法院在<strong>实际拆掉</strong>上面那条 Alpha：把 owner 改回 employee。revealed、可核验、还在外溢到其他州 → 这条机制有重大法律/分类债，方向 ↓</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n<tr>\n<td>1/9 战略-结构（Centennial）</td>\n<td>&ldquo;a clear shift… from one that was really more operationally and technically focused to one that&rsquo;s now deeply strategic… accountable for executing with excellence&rdquo;（McMullian, Baking Business 2019）；〔事实〕2017 起设 2 BU（Fresh Packaged Bread / Snacking-Specialty）+ 集中 marketing/sales/supply chain，目标省 \\$70–80M</td>\n<td>谁向谁汇报被重画+职能上收总部；机制是<strong>集中化提效</strong>（成本目标驱动），方向是收权不是放权。诊断：表现平平期的防御性 reorg，~8 年前、已沉淀为 standing 结构</td>\n<td style=\"text-align: center;\">Δ→A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>2 人才密度</td>\n<td>&ldquo;talent acquisition and development is the key to the whole thing… nothing more important… than having the right people in the right jobs&rdquo;（McMullian, Baking Business）</td>\n<td>无筛子、无 keeper test、无具体汰换动作 → 命中折扣词，只有金句、<strong>需补机制</strong></td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">0</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>：只累计 A 行 Top-3 → 激励(S=4) + 演进债(S=6) + Centennial(S=2)= <strong>12 ÷27×100 ≈ 30</strong>（待验证落地闸已对自述类压 C）。<strong>在赌什么/何时失效</strong>：IDP 模型赌&rdquo;把分销做成 owner 自利能胜过自营效率&rdquo;；它在<strong>劳动法把 IDP 重判为雇员</strong>时失效——这正在发生（加州已破），是结构性而非周期性风险。</li>\n<li><strong>盲区 + 下一步</strong>：① 会议/决策机制查无信号（不是平庸、是没挖到）；② 一线 IDP 转雇员后<strong>新的激励/span 怎么设</strong>没有公开机制——这是最该 follow up 的点。验证 hypothesis：转雇员制是否拖累人效/留存（看 2025–26 DSD 成本与员工侧口径）。找谁：投资者关系拿&rdquo;加州转制后单路线成本/留存&rdquo;对账；Blind/Glassdoor 看转制后一线口径（现有评论已提&rdquo;downsizing/裁长工龄高薪者&rdquo;，frozen-middle 味）。</li>\n<li><strong>业务/战略离群（不计入组织分）</strong>：Simple Mills 收购、向 better-for-you / 价值带做组合转型——属产品/资本战略，组织上无独特表达。</li>\n<li><strong>优先级</strong>：组织 30 × 市场（中：成熟北美鲜食烘焙、低增长）× 战略（共识：提效+并购转组合）→ <strong>P2</strong>。一句理由：唯一的组织独特性正被法律拆除、方向向下，其余是教科书式 CPG 集中化，不值得抢看，但 IDP→雇员转制的组织后果值得当 case 持续观察。</li>\n</ul>"}, {"rank": 134, "score": 30, "conf": "RICH", "dir": "?", "priority": "P2", "company": "Intel (INTC)", "oneliner": "砍掉约一半管理层级、点名'最强KPI是团队人数',revealed但属危机转向", "card": "<h1>Intel (INTC) — Why attention?   ·   Score 30 · 置信度 RICH · 优先级 P2</h1>\n<p><strong>一句话定性</strong>:值得放进观察名单、但别当成&rdquo;组织优异标的&rdquo;。这是一家 50 年老巨头在危机后被新 CEO(Lip-Bu Tan,2025-03 上任)<strong>自上而下推动转向</strong>的故事——信号几乎全是 <strong>Δ(承认大公司病 + 宣布拆层/砍人/RTO)</strong>,<strong>截面 Alpha(当前在跑、跑成稳态的反常机制)几乎挖不到</strong>。reorg 诊断:① 危机/亏损/错失 AI 后<strong>被迫做</strong>(非表现好时主动);② <strong>远未稳态</strong>(裁员延续到 2026,工厂还在裁);③ standing Alpha base 薄(旧 Intel 文化被广泛报道已衰败)。&rdquo;组织变好了&rdquo;只有 CEO 自述 + 自引数据 → 按落地闸封顶、不进 P0。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>4 层级/span</td>\n<td>&ldquo;Many teams are eight or more layers deep, which creates unnecessary bureaucracy that slows us down&rdquo;;&rdquo;The most important KPI for many managers at Intel has been the size of their teams. Going forward, this will not be the case&rdquo;;&rdquo;The best leaders get the most done with the fewest people&rdquo;(Tan《Our Path Forward》全员信,2025-04-24,Intel Newsroom)</td>\n<td>把&rdquo;管多少人&rdquo;从晋升 KPI 里拿掉、反向奖励&rdquo;用更少的人做更多&rdquo;;命中得罪人+可证伪+反共识 → costly。但是<strong>刚宣布的增量(Δ)</strong>、不是在跑的稳态</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>9 组织演进(revealed)</td>\n<td>〔事实〕&rdquo;streamlining the number of management layers by about 50%&rdquo;;年底全球员工 ~75,000(从约 125k 降 ~15%+)(Intel Q2&lsquo;25 财报/8-K,SEC,2025-07-24)</td>\n<td>实际砍层、砍编(第三方/财报可核验=revealed 动作);但这是<strong>砍冗余补债</strong>、非&rdquo;强组织主动升级&rdquo;,且只证明&rdquo;动了&rdquo;,未证明&rdquo;变好&rdquo;</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>3 决策权</td>\n<td>&ldquo;important chip groups reporting directly to him&rdquo;——DCAI、CCG 直接向 Tan 汇报;Bruckner/Hurley/Lisa Pearce 三名技术高管直汇报;升 Sachin Katti 为 CTO 兼 AI 主管(Reuters memo,2025-04;SCMP 转载)</td>\n<td>CEO 亲自抓核心工程线、把工程职能提进 ET(执委会);属一号位亲历(维8)。但本质是把权力<strong>收回 CEO</strong>(更集权=自利方向),按理发师铁律压 C</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>决策/会议</td>\n<td>&ldquo;I am instructing our leaders to eliminate unnecessary meetings and significantly reduce the number of meeting attendees. Too much valuable time is being wasted&rdquo;(同上全员信)</td>\n<td>指令式砍会/砍与会人数——是<strong>命令</strong>不是落地机制(没说怎么强制、是否反弹);同类turnaround常见话术</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>6 信息流(承认)</td>\n<td>&ldquo;seen as too slow, too complex and too set in our ways — and we need to change&rdquo;;&rdquo;organizational complexity and bureaucratic processes have been slowly suffocating the culture of innovation&rdquo;(同上)</td>\n<td>一号位 costly、具体地自我归罪揪大公司病=真相上行的 ↑(强于否认麻木);但只是&rdquo;承认+宣布改&rdquo;,<strong>是 Δ 不是 Alpha</strong></td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score(只累计 A 行 Top-3)</strong>:<strong>全表无 A 行</strong> → standing Alpha S 求和 = 0。Δ 行默认不进主分。给 <strong>30</strong> 是对&rdquo;维8 一号位组织设计自觉 + 已 revealed 的砍层动作&rdquo;的软分(承认+方向清晰+部分落地动作可核验),非截面优异分。<strong>在赌什么 / 何时失效</strong>:赌&rdquo;砍掉中层 + 工程师直通 CEO 能恢复创新速度&rdquo;;若员工流失(turnover ~17%、留存者 workload +35%)抽干技术骨干、或砍人砍到产出肌肉,则转向反成自残。</li>\n<li><strong>盲区 + 下一步</strong>:① 新结构是否<strong>跑成稳态</strong>(2026 仍在裁,远未坐实)——这是最大未验证点;② 拆层后<strong>一线决策边界</strong>到底放了什么(只挖到&rdquo;直汇报&rdquo;,没挖到&rdquo;一线能独立拍什么板&rdquo;)=需补机制;③ Tan 的<strong>招人/看人筛子</strong>只搜到&rdquo;亲自招工程师、晚上听工程师、listening 哲学&rdquo;等软信号,无具体筛子(需补)。follow up:盯 2026 中后的留存/产品交付节奏 + 员工侧(Blind/Glassdoor)与&rdquo;提速&rdquo;自述对账,验证 hypothesis&rdquo;砍层真的提了速 vs 只是变小&rdquo;。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:foundry&rdquo;不再开空白支票&rdquo;、砍德国/波兰建厂、放缓 Ohio(&ldquo;be judicious and disciplined as we allocate capital&rdquo;,Q2&lsquo;25)——资本纪律上的大转向,战略层值得看,但属资本决策、不进组织分。</li>\n<li><strong>优先级</strong>:组织 30(低分 + RICH = 信号丰富但<strong>截面平庸/全是转向故事</strong>) × 市场(大:算力/半导体) × 战略(反共识:foundry 资本纪律 + 全面重组) → <strong>P2</strong>。理由:组织维度暂无 standing Alpha、是被迫补债的 Δ,不值得为&rdquo;组织&rdquo;放下手头事;但大市场 + 资本/转向戏剧性大,值持续观察其落地,<strong>别误 Pass</strong>(它不是&rdquo;确认组织优异&rdquo;,也不是&rdquo;看不出&rdquo;,而是&rdquo;确认当前组织平庸 + 正在转向、待坐实&rdquo;)。</li>\n</ul>"}, {"rank": 135, "score": 30, "conf": "RICH", "dir": "?", "priority": "P2", "company": "商汤 SenseTime（HK 0020）", "oneliner": "1+X把生态业务拆独立公司各设CEO担损益,真机制但似亏损补债", "card": "<h1>商汤 SenseTime（HK 0020）— Why attention?  ·  Score 30 · 置信度 RICH · 优先级 P2</h1>\n<p><strong>一句话定性</strong>：值得&rdquo;持续观察&rdquo;而非现在重仓看组织。它的&rdquo;组织操作系统&rdquo;几乎全是<strong>转向 Delta（在改）</strong>——5 年半累亏 500 亿+、原视觉/智慧城市主业被迫收缩，2024 下半年起靠&rdquo;裁员+1+X 拆分&rdquo;补债。<strong>截面 Alpha 很薄</strong>：唯一挖到机制且有第三方落地证据的，是「1+X 把烧钱业务拆成独立 CEO+独立融资的生态企业」——这是危机驱动的演进（偏弱组织补债侧），不是从强势位置的主动升级。同类基线=AI 四小龙/AI lab，喊&rdquo;聚焦/轻盈化/聚焦核心&rdquo;是同辈 table-stakes。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制（谁/怎么/多少）+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>9 组织演进 / 5 激励</td>\n<td>&ldquo;X 代表…重组拆分的生态企业矩阵…各生态企业将设立<strong>独立的 CEO</strong>…获得<strong>更灵活的激励机制和融资通道</strong>&ldquo;（徐立 2024.12 全员信，36氪/界面）</td>\n<td>把绝影/元萝卜/医疗/零售从集团切出做独立公司：独立 CEO 担损益、独立 ESOP、独立外部融资 → 偏离&rdquo;中台集团统管&rdquo;共识。<strong>有 revealed 落地</strong>：截至 2025.8 已有 <strong>6 家生态企业完成/接近完成融资、累计 &gt;20 亿元</strong>；商汤医疗投后估值破 10 亿美元、引入盈峰/美的系、人卫科技、联想创投（腾讯新闻 2025.8、搜狐）</td>\n<td style=\"text-align: center;\">Δ→部分A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>2/4 人效（裁员）</td>\n<td>〔事实〕员工数 <strong>6113(21)→5098(22)→4531(23)→3756(24)</strong>；2024 下半年从 4672 减至 3756、<strong>半年减 916 人</strong>（21经济网/腾讯新闻 2025.3 年报）</td>\n<td>4 年累计优化约 2357 人；裁员覆盖 SCG/IAG/安防/医疗/研究院，仅&rdquo;大模型+大装置&rdquo;两部门未动 → 大幅收缩，但属危机后被迫降本，非&rdquo;keeper test&rdquo;式主动汰换</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n<tr>\n<td>6 真相上行</td>\n<td>&ldquo;构建<strong>更加集中和高效</strong>的组织架构…加快组织和管理的<strong>轻盈化</strong>进程&rdquo;（徐立十周年内部信，新浪 2024.10）</td>\n<td>costly 地公开自陈组织臃肿+宣布精简；但属同类常见的&rdquo;聚焦&rdquo;叙事，且承认=Delta 自觉、非截面优异</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>2 人才文化</td>\n<td>&ldquo;公司不是一个家族企业，这是一个<strong>正规军的公司</strong>&ldquo;（前苹果工程师戴娟评，财富中文 2019）；徐立信&rdquo;长板理论/逃逸速度&rdquo;&ldquo;黑羊文化——<strong>温和的狼性</strong>&ldquo;</td>\n<td>汤晓鸥师门起家但用流程+问责去家族化；金句有，但<strong>招谁/不招谁的具体筛子、怎么汰换&rdquo;仅合格者&rdquo;挖不到</strong>→需补机制</td>\n<td style=\"text-align: center;\">A?</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>：主分只累计 standing Alpha。本卡几乎全是 Δ；唯一带 revealed 落地的「1+X 独立 CEO+独立融资」给 S=2×2=4（Δ→部分坐实，未给满分：外部融资=revealed，但&rdquo;拆完组织更健康/能盈利&rdquo;仍 stated）。其余皆 Δ 或需补机制、不进主分。<strong>Σ≈4+ 软分 → Score 30</strong>。<strong>在赌什么/何时失效</strong>：赌&rdquo;把长期烧钱业务推出表外、各自找外部钱续命，集团瘦身聚焦大模型即可造血&rdquo;；若生态企业融不到下一轮 / 集团核心仍不盈利，拆分=甩包袱而非升级，债坐实。</li>\n<li><strong>盲区 + 下一步</strong>：① <strong>怎么开会/决策机制</strong>——搜 2–4 轮查无（信息盲区，非平庸）；② <strong>员工侧对账</strong>（脉脉/Glassdoor 具体口径）查无；③ 招人<strong>具体筛子</strong>只有&rdquo;人才密度/逃逸速度&rdquo;口号、挖不到机制。Follow-up：找 2024–25 离职员工核&rdquo;裁员是结构优化还是失血&rdquo;；核实 6 家生态企业<strong>实际到账 vs 接近完成</strong>；查徐冰 2025 辞任执行董事/董秘（杨帆+CFO 王征接任）是常规接棒还是创始团队松动。</li>\n<li><strong>业务/战略离群（不计入组织分）</strong>：从人脸识别/智慧城市（被美制裁、政企回款差）all-in 生成式 AI/大模型——战略上是高风险大转向，值得单独看；但<strong>组织上=被迫补债，别因业务猛而抬组织分</strong>。</li>\n<li><strong>优先级</strong>：组织 30 × 市场（大，生成式 AI）× 战略（转向中、偏共识聚焦）→ <strong>P2</strong>。理由：截面 Alpha 薄、主体是危机驱动 Delta，但「1+X 独立融资」已有真实外部资金落地、值得持续观察其是否从&rdquo;甩包袱&rdquo;转成&rdquo;真演进&rdquo;；不进 P0/P1（落地闸：组织变好仍 stated）。</li>\n</ul>"}, {"rank": 136, "score": 30, "conf": "RICH", "dir": "?", "priority": "Pass", "company": "李宁 Li Ning (02331.HK)", "oneliner": "品类事业部+私域直报CEO,但屡次reorg不见效带债", "card": "<h1>李宁 Li Ning (02331.HK) — Why attention?   ·   Score 30 · 置信度 RICH · 优先级 Pass(贴近 P2 下沿)</h1>\n<p><strong>一句话定性</strong>:截面上是一家<strong>零售运营纪律强、但组织设计无独特 Alpha</strong> 的成熟消费公司。能挖到的组织机制(创始人+职业经理人&rdquo;双打&rdquo;、供应链整合、零售盯店节奏)都属同类(运动服饰/优衣库系)的 table-stakes,偏离度低;最高信号维度(招人筛子、开会机制)定向深挖<strong>查无</strong>。组织分低 ≠ 战略弱——这是&rdquo;组织上别从本工具找信号&rdquo;的合法结论,不是潜力盲区。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>决策权/治理</td>\n<td>〔事实〕李宁负责&rdquo;战略、人事、财务&rdquo;,钱炜负责&rdquo;运营&rdquo;;2019 任前优衣库中国 COO 钱炜为联席 CEO(新浪/中企网&rdquo;双打&rdquo;)</td>\n<td>创始人在烧穿张志勇/金珍君等 3 任职业经理人(金珍君改革&rdquo;用力过猛、人心散了&rdquo;)后,把运营全权让给空降 CEO、自己退到战略层 → 比&rdquo;创始人事必躬亲&rdquo;costly;但&rdquo;founder+pro CEO 分工&rdquo;是大消费成熟期常见结构,对同类偏离有限</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>战略-结构</td>\n<td>&ldquo;2020 我们做了一个特别重要的组织变动——把供应链整合了…以前供应链分得比较细&rdquo;(钱炜对话李丰,网易)</td>\n<td>把碎片化供应链合并成一个整合职能(康威/结构动作),是 done 的真动作;但属运营修复型整合,对同类非反常</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>信息流/运营节奏</td>\n<td>&ldquo;零售业就是在泥水中摸爬滚打…扎在现场,看着数据,每周盯、每天盯,逐步使库存得到有效控制&rdquo;(钱炜,网易)</td>\n<td>一号位级别的高频盯店/盯数据节奏(日盯/周盯、一年四季每季 90 天售罄口径);是运营纪律,落在&rdquo;商品/库存&rdquo;而非&rdquo;人怎么被组织&rdquo;,org 成色弱</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>组织演进</td>\n<td>〔事实〕2015 由&rdquo;职能导向&rdquo;转&rdquo;品类事业部&rdquo;(篮球/跑步/综训/羽毛球/运动生活五品类);报道称&rdquo;此前几次变革均不见效&rdquo;(凤凰财经)</td>\n<td>弱组织补债型 reorg(连续失败后被迫重画结构),非表现好时主动升级 → 诊断为债,不加分</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>人才密度 / 层级·span</td>\n<td>〔盲区〕创始人与钱炜的招人/看人筛子、面试哲学:定向深挖<strong>查无</strong>;span/层级、晋升靠战功还是带人:无机制</td>\n<td>— 无可复述机制</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:仅累计 A 行 Top-3 S=D×C → 双打 4 + 供应链 2 + 盯店 2 = 8;8/27×100 ≈ <strong>30</strong>。Δ 行(2015 事业部)单列、不进分。<strong>在赌什么/何时失效</strong>:赌&rdquo;创始人管战略+职业经理人管零售运营&rdquo;的双头能持续不内耗;若钱炜离任或两人战略分歧,这套结构是最大单点风险(已无第二任 backup 的历史记录)。</li>\n<li><strong>盲区 + 下一步</strong>:两条最高信号维度(① 招人/看人筛子 ② 开会/决策会机制)<strong>定向子查询查无</strong>——这是信息盲区,不是判定平庸。若要继续:找钱炜长访谈(优衣库系&rdquo;商品力/卖场&rdquo;用人标准是否带进李宁)、脉脉/Blind 现役员工对账&rdquo;双打&rdquo;是否真授权 vs 创始人仍隐性拍板。验证 hypothesis:&rdquo;双打&rdquo;是真放权(revealed)还是表演式分工。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:&rdquo;单品牌、多品类、多渠道&rdquo;+&rdquo;国潮/中国李宁&rdquo;品牌势能是<strong>战略层</strong>亮点;但 2024 营收 +3.9% 落后安踏(+13.6%)、361(+19.6%),增长掉队——战略可看,组织无独特信号。</li>\n<li><strong>优先级</strong>:组织 Score 30 × 市场 {大,运动服饰} × 战略 {单品牌多品类=偏共识} → <strong>Pass(贴 P2 下沿)</strong>。理由:组织维度证据充分(RICH)却确认&rdquo;无独特 org-design Alpha&rdquo;,仅运营纪律强;不值得为&rdquo;组织偏离&rdquo;分配注意力,除非后续在招人/会议盲区挖到反常机制再上调。</li>\n</ul>"}, {"rank": 137, "score": 30, "conf": "RICH", "dir": "?", "priority": "P2", "company": "xAI", "oneliner": "极宽span+hardcore+fire-fast+一线talent-engineer招筛,真偏离但reorg/出走频发", "card": "<h1>xAI — Why attention?   ·   Score 30 · 置信度 RICH · 优先级 P2(组织弱/动荡，但市场极大，列观察）</h1>\n<p><strong>一句话定性</strong>：值得&rdquo;观察执行&rdquo;、不值得为&rdquo;组织 Alpha&rdquo;花时间。xAI 的&rdquo;组织操作系统&rdquo;是<strong>一号位个人引力场</strong>——Musk 直管招聘、极扁平顶层、小团队闪电执行；但这套<strong>截面 Alpha 很薄</strong>（多为同类 table-stakes，或随人走而失效），而<strong>revealed 的组织债很重</strong>（12 创始人走 9、自承&rdquo;建错了&rdquo;、招聘重置、反复 reorg、被 SpaceX 并表）。诊断为<strong>弱组织被迫补债</strong>（危机后被迫、反复反转、一号位自我归罪），不是强组织主动演进。主分低源于&rdquo;standing Alpha 数不出几条&rdquo;，而非信息盲区。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源，必填)</th>\n<th>机制（谁/怎么/多少）+ 偏离同类基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>人才密度</td>\n<td>&ldquo;don&rsquo;t look at the resume… if the conversation after 20 minutes is not &lsquo;Wow,&rsquo; you should believe the conversation, not the paper&rdquo;（Musk，转载 AOL/finviz 2026）</td>\n<td>Musk 级亲自定调的&rdquo;对话&gt;简历&rdquo;筛子 + 不要被裁过的人 + 找&rdquo;nerdy engineer/会 vibe coding/从小做酷东西&rdquo;。偏离同类的结构化面试 loop——但属创始人主导招聘的常见做法</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>决策权/层级</td>\n<td>〔事实〕仅 5 人直接向 Musk 汇报；一支&rdquo;small, elite unit … report directly to Musk … hire the absolute best people in the world&rdquo;（AOL 2026，岗位 talent engineer，$120–240k，Palo Alto）</td>\n<td>招聘当一号位级杠杆、专设直汇报 Musk 的猎才小队；顶层极扁平。同类（OpenAI/Anthropic）也扁平→部分 table-stakes；机制是 stated、无 revealed 留存/产出对账</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>层级/span</td>\n<td>〔事实〕Babuschkin 曾带 29 个直接下属（The Information / AOL org chart）</td>\n<td>极宽 span、压层级。<strong>但此人已于 2025-08 离职 → 该实例已 stale</strong>，不是稳态在跑</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>信息流/演进</td>\n<td>&ldquo;xAI was not built right first time around, so is being rebuilt from the foundations up&rdquo;（Musk on X, 2026-03，回应挖 Cursor 二人）；&rdquo;didn&rsquo;t hire the right people&rdquo;、重开简历堆（Musk，2026）</td>\n<td>Δ：一号位 costly 自承建错+宣布重建（招了 Cursor 的 Milich/Ginsberg &ldquo;fix&rdquo;）。诊断=<strong>弱组织补债</strong>：危机后被迫、&rdquo;again, again&rdquo;反复反转、自我归罪</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">↗债</td>\n</tr>\n<tr>\n<td>激励/稳定</td>\n<td>员工侧：&rdquo;very little job stability, regular changes to team/project with little-to-no employee input&rdquo;；&rdquo;common to get fired before 6-month vest&rdquo;（Glassdoor/Blind 2025–26）；裁数据标注 500+</td>\n<td>revealed 病征：高 churn、6 月 vest 前被汰、项目频繁洗牌。佐证&rdquo;硬核但不稳&rdquo;——确认平庸/动荡的 costly 证据</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>：仅累计 A 行 Top-3 S=D×C：决策权 4 + 人才密度 2 + span 2 = 8 → round(8/27×100)=<strong>30</strong>。Δ 行（&rdquo;建错了&rdquo;+重建+挖 Cursor）按落地闸单独列、不进主分：自承属 stated、且为弱组织补债，无 revealed 在落地。<strong>在赌什么/何时失效</strong>：整套组织赌&rdquo;Musk 个人带宽 + 算力暴力 + 小团队闪电战能替代结构稳态&rdquo;；当创始团队大面积流失（已发生 9/12）、且招聘/方向反复重置时，这种&rdquo;人即组织&rdquo;模型最先失效。</li>\n<li><strong>盲区 + 下一步</strong>：信息不缺（RICH），缺的是<strong>正向 standing Alpha</strong>。Follow up：① 并入 SpaceX 后实际汇报线/损益边界怎么重画（验证&rdquo;主动演进 vs 继续补债&rdquo;）；② Cursor 二人到岗后 Grok/Coding 团队留存与产出（验证重建是否 revealed 落地、没回弹）；③ 找现员工对账&rdquo;对话筛子&rdquo;今天还算不算数（已被&rdquo;招错了人&rdquo;自我证伪）。</li>\n<li><strong>业务/战略离群（不计入组织分）</strong>：极大市场（基础大模型/AGI）、$230B+ 估值、$20B 融资、Colossus/Memphis 120 天建成（被同行称&rdquo;不可能&rdquo;）、被 SpaceX 并表冲 IPO——<strong>战略与执行速度上极离群、值得看；但这是业务/资本面，不是组织 Alpha</strong>。护栏一：别把&rdquo;敢赌+建得快&rdquo;误算成&rdquo;非共识的组织设计&rdquo;。</li>\n<li><strong>优先级</strong>：组织 30（弱/动荡，RICH）× 市场 大 × 战略 同类共识（frontier lab 打法）→ 按桶 Score&lt;33+RICH 本应 Pass；因<strong>市场极大</strong>上调为 <strong>P2 观察</strong>——不为&rdquo;学组织&rdquo;看，而是跟踪&rdquo;补债能否转成稳态&rdquo;。别因 Musk 光环把薄 Alpha+重债的组织摁高。</li>\n</ul>"}, {"rank": 138, "score": 30, "conf": "RICH", "dir": "?", "priority": "P2", "company": "Block (XYZ)", "oneliner": "零管理层+砍半AI-first+拆BU硅仓+经理须写代码,激进但多为转向中", "card": "<h1>Block (XYZ) — Why attention?  ·  Score 30 · 置信度 RICH · 优先级 P2</h1>\n<p><strong>一句话定性</strong>:standing Alpha 是&rdquo;竞争力中上但不惊艳&rdquo;——一套 maker-protection + 去年度考评的扁平打法(同类里偏常见,机制偏软);真正的大动作(&ldquo;无中层 / AI 取代中层 / 全员直接向 Dorsey 汇报&rdquo;)是 <strong>Delta(在转向)且落地闸没过</strong>——2026.2 裁掉 40% 后六周内回聘、官方称&rdquo;文书/行政错误&rdquo;、Bloomberg 指为 AI-washing。<strong>这是危机后被迫的补债式 reorg,不是表现好时主动演进的 Alpha</strong>;按规则 Delta 不进主分、也不下扣已挖到的 Alpha。值得看,但看的是&rdquo;无中层实验会不会稳住&rdquo;,不是已成型的组织优异。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>信息流/maker 时间</td>\n<td>&ldquo;@jack made Tuesdays a &lsquo;No Meeting Day&rsquo; across Block… Less talk about the work. More work.&rdquo;(Cash App 产品负责人 Kristen Anderson, Fortune 2024.3)</td>\n<td>全公司周二禁会 + 每季 Maker Weeks;保护 IC 整块时间、把协调往异步 Slack 推。偏离基线轻——tech 同类已渐成 table-stakes</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度</td>\n<td>&ldquo;I want us to build a culture of excellence… If [excellence is] not possible for any one person… part ways without delay.&rdquo;(Dorsey 全员信, Fastcompany/Benzinga 2023.11)</td>\n<td>砍年度考评 + PIP,改持续实时反馈 + 不达标即时分手。比同类砍 PIP 偏反常;但&rdquo;持续评估&rdquo;替代物的机制偏软、缺第三方对账</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>一号位组织自觉(维度8)</td>\n<td>&ldquo;a company built as an intelligence (or mini-AGI)&rdquo;;&rdquo;There is no need for a permanent middle management layer… the system coordinates.&rdquo;(Dorsey &amp; Botha《From Hierarchy to Intelligence》, Fortune 2026.4)</td>\n<td>用两个 AI &ldquo;world model&rdquo; 接管中层的信息路由/对齐,三类角色(&ldquo;player-coaches&rdquo;替经理)。框架连贯且反常,但当前<strong>挖不到在跑的机制</strong>→stated/愿景,C 封顶 1</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>层级/span(转向中)</td>\n<td>〔事实〕2026.2 裁 4,000/10,000(-40%),Dorsey 称 AI 让这些人&rdquo;unnecessary&rdquo;,股价当日 +24%(Fortune);六周后 tech lead Richard Hesse &ldquo;told his manager he would quit unless they rehired his team — they did&rdquo;,官方称部分裁员系&rdquo;clerical and administrative errors&rdquo;,≥4 人回聘(humai.blog/Yahoo);Bloomberg 早 3 月指部分接近 AI-washing</td>\n<td>想压成&rdquo;1 高管 + 6,000 IC、无中层&rdquo;;但回弹+认错+AI-washing = <strong>落地失败的 revealed 证据</strong>。诊断:post-COVID 过招后危机式一次性大砍 + 反转 → 偏补债,非主动演进</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 → 人才密度 S=4 + 信息流 S=2 + 维度8(C 封顶1)S=2 = 8;8/27×100 ≈ <strong>30</strong>。<strong>在赌什么 / 何时失效</strong>:赌&rdquo;AI intelligence layer 能替代中层的协调/对齐&rdquo;。失效条件已部分显形——回聘与&rdquo;行政错误&rdquo;说明协调职能并未被系统接住;若无中层结构无法在 6,000 人规模稳住,bet 崩。</li>\n<li><strong>盲区 + 下一步</strong>:① 招人筛子——查无 Dorsey/CTO 的具体&rdquo;看人筛子&r aleigh)</td>\n<td>主动放弃扎根 Raleigh 的本地用工承诺改去外地招人——对&rdquo;全人/在地文化&rdquo;模型的回退</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 的尖峰 S。运动午休 S=2×2=4;CEO 执行断网令 S=2×2=4(同属激励维,封顶 2 条);确认平庸行 D=0 不贡献;三 P S=0。同维封顶 → Σtop ≈ 4+(取另一独立尖峰约 3)/27 → <strong>Score ≈ 27</strong>。<strong>在赌什么/何时失效</strong>:赌&rdquo;强制照顾员工 mind/body/spirit → 高敬业+客服口碑&rdquo;;当文化没渗进决策权/薪酬/晋升(正是员工侧抱怨处)时,福利沦为留人不留心的边缘机制。</li>\n<li><strong>盲区+下一步</strong>:决策权、span/层级、信息真相上行、人才密度筛子——<strong>全无可复述机制</strong>(CEO 公开表达集中在&rdquo;健康/信仰&rdquo;,非&rdquo;人怎么被组织&rdquo;)。验证 hypothesis:运动午休/断网令在 1,200 人、6 大洲、含外地新招后是否仍真执行(已是 stated 偏 revealed,但 2024 撤约提示在地模型在松动);找 People 官 Rebecca Bottorff / 离职员工对账&rdquo;健康制度 vs 薪酬晋升&rdquo;。</li>\n<li><strong>业务/战略离群(不计组织分)</strong>:CPaaS 转 AI 语音编排(Maestro,&gt;50% 企业客户在用),$745–760M 营收、EBITDA 利润率 17%——稳健但赛道拥挤(Twilio/Sinch),战略偏共识。</li>\n<li><strong>优先级</strong>:组织 27 × 市场 中 × 战略 共识 → <strong>Pass</strong>(Score&lt;33 且 RICH=信息充分、确认组织大体平庸;唯一真机制是单维的&rdquo;强制健康+CEO 亲执&rdquo;,不足以撑起注意力;非&rdquo;看不出&rdquo;的待补)。</li>\n</ul>"}, {"rank": 141, "score": 26, "conf": "RICH", "dir": "↑", "priority": "Pass", "company": "General Motors (GM)", "oneliner": "砍37层管理+点名GMnod,巨型车企罕见去科层,但多stated/历史", "card": "<h1>General Motors (GM) — Why attention?  ·  Score 26 · 置信度 RICH · 优先级 Pass</h1>\n<p><strong>一句话定性</strong>：组织上<strong>不值得优先看</strong>——对&rdquo;百年级全球车企（同类：Ford/Stellantis/Toyota/VW）&rdquo;而言，GM 只有 Barra 一条真在跑的小机制（&rdquo;两词着装令&rdquo;式授权），其余多是 cheap-ish 金句与<strong>只有 CEO 自述的 Delta</strong>（&rdquo;frozen middle 已融化&rdquo;），而员工侧/第三方 revealed 证据反向坐实了它仍是<strong>层级深、责任不对称、留不住硅谷人才</strong>的传统科层。这是<strong>确认平庸（RICH）</strong>，不是信息不足；它的看点在战略/资本（Cruise、EV）而非组织。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制（谁/怎么/多少）+ 偏离同类基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>决策权/授权</td>\n<td>&ldquo;if they cannot handle &lsquo;dress appropriately&rsquo;, what other decisions can they handle?…I can trust you with \\$10 million…but I can&rsquo;t trust you to dress appropriately?&rdquo;（Barra, Quartz/《What You Do Is Who You Are》转述）</td>\n<td>任 HR 头时把 10 页着装政策→两词&rdquo;Dress appropriately&rdquo;，逼经理自行拍板；逻辑是&rdquo;过度规定→人就 live down to them&rdquo;。一条<strong>真在跑、可复述</strong>的去规章授权动作，对传统 OEM 略反常</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度</td>\n<td>&ldquo;how peers / supervisor would describe you in three adjectives…looking for people who accomplish things through influence, not hierarchical power&rdquo;（CNBC 2018）</td>\n<td>招人筛子=三组形容词一致性测正直 + 看用&rdquo;we&rdquo;还是&rdquo;they&rdquo;测归属。具体但<strong>不排他、不得罪人</strong>，是高管面试通用 lore，非激进筛子</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>信息流/真相上行</td>\n<td>&ldquo;No more crappy cars…and that resonates&rdquo;（Fortune MPW 2013）；2014 全员会&rdquo;hold me accountable…they should call me out&rdquo;</td>\n<td>用一句口令对齐质量责任 + 喊&rdquo;互相问责&rdquo;。点火门危机后的修辞动员，<strong>无可证伪的上行机制</strong>，命中 cheap-talk 风险</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>层级/span（<strong>反向对账</strong>）</td>\n<td>〔Glassdoor 2024–25〕&rdquo;multiple layers of decision-making, bureaucracy slows everything&rdquo;；&rdquo;successes credited to upper leaders, failures relegated to mid-lower&rdquo;；&rdquo;Toxic, fearful culture&rdquo;、stack ranking</td>\n<td>员工侧 revealed：层级仍深 + <strong>责任不对称（功上行/过下行）</strong>=教科书平庸病征，<strong>直接打脸</strong>&ldquo;frozen middle 已融化&rdquo;</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n<tr>\n<td>组织演进（Delta）</td>\n<td>〔事实〕2021 Barra 称&rdquo;the frozen middle has melted&rdquo;（自述）；2024 关停 Cruise robotaxi（投入&gt;\\$10B）、裁~1000；2025 合并软件+产品归 Sterling Anderson，三名硅谷高管（Cetinok/Apple、Richardson、Turovsky）~2 年内出走（CNBC）</td>\n<td>reorg 诊断：软件线是<strong>过快扩张后被迫收缩</strong>、Cruise 是<strong>危机后止损</strong>=弱组织补债，非表现好时主动升级；&rdquo;已融化&rdquo;是 stated 自述、被 Glassdoor 反驳</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>：仅累计 Alpha 行 Top-3 S=D×C —— 着装令 2×2=4、招人 1×2=2、口令 1×1=1 → Σ=7 → 7/27×100 ≈ <strong>26</strong>。&rdquo;frozen middle 已融化&rdquo;按落地闸（CEO 自述 + 员工侧反驳）<strong>不计分、判 Delta·待验证落地（实为已被打脸）</strong>。<strong>在赌什么</strong>：Barra 赌&rdquo;少规章=多授权&rdquo;能在 16 万人科层里复制；revealed 证据显示符号层做到了、决策层没传导下去。</li>\n<li><strong>盲区 + 下一步</strong>：制造/工厂层 span、晋升到底奖&rdquo;带人&rdquo;还是&rdquo;战功&rdquo;挖不到机制（需补）；若要再看，找点：硅谷高管批量出走的<strong>离职访谈</strong>（验证文化整合 vs 授权口号的真伪）、以及软件 reorg 后决策层数是否真减。</li>\n<li><strong>业务/战略离群（不计入组织分）</strong>：Cruise $10B all-in 自动驾驶后清盘、EV 产能目标从 100 万腰斩——<strong>战略上敢下大注且敢止损，值得在战略层看</strong>；但这是资本/战略离群，<strong>组织上无可信偏离</strong>。</li>\n<li><strong>优先级</strong>：组织 26 × 市场 大 × 战略 共识偏激进 → <strong>Pass（组织维度）</strong>。Score&lt;33 且 RICH=对同类<strong>确认组织平庸</strong>（一条真授权机制 + 一堆被 revealed 打脸的故事）；注意力别投在&rdquo;组织&rdquo;理由上，要看就看其<strong>战略资本动作</strong>，不靠本筛子。</li>\n</ul>"}, {"rank": 142, "score": 24, "conf": "RICH", "dir": "↑", "priority": "P2", "company": "Ford (NYSE: F)", "oneliner": "按客户拆Blue/Model e/Pro三段独立P&L,组织图反推战略", "card": "<h1>Ford (NYSE: F) — Why attention?  ·  Score 24 · 置信度 RICH · 优先级 P2</h1>\n<p><strong>一句话定性</strong>：值得&rdquo;持续观察&rdquo;而非&rdquo;放下手头去看&rdquo;。Ford 的&rdquo;组织操作系统&rdquo;截面上仍是<strong>百年大厂的平庸基线</strong>（多层审批、政治、&rdquo;chimney&rdquo; 式 PD 部门、养老金驱动的 &ldquo;go along to get along&rdquo;——员工侧独立证实），<strong>唯一真正偏离同类的 standing Alpha 是 California 独立 skunkworks</strong>（小团队、隔离母舰、挖 Tesla/Rivian），但这条 Alpha <strong>2026 年已被折回制造体系</strong>。其余多是<strong>转向 Delta / 补债</strong>（3 段拆分 → 部分回滚），不是截面优异。同类基线 = legacy OEM（GM/Stellantis/VW），它们大多也拆了 EV、也喊 skunkworks，故偏离幅度有限。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>人才密度/康威(2,7)</td>\n<td>&ldquo;It was a small group, a small team — some of the best EV engineers in the world — and it was separate from the Ford mothership. It was a startup.&rdquo;(Farley, TechCrunch/WardsAuto 2024)</td>\n<td>体外建独立 EV 团队，从 &lt;10 人长到 ~100–300；ex-Tesla <strong>Alan Clarke</strong> 领衔，定向挖 Tesla/Rivian/Lucid/Canoo + 收购 AMP。刻意脱离母公司流程造低价 EV 平台。偏离 legacy OEM&rdquo;自有体系内做&rdquo;基线</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>一号位亲历(8)</td>\n<td>&ldquo;Every big decision I ever make, I go in person… you have to go and see the real problem — where the waste is.&rdquo;(Farley, Decoder 2025，gemba)</td>\n<td>CEO 亲赴现场再拍板（Toyota gemba 移植）；反&rdquo;靠二手汇报/PPT 拍板&rdquo;。但属个人习惯非制度，且 gemba 是行业熟知做法</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>组织演进(9)</td>\n<td>〔事实〕2022 拆 Ford Blue/Model e/Pro；2026/4 Model e 折入制造、归 COO Galhotra，Doug Field 离职，独立 EV 单元解散(Electrek/electrive 2026)</td>\n<td>reorg-on-reorg：先独立、后回收；伴随 EV 业务 ~$4.8–5B 亏损。诊断三问→<strong>危机后被迫 style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n<tr>\n<td>8 一号位自觉(软)</td>\n<td>&ldquo;Leadership is mostly about people: communication, talent, and culture&rdquo;;&rdquo;Mastering the soft stuff is the hard stuff&rdquo;;&rdquo;Hiring with Intent&rdquo;(Glastra LinkedIn)</td>\n<td>仅理念金句,挖不到筛子/keeper test/具体动作;且与员工侧恐惧文化矛盾 → cheap talk,需补机制</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">0</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>9 运营系统(table stakes)</td>\n<td>〔事实〕&rdquo;Novanta Growth System (NGS)… set of best-practice tools, templates, and processes… Rooted in Lean principles, four core focus areas&rdquo;(Novanta 官网/ESG)</td>\n<td>标准化 lean 运营系统(类 DBS)→ 同赛道工业 compounder 人人都有,<strong>peer 共识、非偏离</strong></td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">0</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 S=D×C:决策权 4 + 人才/信息 4 + 一号位 0 = 8 → round(8/27×100)≈ <strong>30</strong>;但两条最强 A 行方向均为 ↓(集权+恐惧=确认平庸/红旗,非&rdquo;非共识好赌注&rdquo;),按&rdquo;确认平庸钉低分&rdquo;取下沿 ≈ <strong>19</strong>。<strong>在赌什么/何时失效</strong>:Novanta 的真实组织模型是&rdquo;corporate 集权 + 强整合&rdquo;——靠并购+NGS 提效率,赌&rdquo;统一管控 &gt; BU 自治&rdquo;;财务跑得不错,但组织维度无可复述的反常优异机制。</li>\n<li><strong>盲区 + 下一步</strong>:CEO 自述与员工侧严重矛盾(stated 文化 vs revealed 恐惧/集权),已对账,矛盾偏向 revealed。若仍想跟:核实&rdquo;BU 是否有具名 P&amp;L owner / 一线授权边界&rdquo;,以及 GM 高频更换是&rdquo;主动升级&rdquo;还是&rdquo;被迫补债&rdquo;(诊断 reorg)。但作为注意力分配——<strong>Pass</strong>。</li>\n<li><strong>业务/战略离群(不计组织分)</strong>:连续并购+财务标准严格(高现金转化、非稀释毛利、增速高于自身),工业+医疗双段,Q4&lsquo;25/Q1&lsquo;26 创纪录营收——<strong>业务执行稳健,但属同类 compounder 共识打法,非反共识战略</strong>。</li>\n<li><strong>优先级</strong>:组织 19(RICH=确认无组织 Alpha、且带 ↓ 红旗)× 市场 中 × 战略 共识 → <strong>Pass</strong>。组织维度看不出值得投注意力的非共识赌注;CEO 文化叙事是 cheap talk,被员工侧打脸。</li>\n</ul>"}, {"rank": 147, "score": 11, "conf": "RICH", "dir": "?", "priority": "P2", "company": "Blue Origin", "oneliner": "Limp移植Amazon LP+削管理层,但是危机后补债型Delta、CEO自述未坐实落地", "card": "<h1>Blue Origin — Why attention?  ·  Score 11 · 置信度 RICH · 优先级 P2（watch the Delta，组织 Alpha 偏低）</h1>\n<p><strong>一句话定性</strong>：这是一家<strong>截面组织 Alpha 很弱、转向 Delta 很大</strong>的公司。standing 基线被第三方反复证实为&rdquo;官僚、慢、被 SpaceX 甩开&rdquo;（确认平庸，非信息盲区）；Dave Limp（2023.12 上任，前 Amazon 设备掌门）正把它往&rdquo;Amazon 式决断+客户痴迷&rdquo;硬掰——换掉约一半高管、2025.2 砍 10% 削层级。但这套是<strong>弱组织被迫补债</strong>型 reorg（落后多年后纠偏，非顺风主动演进），且 revealed 落地证据<strong>喜忧参半甚至回弹</strong>（NG-3 把客户卫星送错轨道全损、随后试车爆炸炸毁唯一发射台）。主分只能给那点薄 Alpha；Delta 不进分、不进 P0。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕（+来源）</th>\n<th>机制（谁/怎么/多少）+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>人才密度</td>\n<td>&ldquo;I over-index on hiring people that are curious… The people that keep learning are right more often. <strong>And I will pay almost anything for people that are right a lot.</strong>&ldquo;（Limp，Vanderbilt 演讲 2025.10）</td>\n<td>招人筛子=好奇心+AI 即战力(&ldquo;已经 relevant、不用我培训&rdquo;)；但只是公开演讲的择人哲学，<strong>挖不到可复述的筛子机制</strong>（无&rdquo;招人 N 问&rdquo;/keeper test 细节）→ 标&rdquo;需补机制&rdquo;、C 封顶</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>一号位组织自觉</td>\n<td>&ldquo;Jeff felt that [Blue Origin] needed manufacturing expertise; it needed decisiveness; it need a little bit of energy.&rdquo;（Limp，CNBC 2024.10）；〔上任后&rdquo;about half&rdquo; 高管已更换〕</td>\n<td>一号位能讲出&rdquo;缺制造力/缺决断/缺能量&rdquo;的连贯组织诊断 + 换血一半领导层=有组织设计自觉；但属&rdquo;在转向&rdquo;的诊断，非在跑的稳态机制</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>信息流/层级（standing 基线）</td>\n<td>〔2021 起 20+ 在职/前员工公开指证&rdquo;toxic culture&rdquo;&ldquo;bro culture&rdquo;、信任崩塌、严重拖期、Bob Smith 微观管理拖慢一切〕（多家媒体复述员工侧）</td>\n<td>第三方+员工侧对账证实的<strong>确认平庸</strong>：层级厚、决策慢、报喜不报忧——revealed 硬证据，但方向是红旗</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n<tr>\n<td>决策权/层级（reorg）</td>\n<td>&ldquo;We grew and hired incredibly fast… and with that growth came more bureaucracy and less focus than we needed.&rdquo;→&rdquo;<strong>thinning out our layers of management</strong>&ldquo;&rdquo;eliminating some positions in engineering, R&amp;D, and program/project management&rdquo;（Limp 全员裁员信，2025.2，GeekWire/SpaceNews）</td>\n<td>砍约 10%（~1,000–1,400/约14,000）、削管理层级、提速制造与发射节奏。<strong>Δ：弱组织补债型 reorg</strong>（落后多年后被迫纠偏，非顺风主动演进）→ 不进主分</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">↗</td>\n</tr>\n<tr>\n<td>落地验证（revealed）</td>\n<td>〔NG 二飞 2025.11 史上最快大型助推器二次海上回收成功；但 NG-3 2026.4 二级冷氪泄漏致客户卫星 BlueBird-7 入错轨<strong>全损</strong>、FAA 停飞；2026.5 静态点火<strong>炸毁唯一发射台</strong>，或需修到 2028〕</td>\n<td>用来给&rdquo;决断转向真生效&rdquo;对账：<strong>部分里程碑达成、但关键任务回弹</strong>→ 落地闸不通过、turnaround 未坐实</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>：只累计 A 行 Top-3 → 人才密度 S=2×1=2、组织自觉 S=1×2=2、standing 基线 S=2×3=6 但<strong>方向↓（确认平庸/红旗，不作正向注意力 bet）</strong>。作为&rdquo;正向组织赌注&rdquo;的 Alpha 仅 ≈ 2+2 → Σ≈4，round(4/27×100)≈<strong>11</strong>（standing 红旗钉低分、不抬分）。<strong>在赌什么/何时失效</strong>：Limp 赌&rdquo;把消费电子的决断+客户痴迷+少而精招人移植进慢节奏航天能提速&rdquo;；若 NG 连续失利+发射台长期停摆，补债速度跟不上 SpaceX，转向会被证伪。</li>\n<li><strong>盲区 + 下一步</strong>：<strong>会议机制</strong>只查到&rdquo;疑似沿用 Amazon 六页备忘录/叙事 memo&rdquo;，<strong>无 Blue Origin 内部可核验做法</strong>（需补机制）；激励/所有权、span 具体数字、晋升标准均无一手——这些是信息盲区。Follow up：找 Limp 上任后<strong>真在跑</strong>的机制（决策权下放边界？keeper test？周节奏？），及 2026 下半年发射台恢复+ NG 复飞结果，验证&rdquo;决断转向是否落地、不回弹&rdquo;这一 hypothesis。</li>\n<li><strong>业务/战略离群（不计入组织分）</strong>：超大市场（轨道发射+月球着陆器+ Amazon Kuiper 24 任务订单+空间站），战略上<strong>追赶者</strong>而非反共识；Bezos 长期无限输血=资本离群，但那是 cap-table/资本决策，不进组织分。</li>\n<li><strong>优先级</strong>：组织 Score 11（RICH=确认 standing 平庸、薄 Alpha）× 市场 大 × 战略 共识/追赶 → 严格按桶=<strong>Pass</strong>（Score&lt;33+RICH）；因<strong>大市场 + 一场正在进行、值得盯落地的大 Delta</strong>上调为 <strong>P2 持续观察</strong>——看的是&rdquo;转向能不能坐实&rdquo;，<strong>不是</strong>它当前组织截面优异。别把&rdquo;会讲转向故事&rdquo;高估成&rdquo;闷声优秀&rdquo;。</li>\n</ul>"}];
const tb=document.getElementById('tb'),q=document.getElementById('q');
let filter='all',sortK='score',sortDir=-1;
function band(s){return s>=80?'s80':s>=60?'s60':s>=40?'s40':'s0'}
function dirc(d){return d==='↑'?'up':d==='↓'?'down':'q'}
function render(){
  let list=DATA.filter(r=>{
    if(filter==='P0'&&r.priority!=='P0')return false;
    if(filter==='P1'&&r.priority!=='P1')return false;
    if(filter==='80'&&r.score<80)return false;
    if(filter==='60'&&r.score<60)return false;
    const s=q.value.trim().toLowerCase();
    if(s){return (r.company+' '+r.oneliner+' '+r.card).toLowerCase().includes(s)}
    return true;
  });
  list.sort((a,b)=>{let x=a[sortK],y=b[sortK];if(typeof x==='string'){x=x.toLowerCase();y=y.toLowerCase()}return x<y?sortDir:x>y?-sortDir:a.rank-b.rank});
  tb.innerHTML='';
  list.forEach(r=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`<td class="n">${r.rank}</td>
<td class="s"><span class="score ${band(r.score)}">${r.score}</span></td>
<td><span class="conf">${r.conf}</span></td>
<td class="dir ${dirc(r.dir)}">${r.dir}</td>
<td><span class="co">${r.company}</span>${r.priority?`<span class="pri ${r.priority}">${r.priority}</span>`:''}<div class="ol">${r.oneliner}</div></td>
<td><a class="lk" data-r="${r.rank}">查看卡片 →</a></td>`;
    tb.appendChild(tr);
  });
  document.getElementById('empty').style.display=list.length?'none':'block';
  document.getElementById('cnt').textContent=DATA.length;
  document.getElementById('meta').textContent=`${list.length} / ${DATA.length} 家 · 点列头排序 · 点卡片查看逐字原话+机制`;
}
tb.addEventListener('click',e=>{const a=e.target.closest('.lk');if(!a)return;const r=DATA.find(x=>x.rank==a.dataset.r);openCard(r)});
function openCard(r){document.getElementById('mc').innerHTML=r.card;document.getElementById('ov').classList.add('on');document.getElementById('modal').scrollTop=0}
function close(){document.getElementById('ov').classList.remove('on')}
document.getElementById('x').onclick=close;
document.getElementById('ov').onclick=e=>{if(e.target.id==='ov')close()};
document.addEventListener('keydown',e=>{if(e.key==='Escape')close()});
q.addEventListener('input',render);
document.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));c.classList.add('on');filter=c.dataset.f;render()});
document.querySelectorAll('th[data-k]').forEach(th=>th.onclick=()=>{const k=th.dataset.k;if(sortK===k)sortDir*=-1;else{sortK=k;sortDir=(k==='company')?1:-1}render()});
render();
</script></body></html>
