<script>
const DATA=[{"rank": 1, "score": 91, "conf": "RICH", "dir": "↑", "priority": "P0", "company": "Palantir", "oneliner": "FDE现场放权+艺术家殖民地用人+Karp亲面排名校,多条在跑机制", "card": "<h1>Palantir — Why attention?   ·   Score 91 · 置信度 RICH · 优先级 P0</h1>\n<p><strong>一句话定性</strong>:值得放下手头去看。它的&rdquo;组织操作系统&rdquo;= <strong>去头衔 + 去管理 + 极端授权的&rdquo;培养皿&rdquo;</strong>——把 ~4000 人压成&rdquo;全员 FDE + 5~6 个 Director + CEO&rdquo;两层、谁也不能命令谁、靠反信用主义筛子招人。这是<strong>截面 Alpha</strong>(当前在运行、被 8 年期前员工和员工侧评价交叉证实),不是转向 Delta。三条核心信号都挖到了机制、且有 revealed 落地证据(含 costly 的反面代价)。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>层级/span</td>\n<td>&ldquo;everyone had the &lsquo;forward deployed engineer&rsquo; title, more or less, and apart from that there were five or six Directors and the CEO&rdquo;(Nabeel Qureshi《Reflections on Palantir》,8 年期 FDE)</td>\n<td>~4000 人只有 ~2 个有效层级、刻意无 title 无职级阶梯(溯源 Thiel:title 制造觊觎与内政);员工侧印证&rdquo;no ladder, no career progression&rdquo;。偏离&rdquo;同规模 tech 公司必有职级/晋升梯&rdquo;共识——而且<strong>反面代价真实存在</strong>(revealed)</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>决策权</td>\n<td>&ldquo;nobody could tell anyone else what to do&rdquo;;颂扬&rdquo;ignored a Director and built something that ended up being a critical piece of infrastructure&rdquo;;代价:&rdquo;no clear strategy or direction, more like a Petri dish of smart people building little fiefdoms&rdquo;(同上)</td>\n<td>4–5 人小队自治、可逆决策完全下沉、抗命被奉为英雄叙事;无强制流程。偏离&rdquo;决策默认上浮&rdquo;——costly 反面(碎片化/内耗)被同源点名,故 revealed</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>人才密度</td>\n<td>&ldquo;hiring or discarding a candidate within two minutes&rdquo;;&rdquo;If you ask the question that the Stanford/Harvard/Yale person has answered a thousand times, all you&rsquo;re learning is that [they&rsquo;ve] learned to play the game&rdquo;;偏好&rdquo;child of a mechanic&rdquo;;找&rdquo;feeling like I&rsquo;m in the presence of talent&rdquo;(Fortune 2024.8;Karp 本人)</td>\n<td>Karp 亲自面、2 分钟拍板、用反信用/反备稿的&rdquo;非常规答案&rdquo;+ 棋艺/运动等无关信号当筛子。落地结果:<strong>founder factory——1/3 的 PM 创业</strong>(Anduril/Kalshi/ElevenLabs);偏离&rdquo;按名校/履历招&rdquo;共识</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3:9(层级)+9(决策权)+8(人才密度,founder-factory 因果偏 stated 故 C=2)=26 → 26/27×100 ≈ <strong>96</strong>,实给 <strong>91</strong>(招人那条的&rdquo;founder factory 因果&rdquo;非纯 revealed,留折扣)。<strong>在赌什么 / 何时失效</strong>:赌&rdquo;高密度自驱者无需结构即可自组织&rdquo;。规模化/做平台型产品时,&rdquo;无方向的培养皿&rdquo;会变成协调真空——员工侧已现&rdquo;sink-or-swim、no mentorship、高 attrition、2.8 WLB&rdquo;,即这套机制的内生成本。</li>\n<li><strong>盲区 + 下一步</strong>:激励/所有权(为什么留人、薪酬结构)、信息流上行机制未挖到具体规则(需补机制)。Follow up:找近 2 年离职 FDE/PM 对账&rdquo;无 title 是否仍真无晋升博弈&rdquo;;验证 hypothesis &ldquo;去管理是否随规模回弹&rdquo;。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:政府/国防深绑、反共识政治立场(&ldquo;anti-woke / warrior culture&rdquo;)——战略上极离群但属市场/政治层,不进组织分。</li>\n<li><strong>优先级</strong>:组织 91 × 市场 大(政企 AI/数据平台) × 战略 反共识 → <strong>P0</strong>,组织截面高 Alpha + 大市场 + 反共识,理由充分。</li>\n</ul>"}, {"rank": 2, "score": 89, "conf": "RICH", "dir": "↑", "priority": "P1", "company": "Costco (COST)", "oneliner": "7%流失率/98%内部晋升/顶薪反零售常态,可核验非口号", "card": "<h1>Costco (COST) — Why attention?   ·   Score 89 · 置信度 RICH · 优先级 P1</h1>\n<p><strong>一句话定性</strong>:值得看 —— 典型&rdquo;闷声一直优秀、没转向故事&rdquo;的<strong>截面 Alpha</strong>,不是 Delta。组织操作系统 = <strong>把&rdquo;人&rdquo;当复利资产养</strong>:用全行业最高工资把人锁住(7% 流失 vs 同辈 60–70%)→ 招人时就按&rdquo;未来仓店经理&rdquo;招、~85% 经理从时薪工走上来 → 仓内几乎全部从内部提拔。同类(大卖场/折扣零售:Walmart/Sam&rsquo;s、Target、Kroger、BJ&rsquo;s)的平庸默认是&rdquo;高流失、薪资压到底、按头衔给特权、招人填岗&rdquo;,Costco 在 人才密度/激励/层级 三维上对同辈明确反常,且全是 revealed(几十年、第三方+员工侧可对账、没回弹)。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>激励/人才密度</td>\n<td>&ldquo;Seventy cents of every dollar spent by Costco goes to employee wages&rdquo;;&rdquo;highest wages in all of retail&rdquo;;〔事实〕流失率 7% vs 其他零售商 60–70%(Sinegal, MIT Sloan)</td>\n<td>全行业最高时薪(2024 均时薪 &gt;$30 vs 业界 ~$24)+ 90%+ 有雇主医保 → 把&rdquo;低流失&rdquo;做成可核验结果(7–8% vs 同辈 60–70%);奖&rdquo;留下来变强&rdquo;而非压人力成本。偏离零售业&rdquo;薪资压到底+高流失&rdquo;共识</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度(招人筛子)</td>\n<td>&ldquo;You&rsquo;re not hiring the next cashier. You&rsquo;re not hiring the next cart-pusher. You&rsquo;re hiring the next warehouse manager&hellip; You&rsquo;re hiring our future&rdquo;(CEO Vachris 对仓店经理, CNBC 2025)</td>\n<td>招人当口的筛子是&rdquo;能不能往上走&rdquo;,非&rdquo;填这个岗&rdquo;;〔事实〕~85% 新晋仓店经理从时薪工提拔、仓内经理几乎全内部产生;12 周 SIT 培训轨。CEO 本人从叉车工做到 CEO。偏离&rdquo;按岗招人、外部空降管理层&rdquo;</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>层级/特权(信息流)</td>\n<td>&ldquo;Reserved parking spaces&hellip; based on tenure instead of titles&rdquo;;&rdquo;We just grew up that way&hellip; We&rsquo;re a little quirky, but that&rsquo;s our culture and it works for us&rdquo;(前 CFO Galanti, WSJ);&rdquo;open-wall, if you will&rdquo;(Sinegal)</td>\n<td>停车位按工龄非头衔(新 CFO Millerchip 得停街对面无保留位、退休 CFO 凭 40 年工龄留位);高管开放无墙办公室、无 PR 部门(媒体由 CFO 亲接)、CEO 自接电话、20 年旧家具。偏离&rdquo;按级别配特权&rdquo;的科层常态</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>一号位亲历</td>\n<td>〔事实〕Sinegal 任内每年 ~200 天&rdquo;in the field&rdquo;巡店、力争每仓每年至少到一次、记得一线员工名字与家事(MIT Sloan / US News)</td>\n<td>一号位把认知锚在一线而非 PPT;&rdquo;managing by walking around&rdquo;制度化为时间分配;Vachris 延续 ground-level 风格。偏离&rdquo;CEO 认知停在直接下属层&rdquo;的平庸基线</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 S=D×C → 9 + 9 + 6 = 24 → 24/27×100 = <strong>89</strong>。无显著 Delta:多轮搜未见被迫 reorg/裁员/反复反转,机制已稳态运行数十年(创始人→Jelinek→Vachris 三代一致),属高 Alpha + 低组织债。<strong>在赌什么 / 何时失效</strong>:赌&rdquo;高薪→低流失→内部提拔→运营复利&rdquo;的飞轮长期跑赢&rdquo;压成本&rdquo;。失效条件:若增长逼它大规模外部空降高管、或薪资优势被同辈追平,内部提拔池与文化传承可能稀释。</li>\n<li><strong>盲区 + 下一步</strong>:决策权下沉的具体边界(一线能独立改什么不签字)、买手/budget meeting 的真实机制(有&rdquo;dressing down buyers&rdquo;传闻但缺一手细节)需补机制。follow up:① 找现任仓店经理/买手侧一手口径验证决策权与会议机制;② 验证 Vachris 时代是否保持 ~85% 内部提拔率(防 CEO 换届后回弹)。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:会员制+极少 SKU+把省下成本全返给会员(&ldquo;once you do it, it&rsquo;s like taking heroin&rdquo;)——极强战略护城河,但属业务层,不进组织分。</li>\n<li><strong>优先级</strong>:组织 89 × 市场 {大,但成熟低增长零售} × 战略 {对零售业反共识,但已被广泛研究、非隐藏} → <strong>P1</strong>。组织分够 P0 线,但市场是成熟红海、战略已是公开教科书案例(非&rdquo;隐藏变量&rdquo;),注意力回报偏研究/对标价值,排进本周看,而非放下一切。</li>\n</ul>"}, {"rank": 3, "score": 89, "conf": "RICH", "dir": "↑", "priority": "P0", "company": "Nvidia", "oneliner": "60直属+不做1v1+信息全员平权,极宽span压层级,可证伪且反成熟大厂常态", "card": "<h1>Nvidia — Why attention?   ·   Score 89 · 置信度 RICH · 优先级 P0</h1>\n<p><strong>一句话定性</strong>:值得放下手头去看。组织操作系统 = 「<strong>一号位直连全公司 + 反信息差</strong>」:极宽 span（~60 直接下属、砍掉约 7 层中层）、用 Top-5 邮件随机采样真相替代逐级汇报、公开发反馈让所有人一起学、不开 1-on-1。这是一套<strong>跑了二十年、对万亿市值大厂极反常、且有第三方/员工侧落地证据</strong>的 <strong>截面 Alpha</strong>，不是转向故事。同类基线=成熟巨型科技/半导体公司（默认 7–10 层、E-staff 5–7 人、status report 文化）。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>层级/span</td>\n<td>&ldquo;I don&rsquo;t have one-on-ones with them because it&rsquo;s impossible. We present a problem, and all of us attack it.&rdquo;（黄仁勋, Lex Fridman 播客；Entrepreneur 2026-03 转述）；〔约 60 直接下属、外界估&rdquo;砍掉约 7 层&rdquo;〕</td>\n<td>一号位直接带 ~60 人、不设 1-on-1、不设中层缓冲；同信息同时给所有人、无&rdquo;特权信息访问&rdquo;。偏离巨头默认 5–7 名 E-staff + 厚中层</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>信息流</td>\n<td>&ldquo;almost everything I say, I say to everybody at the same time&rdquo;；拒读 status report——&ldquo;meta information…distilled and refined with bias inserted…you&rsquo;re not looking at ground truth anymore&rdquo;；自己<strong>不发</strong> Top-5&rdquo;否则会 contaminating the system&rdquo;（《The Nvidia Way》/ officechai 摘录）</td>\n<td>全员每周写&rdquo;Top 5 Things&rdquo;，黄每早读~100 封&rdquo;stochastically sample the system&rdquo;捞弱信号；本人刻意不广播自己的优先级，防员工迎合 → 真相无损上行。偏离&rdquo;逐层美化的报喜文化&rdquo;</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度/留存</td>\n<td>&ldquo;I don&rsquo;t like giving up on people…I rather torture them into greatness&rdquo;（黄仁勋, 2024-09 Stripe Sessions, Fortune 报道）；〔2023 离职率 5.3%→ 2024 降至 <strong>2.7%</strong>，行业 17.7%；2024 可持续报告〕</td>\n<td>极少裁员、宁可高压&rdquo;修人&rdquo;不弃人；用使命+股权+文化留人 → 留存约为半导体行业 1/6。<strong>第三方报告数据=revealed、非自 uo;必须是产品用户&rdquo;;不办常规面试、不设 HR。汰换=赢不了比赛即出局。排他、可证伪、自缚——costly 且 revealed(contest.com 在跑)</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>决策权(3)</td>\n<td>〔事实〕Durov 是 Telegram 唯一 PM、唯一重要股东、唯一董事,无外部投资人、无董事会;&rdquo;executive-level decisions are made by Pavel Durov&rdquo;,直接对接工程师(多源:Axios/revenuememo 2024–26)</td>\n<td>唯一拍板人=创始人,可逆/不可逆都他定;无审批层、无政治。极端集权——下行全担(2024 法国被捕即&rdquo;负责人&rdquo;由他一人承)→ 是 costly 而非自利的集权</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>信息流/风险(6)</td>\n<td>Galperin(EFF):&ldquo;&lsquo;Thirty engineers&rsquo; means there is no one to fight legal requests… no infrastructure for dealing with abuse and content moderation&rdquo;;Aumasson:&rdquo;none of these 30… include privacy or compliance people, zero third-party audit&rdquo;(TechCrunch 2024-06)</td>\n<td>同一极致精简在合规/审核/安全维度=结构性缺人，第三方点名为风险。同一机制的 ↓ 面,记录在案</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 S=D×C → span 9 + 人才 9 + 决策 6 = 24;round(24/27×100)=<strong>89</strong>。<strong>在赌什么 / 何时失效</strong>:赌&rdquo;极少数顶尖单点 + 创始人单一品味&rdquo;能替代规模化组织。在产品/工程上已被 1B 用户证明;失效点在合规/审核/安全这类<strong>需要人多于需要天才</strong>的维度——监管与滥用治理压上来时,30 人结构是债(2024 被捕即一次撞墙)。</li>\n<li><strong>盲区 + 下一步</strong>:无&rdquo;怎么开会/纪要&rdquo;的一手机制原话(需补);激励维度(工程师如何分钱/留存率)只有薪酬亮点、缺机制。follow-up:Lex Fridman 2025 全访谈逐字 + contest.com 实际录用→留存数据,验证&rdquo;30 人是否真稳态、还是靠 Durov 不可复制&rdquo;。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:零外部融资、TON/加密自筹、抗监管定位——战略极离群,但已单列,不混入组织分。</li>\n<li><strong>优先级</strong>:组织 89 × 市场 大(全球即时通讯)× 战略 反共识 → <strong>P0</strong>:组织赌注极端、可信、revealed,且压在大市场+反共识战略上。</li>\n</ul>"}, {"rank": 6, "score": 89, "conf": "RICH", "dir": "?", "priority": "P0", "company": "Ambev (ADR)", "oneliner": "3G式donos所有权+up-or-out精英制+指标公开,长期在跑", "card": "<h1>Ambev (ADR) — Why attention?  ·  Score 89 · 置信度 RICH · 优先级 P0</h1>\n<p><strong>一句话定性</strong>:值得看。它运行的不是&rdquo;文化口号&rdquo;而是一套<strong>仍在跑、几十年没换、可逐条复述的 3G/Garantia 组织操作系统</strong>——PSD 筛子招人 + 20-70-10 强制汰换 + ZBB 自下而上每年从零核预算 + 把&rdquo;省下的钱年底分掉&rdquo;直接挂钩奖金 + 砸掉高管办公室让 CEO 和 VP 同桌办公。这是<strong>截面 Alpha(standing,非转向 Δ)</strong>:现 CEO Carlos Lisboa(2025 上任、Ambev 三十年内部晋升的本地人)本身就是这套晋升机的产物。<strong>但方向是混合 ↑↓</strong>:同样这套机制 revealed 出&rdquo;insane turnover / 快速 burnout / soulless&rdquo;和员工侧&rdquo;其实靠关系晋升&rdquo;的裂缝——C 高(他们当真在做),不等于这套机器对每个人都对。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>激励</td>\n<td>&ldquo;We say the leaner the business, the more money we will have at the end of the year to share&rdquo;;&rdquo;We have 85,000 people, but 250 are really the ones who make a difference. Those people are managed in a different way&rdquo;(Carlos Brito, Stanford GSB)</td>\n<td>拉伸目标→变动奖金池由 ZBB 省出的钱填;公开张贴个人指标;只奖 achievers 不奖资历,顶部 250 人单独管理 → 偏离消费品同辈&rdquo;按职级/工龄定薪&rdquo;共识</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑↓</td>\n</tr>\n<tr>\n<td>人才密度</td>\n<td>〔事实〕招人筛子 &ldquo;PSD = Poor, Smart, Deep desire to get rich&rdquo;;〔事实〕沿用 Garantia 的 &ldquo;20-70-10&rdquo;(奖前 20%、留中 70%、汰末 10%),招应届+竞技体育/名校背景快速提拔(LinkedIn/gurufocus/Stanford GSB)</td>\n<td>排他性看人标准(筛掉无&rdquo;赢的胃口&rdquo;者)+ 强制末位淘汰 + trainee→快晋升管线;代价 revealed 为 &ldquo;burnout happens quickly and turnover is insane&rdquo;(Glassdoor)→ 远超消费品同辈</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑↓</td>\n</tr>\n<tr>\n<td>层级/span/信息流</td>\n<td>&ldquo;I don&rsquo;t have an office. I share my table with my vice presidents&hellip; my finance guy in front of me&rdquo;;&rdquo;We don&rsquo;t have corporate jets&rdquo;(Brito, Stanford GSB)</td>\n<td>物理去层级:CEO 与各 VP 同一张大桌、指标公开张贴、砍高管特权(电梯/差旅都省)→ 信息横向直流、地位符号清零;对消费品大公司=稀有</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>信息流(反向对账)</td>\n<td>&ldquo;Não há meritocracia [real]&hellip; baseada muito em relacionamento; pessoas que não batem meta são promovidas&rdquo;(Glassdoor BR 员工评)</td>\n<td>与官方&rdquo;客观指标=唯一标准&rdquo;矛盾的员工口径=可能的落地裂缝/晋升被关系污染 → 红旗,需对账</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 S=D×C:激励 9 + 人才密度 9 + 去层级 6 = 24 → round(24/27×100)=<strong>89</strong>。<strong>在赌什么 / 何时失效</strong>:赌&rdquo;少数顶尖人 + 极致问责 + 把组织省出的钱回流给赢家&rdquo;能持续跑赢;它在成本/利润率上 revealed 成立(行业最高 margin 之一),但<strong>赌&rdquo;靠 cost-cutting + 压榨型激励能无限期换增长&rdquo;</strong>——一旦市场进入需创新/品类升级阶段(SABMiller 后已无可压目标),同一套机制反成天花板,且持续 burnout 会侵蚀人才密度本身。</li>\n<li><strong>盲区 + 下一步</strong>:① 员工侧&rdquo;靠关系晋升&rdquo;与官方&rdquo;纯指标&rdquo;矛盾——找近 3 年 Ambev 巴西在职/离职者对账 20-70-10 是否仍真执行,还是已软化成走过场;② 验证 hypothesis:Lisboa(2025)是延续机器、还是悄悄松绑高压(看其是否动 ZBB/末位淘汰)。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:全球啤酒成熟/量缩市场,3G 成本机器的边际收益递减——战略上属&rdquo;已知打法的天花板期&rdquo;,不是反共识新赌注。</li>\n<li><strong>优先级</strong>:组织 89 × 市场 大(全球啤酒,但成熟下行)× 战略 共识(这套 3G 系统已被 HBS/IMD 反复研究、非隐藏变量)→ <strong>P0</strong>(分高+大市场)。<strong>但提醒</strong>:这是一个&rdquo;挖得极透、无新故事&rdquo;的纯 standing-Alpha,对老练读者新意低;真正的 follow-up 价值在验证&rdquo;机器是否正在悄悄decay&rdquo;(信息流那行的裂缝)。</li>\n</ul>"}, {"rank": 7, "score": 89, "conf": "RICH", "dir": "↑", "priority": "P0", "company": "DeepSeek (深度求索)", "oneliner": "无层级无预设角色、实习生免审批用集群,机制可证伪且多源印证", "card": "<h1>DeepSeek (深度求索) — Why attention?   ·   Score 89 · 置信度 RICH · 优先级 P0</h1>\n<p><strong>一句话定性</strong>：值得放下手头去看。组织操作系统 = <strong>「两层制 + 研究员自组织 + 应届顶尖脑 + 无审批算力/无 KPI」</strong>——用约 150 人、只有&rdquo;梁文锋 + 研究员&rdquo;两层、不靠天价薪酬，跑出 frontier 模型。这是<strong>截面 Alpha</strong>(当前在运行、跑成稳态、可复述成机制),不是转向故事;唯一的 ↓ 是<strong>核心作者被对手 2–3 倍薪资撬走</strong>,压着&rdquo;靠使命留人&rdquo;这条假设。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>层级/span</td>\n<td>&ldquo;只有梁文锋和其他研究员两个层级&rdquo;;〔研究团队约100多人、除梁文锋外没有二把手〕(网易《V4发布前的DeepSeek》)</td>\n<td>~150人组织只有 founder→研究员两层、无 deputy、无总监层;梁出席每个团队周会、周会跨组开放。偏离同类 lab(仍有 research director/VP 层)</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度</td>\n<td>&ldquo;我们的招聘标准一直基于热情和好奇心…他们对研究的渴望远超对金钱的关注&rdquo;;&rdquo;(有)热爱、扎实的基础能力,其他都没那么重要&rdquo;(梁文锋·暗涌2024.7,新浪转载)</td>\n<td>几乎不社招、招应届/博士/四五年级实习生,172名作者中&gt;7成本硕、&gt;7成&lt;30岁;不靠天价薪酬却出 frontier→筛&rdquo;内驱+好奇&rdquo;而非资历/名校。同类共识是 8 位数挖资深明星</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>决策权/激励</td>\n<td>&ldquo;计算资源和团队成员的使用没有限制…可以随时调用训练集群,无需审批&rdquo;;&rdquo;没有明确的绩效考核和DDL&rdquo;;&rdquo;不预先设定角色,分工是自然形成的&rdquo;(暗涌;网易)</td>\n<td>一线无审批用集群、不打卡(6–7点走)、无 KPI、自由组队;但&rdquo;当一个idea显潜力,我们也会<strong>自上而下</strong>地去调配资源&rdquo;→ 探索期下沉、下大注时集中。非纯去中心</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>战略-结构/康威</td>\n<td>&ldquo;cross-functional division of labor…数据选择与infra落地必须在实验定版期一起考虑&rdquo;(网易)</td>\n<td>不按职能切墙、按模型训练的协同需求让 data/infra/算法贴在一起做 = 用团队边界设计协同,非组织图考古</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>留存(债/红旗)</td>\n<td>〔V4致谢近300研发者,10名核心作者已离职:王炳宣→腾讯、罗福莉被雷军千万年薪挖至小米、郭达雅→字节;对手薪资普遍高2–3倍、部分8位数总包〕(每经/钛媒体/证券时报)</td>\n<td>&ldquo;低薪+使命留人&rdquo;模型在过热市场被精准定价撬动→这是市场挖角压力、非弱组织 reorg 补债;不抹掉 Alpha,但是&rdquo;何时失效&rdquo;的真条件</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>：只累计 A 行 Top-3 → 层级(3×3=9)+ 人才(3×3=9)+ 决策/激励(3×2=6)= <strong>24/27×100 ≈ 89</strong>。<strong>在赌什么/何时失效</strong>：赌&rdquo;少而精的内驱天才 + 极低管理摩擦&rdquo;能持续胜过&rdquo;规模化 + 强激励 + 厚管理层&rdquo;;当(a)对手用 2–3x 薪资持续撬走能独立带方向的核心作者、(b)规模逼近梁本人&rdquo;亲历式&rdquo;管理与自然分工的上限时,两层制可能撑不住。</li>\n<li><strong>盲区 + 下一步</strong>：信息流(坏消息上行机制)、晋升/汰换具体动作&rdquo;需补机制&rdquo;——非平庸,是没挖到。follow up:验证 hypothesis&rdquo;frontier 输出靠的是结构(两层+无审批)还是少数明星个体&rdquo;——查留任核心 vs 离职后产出是否衰减;问前员工&rdquo;无 KPI 下怎么决定谁做什么、谁的赌注被砍&rdquo;。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>：幻方量化自有算力/零外部融资、开源 + 极低定价(&ldquo;不亏本不暴利&rdquo;)——战略极反共识,但属资本/市场层,不进组织分。</li>\n<li><strong>优先级</strong>：组织 89 × 市场 大(frontier LLM/AGI) × 战略 反共识 → <strong>P0</strong>:组织截面 Alpha 强且可信(多为 revealed),押在最大牌桌上,理应优先看;同时盯人才留存这条 ↓。</li>\n</ul>"}, {"rank": 8, "score": 89, "conf": "RICH", "dir": "↑", "priority": "P0", "company": "Airbnb", "oneliner": "职能制+单一roadmap(10%法则)+砍掉经典PM+30人核心组,稳态5年的强Alpha", "card": "<h1>Airbnb — Why attention?   ·   Score 89 · 置信度 RICH · 优先级 P0</h1>\n<p><strong>一句话定性</strong>:值得放下手头去看。组织操作系统 = <strong>&ldquo;创始人当总编辑的单一功能制&rdquo;</strong>——把一家 $12B 上市消费平台砍成一个 P&amp;L、无 BU/GM、无 COO,全部职能直接汇报给 Chesky,他亲自 hire/fire/promote/manage ~50 人、按 1/2/4 周节奏当 editor-in-chief 评所有产品、全公司 2x/年统一发布。这是<strong>截面 Alpha(已稳态运行 ~5 年、没回弹)</strong>,不是只会讲故事的 Delta。它<strong>起源于 2020 危机式 reorg(Δ),但已固化成持续在跑的标准结构</strong>(诊断:危机后被迫做 → 但常规节奏维持 5 年、营收/利润为正、未反转 = 强组织已把补债转成 standing Alpha)。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>战略-结构 / 康威</td>\n<td>&ldquo;I got rid of layers of management. I went back to functional. I got rid of all managers… you can only manage the function.&rdquo;(Chesky, officechai 转述其发言);〔事实〕把约 10 个 division 砍回单一功能制,finance/strategy/product/legal/people 全直报 CEO、无 COO(fourweekmba / 多源)</td>\n<td>一个 P&amp;L、无 BU、无 GM、共享 eng/marketing;新战略来时先重画团队边界(康威主动用)。偏离同类(Booking/Expedia/Uber 皆 BU+GM 制)的上市消费平台基线</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>层级/span + 一号位亲历</td>\n<td>&ldquo;I treat them all as my directs… hire, fire, promote, and manage&rdquo;(Fortune 2025-08);〔事实〕在 ~7,300–8,200 人公司亲管 ~50 人(Fortune/Yahoo)</td>\n<td>CEO 把 ~50 人当直属、亲自决定去留升迁 + skip-level;自缚式占用 CEO 时间、可证伪、反&rdquo;大公司 CEO 不下沉&rdquo;正统</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>决策权 / 组织演进</td>\n<td>&ldquo;we got rid of the classic product management function… we combine product management with product marketing&rdquo;;&rdquo;The CEO reviewed all work… editor-in-chief&rdquo;(Joca Torres 转述其演讲);&rdquo;I actually stay in the details&rdquo;(Kantrowitz)</td>\n<td>PM 并入 product marketing、designer 升到 PM 级;roadmap 收敛到 ~10 个项目;<strong>80% 产品 2x/年统一发布、20% 持续优化</strong>;Chesky 按 1/2/4 周评所有产出。偏离&rdquo;PM 主导 + 持续小步发版&rdquo;行业共识</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度</td>\n<td>&ldquo;We want a small, lean, elite… team, not a team of mid-level battalion type people&rdquo;;&rdquo;every person brings… a communication tax&rdquo;;&rdquo;B players hire lots of C players&rdquo;(officechai)</td>\n<td>用&rdquo;沟通税(人头→复杂度指数级)&rdquo;压人头(headcount 5 年仅 ~7.3k→8.2k)、控会议;偏离&rdquo;用招人数量证明进展&rdquo;基线</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 = 9 + 9 + 6 = 24 → 24/27×100 = <strong>89</strong>。<strong>在赌什么 / 何时失效</strong>:赌&rdquo;创始人能当全公司单点带宽 + editor-in-chief&rdquo;——AI 让&rdquo;少而精&rdquo;成立时极强;一旦 Chesky 离场/分心/赛道需多线并进,单点功能制会成瓶颈(可逆性差、无 COO 接班缓冲)。</li>\n<li><strong>盲区 + 下一步</strong>:信息流维度(坏消息怎么上行)无独立机制证据;PM 改制后<strong>员工侧对账缺位</strong>(未找到 Blind/Glassdoor 一线口径印证 vs 表演)。Follow-up:① 找前/现 PM 与设计师口径,验证&rdquo;editor-in-chief&rdquo;是真授权还是事必躬亲瓶颈;② 验证 2x/年发布是否仍在跑(2025-2026 节奏)。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:2025 计划砸 $250M 拓新业务线(Experiences/Services)、travel/OTA 大市场——战略层值得看,但与组织分独立。</li>\n<li><strong>优先级</strong>:组织 89 × 市场 大(全球旅游/OTA)× 战略 反共识(功能制 all-in)→ <strong>P0</strong>:组织分极高 + 大市场,放下手头去看;主要风险是单点依赖创始人。</li>\n</ul>"}, {"rank": 9, "score": 85, "conf": "RICH", "dir": "↑", "priority": "P0", "company": "Grocery Outlet (NASDAQ: GO)", "oneliner": "独立运营商(非加盟)+利润分成,门店级真所有权,逆同业W-2店长制", "card": "<h1>Grocery Outlet (GO) — Why attention?  ·  Score 85 · 置信度 RICH · 优先级 P0</h1>\n<p><strong>一句话定性</strong>:值得看 — 它的&rdquo;组织操作系统&rdquo;是一套<strong>罕见的、运行了 40+ 年的截面 Alpha</strong>:把约 533 家店交给独立运营商(IO),公司管买货/物流/地产(寄售存货),门店的定价/订货/招人/本地营销全下放给店主,门店毛利<strong>50/50 对半分成</strong>。这套去中心化 + 真所有权 + 极严人选筛子是<strong>当前在运行的结构性 Alpha</strong>,不是转向故事。但 FY2025 巨亏 + 系统切换灾难 + CEO 换血(外来空降)是一条<strong>债味的 Δ</strong>,单独标、不盖 Alpha。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>人才密度</td>\n<td>&ldquo;What we&rsquo;re looking for is skillset and mindset… I&rsquo;m entrepreneurial. I&rsquo;m a risk taker.&rdquo;(前 CEO Eric Lindberg, Supermarket News《How GO Picks Its Teams》)</td>\n<td>〔每月 2,000–3,000 名候选人 → 仅 10–12 人获邀入训,≈300:1〕+ 9 个月带薪 AOT 学徒、~65% 来自连锁商超、~80% 夫妻店;<strong>汰掉&rdquo;仅合格者&rdquo;在入口完成</strong>。偏离同辈&rdquo;招店长当雇员&rdquo;基线</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>激励/所有权</td>\n<td>〔门店毛利公司与 IO 50/50 分成;IO 自担门店人工/水电/本地营销,无加盟费,存货寄售公司持有至售出〕(Pound the Rock 拆解 / SN)</td>\n<td>店主拿走一半门店毛利、自负店内成本 → 真 P&amp;L 所有权落到一线;成熟店 IO 收入可达 $150k–200k。偏离连锁&rdquo;员工领薪&rdquo;与传统加盟&rdquo;先收费&rdquo;两个基线</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>决策权</td>\n<td>〔IO 可&rdquo;set or adjust prices to maximize sales&rdquo;、按本地口味从公司货单选品、自主招聘〕(SN / 公司材料)</td>\n<td>定价/订货/用工权下放门店;公司只管国家级买货+9 个 DC 配送。偏离连锁&rdquo;中央统一定价/订货/排班&rdquo;</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>组织演进</td>\n<td>&ldquo;Our fourth-quarter results were unacceptable… more work to do than we expected&rdquo;(CEO Jason Potter, FY2025 财报);〔FY25 经营亏损 $221.7M、净亏 $224.9M;关 36 店;空降 Fresh Market 出身 CEO + 新设 CMO/CSOO〕(Progressive Grocer / 8-K)</td>\n<td>2023.8 系统切换搞砸→2024 给 IO $12.4M 佣金补贴;现由外来一号位补债、收编中央买货与门店运营。<strong>债味 Δ:危机后被迫、空降补救</strong></td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 → 9(人才)+9(激励)+5(决策权)=<strong>23/27×100≈85</strong>。Δ 行(组织演进)单独列、不进分。<strong>在赌什么/何时失效</strong>:赌&rdquo;把门店当独立创业体 + 严选少数高 mindset 店主&rdquo;在折扣零售上能跑出连锁做不到的本地适配与人效;当<strong>中央化升级(Afresh 全店 AI 订货、新 CMO/CSOO 收权)</strong>与&rdquo;IO 自治&rdquo;内核相撞、或系统/采购再出错挤压 IO 分成时失效。</li>\n<li><strong>盲区 + 下一步</strong>:① &ldquo;怎么开会/IO 怎么参与决策&rdquo;查无机制(信息盲区,≠平庸)—找 IO 顾问/前店主问公司与 IO 的决策与沟通机制;② Afresh 收权是否真侵蚀 IO 自治、IO 流失率多少(无公开数据)—验证 hypothesis&rdquo;Potter 的中央化是强化基底 Alpha 还是稀释它&rdquo;。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:opportunistic 尾货采购的 treasure-hunt 折扣模型;FY25 巨亏多为减值+系统+店基问题,非 IO 模型本身失效。</li>\n<li><strong>优先级</strong>:组织 85 × 市场 大(美国折扣/grocery,巨型) × 战略 反共识(去中心化 IO vs 连锁中央化) → <strong>P0</strong>;理由:standing Alpha 是 40+ 年 revealed(非 stated,不受落地闸限制),但带一条债味 Δ,需盯&rdquo;中央化会否反噬自治&rdquo;。</li>\n</ul>"}, {"rank": 10, "score": 85, "conf": "RICH", "dir": "↑", "priority": "P0", "company": "Netflix", "oneliner": "keeper test+context-not-control+无休假/报销政策,多条在跑且可证伪的高Alpha", "card": "<h1>Netflix — Why attention?   ·   Score 85 · 置信度 RICH · 优先级 P0</h1>\n<p><strong>一句话定性</strong>：值得放下手头看——这是<strong>截面 Alpha</strong>（运行 20+ 年、已被第三方反复验证、被全行业抄袭的&rdquo;组织操作系统&rdquo;），不是转向 Delta。它的 OS：<strong>用极高人才密度替代流程</strong>——&ldquo;少而精 + 个人市场顶薪全现金 + keeper test 持续汰换&rdquo;，再在此前提上跑&rdquo;context not control + informed captain&rdquo;的去审批决策。同辈基线是好莱坞大厂的科层+占位文化，Netflix 在人才密度/激励/决策权/低官僚四维同时反常。下方每条均为<strong>当前在运行</strong>的机制（A）。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕（+来源）</th>\n<th>机制（谁/怎么/多少）+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>人才密度</td>\n<td>&ldquo;If X wanted to leave, would I fight to keep them?&rdquo; / 新增 &ldquo;Knowing everything I know today, would I hire X again?&rdquo;（Netflix 官方 Culture Memo, jobs.netflix.com/culture）；〔事实〕&rdquo;adequate performance gets a generous severance&rdquo;（历版 memo，业内广引）；〔事实〕FY24 营收 $39.1B / ~12,800 人 ≈ <strong>$3.0M 营收/人 vs 迪士尼 ~$410K、233,000 人</strong>（SEC 10-K + Bullfincher）</td>\n<td>经理对每个直接下属<strong>持续</strong>（非年度）做 keeper test，&rdquo;仅合格&rdquo;者主动给优厚遣散换星；汰换是<strong>真动作+可对账</strong>（员工侧 Glassdoor/Blind 反复证实&rdquo;被裁/焦虑&rdquo;——证明机制真在跑）。偏离好莱坞大厂&rdquo;人头通胀+占位不动&rdquo;基线</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>激励</td>\n<td>&ldquo;We pay personal top of market for the role and location — a judgment about what that person could make in a similar role at another company.&rdquo;（官方 memo）</td>\n<td>全现金、按&rdquo;你在别处能拿多少&rdquo;定薪，不玩期权游戏/不靠职级表 → 奖个人市场价、买留存而非锁人；偏离&rdquo;分级薪酬带+股权绑定&rdquo;共识。营收/人是其 revealed 结果</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>决策权</td>\n<td>&ldquo;For every significant decision, we identify an informed captain… We expect informed captains to seek out different opinions… We call this farming for dissent.&rdquo;（官方 memo）；&rdquo;context not control&rdquo;（同上）</td>\n<td>每个重大决策<strong>单一具名 informed captain</strong> 拍板（非共识投票）、决策前强制&rdquo;farming for dissent&rdquo;、同目标的两组无需相互审批即可执行 → 决策下沉一线、给上下文不给控制；偏离&rdquo;决策上浮/层层签字&rdquo;基线</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>层级/官僚</td>\n<td>&ldquo;Our vacation policy… is two words: &lsquo;Take vacation.&rsquo;&rdquo; / &ldquo;Our expenses policy is just five words: &lsquo;Act in Netflix&rsquo;s best interests.&rsquo;&ldquo;（官方 memo）</td>\n<td>取消休假/差旅/报销审批制度，只留一句原则 → 自缚式去流程（赌人才密度撑得住、出事公开打脸）；对大公司基线（厚审批层）激进反常</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>组织演进</td>\n<td>〔事实〕2024 改版 memo：&rdquo;professional sports team, not a family&rdquo;；保留 keeper test 并<strong>新增</strong> &ldquo;would I hire again&rdquo; 维度（about.netflix.com/news；Entrepreneur）</td>\n<td>reorg 诊断：<strong>强组织表现好时主动升级</strong>（盈利/增长中、按节奏收紧标准、有 15 年 track record），非危机补债、非反复反转 → 维度9 的 Alpha，不扣分</td>\n<td style=\"text-align: center;\">Δ→A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>：只累计 A 行 Top-3：人才密度 S=9、激励 S=6、决策权 S=6 → Σtop3=21 /27×100 = <strong>78</strong>；2024 演进经诊断为强组织主动升级（非债）、上调至 <strong>85</strong>。<strong>在赌什么 / 何时失效</strong>：全押&rdquo;人才密度足够高 → 流程可省、自由可给&rdquo;。失效条件：密度一旦下滑，无流程兜底会放大风险；员工侧&rdquo;culture of fear / 24-7 anxiety&rdquo;是真实下行（方向风险），可能压制坦诚与冒险——costly 不等于对，这套对&rdquo;可被替换的执行岗&rdquo;残酷。</li>\n<li><strong>盲区 + 下一步</strong>：现任双 CEO（Sarandos/Peters）<strong>个人</strong>招人筛子/会议怪癖未挖到一手原话（机制承自 Hastings 时代、属公司级而非个人级）——是信息盲区，非平庸。Follow up：①验证 keeper test 在 Hastings 退任后是否仍硬执行、有无松动（找近 1-2 年 Blind/离职访谈对账）；②验证&rdquo;fear culture&rdquo;是否在伤害内容创新产出。</li>\n<li><strong>业务/战略离群（不计入组织分）</strong>：单一全球流媒体平台、广告/游戏扩张、并购 WBD 传闻——战略层，不进组织分。</li>\n<li><strong>优先级</strong>：组织 85 × 市场 {大，全球流媒体} × 战略 {部分反共识} → <strong>P0</strong>：高 Alpha + 大市场，标杆级可学样本，放下手头看。</li>\n</ul>"}, {"rank": 11, "score": 85, "conf": "RICH", "dir": "↑", "priority": "P0", "company": "Shopify", "oneliner": "加人前先证明AI做不了+含高管全员+进考核,正式资源闸", "card": "<h1>Shopify — Why attention?   ·   Score 85 · 置信度 RICH · 优先级 P0</h1>\n<p><strong>一句话定性</strong>：值得放下手头去看。这是<strong>截面 Alpha（不是转向故事）</strong>——一个把&rdquo;减法/去摩擦&rdquo;做成可复述硬机制的组织操作系统：用 IT 一夜杀光会议、用&rdquo;先证明 AI 干不了才准招人&rdquo;卡住人头通胀、用&rdquo;生命故事+机会观&rdquo;筛人而非标准面试题。多数同类（大型 SaaS）只喊&rdquo;高效/扁平&rdquo;，Shopify 把它落成了得罪人、可证伪、且被财报数据 revealed 的动作。同辈 table-stakes（喊敏捷）已剔除。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制（谁/怎么/多少）+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>决策权/层级</td>\n<td>&ldquo;We can either go slow and deliberate, or fast and chaotic. We are going fast and chaotic… Intentional chaos is more than okay&rdquo;（COO Kaz Nejatian 全员邮件, 2023-01, Fortune/Axios）；Tobi: &ldquo;The best thing founders can do is subtraction&rdquo;（Bloomberg）</td>\n<td>IT 一夜<strong>自动删除全公司所有 3 人以上 recurring 会议</strong>，释放约 76,500 小时；周三零会议；50 人以上会议只能周四 11-5 ET。非&rdquo;鼓励少开会&rdquo;口号，而是<strong>用系统强制</strong>——同类多停在倡议层</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>激励/人才密度</td>\n<td>&ldquo;Teams must demonstrate why they cannot get what they want done using AI before asking for more headcount and resources&rdquo;；&rdquo;reflexive AI usage is now a baseline expectation&rdquo;；&rdquo;this applies to me and the executive team&rdquo;（Tobi 内部备忘, 自己发到 X, 2025-04, CNBC/Inc）</td>\n<td><strong>招人前先举证 AI 干不了</strong>；AI 使用进<strong>绩效考核+同行互评</strong>；明确含 CEO/高管自己。〔revealed 事实〕员工数 8,300→约8,100，而 2024 营收 +26% 至 $8.88B、经营利润由 −$1.42B 翻正至 +$1.08B（公司 6-K/年报）→ 人头与营收脱钩、<strong>没回弹</strong>。偏离&rdquo;用招人数量证明进展&rdquo;的人头通胀基线</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度（筛子）</td>\n<td>&ldquo;the strongest predictor of people who do well at Shopify is whether they see opportunity as something to compete for, or… essentially everywhere and unlimited&rdquo;；trust 从 50% 起&rdquo;battery&rdquo;（Knowledge Project Ep.41, fs.blog）</td>\n<td><strong>不问标准面试题</strong>，听候选人讲生命故事+追问关键决策；用&rdquo;机会观（稀缺 vs 无限）&rdquo;做录用预测器；二级人才市场<strong>招潜力不招现成技能</strong>。是 revealed 的看人筛子，非&rdquo;我们重视人才&rdquo;</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>一号位自觉</td>\n<td>组织&rdquo;like a book written by a single author&rdquo;，主张 &ldquo;skilled micromanagement&rdquo;；&rdquo;Amazon is trying to build an empire and Shopify is trying to arm the rebels&rdquo;（Tobi 多处访谈, readtheprofile/notboring）</td>\n<td>一号位亲自管文化与产品连贯性、用单作者隐喻反对纯放手；&rdquo;arming the rebels&rdquo;是连贯运营模型（隐含怎么组织/激励团队）。框架+部分在跑机制→维度8 真信号</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>战略-结构/演进</td>\n<td>&ldquo;larger companies are more sluggish… because of all the side quests and distractions&rdquo;；点名 managers &ldquo;add heavy layers of process, approvals, meetings&rdquo;（Tobi 2023-05 裁员备忘, Globe&amp;Mail）；员工感觉像&rdquo;NPCs&rdquo;（TechCrunch 批沟通）</td>\n<td>砍 20%（约1,800人）、卖物流给 Flexport、<strong>专砍管理层减少层级</strong>。reorg 诊断：在聚焦&rdquo;main quest&rdquo;时主动做、明确减层（偏 Alpha），但沟通翻车=轻债。<strong>不进主分</strong></td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>：只累计 A 行 Top-3 S=D×C：决策权 3×3=9、AI/人头 3×3=9、筛子 2×2=4 → Σ=22 → round(22/27×100)=<strong>81</strong>；一号位 4 作第4条不计入。〔同维度限 2 条，决策权与激励为不同维度故都计〕<strong>取 85 反映 revealed 落地之硬（财报数据，非自述）。在赌什么</strong>：赌&rdquo;减法+去摩擦+AI 杠杆&rdquo;能让小团队持续跑赢人头堆出来的对手；<strong>失效条件</strong>：AI 真实产出不及预期时，&rdquo;先证明 AI 干不了&rdquo;会退化成隐性 hiring freeze、灼伤士气 yle=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>战略-结构 / span</td>\n<td>〔事实〕&rdquo;~130–145 个 BU,各为独立 P&amp;L 中心&rdquo;&ldquo;no centralized R&amp;D function, no central sales force, no central manufacturing&rdquo;&ldquo;corporate HQ 仅 a few hundred employees out of ~170,000&rdquo;(Jimmy&rsquo;s Journal 深拆 / 公司 About 页)</td>\n<td>1987 LBO 后砍掉几乎全部中央职能,把每个 BU 设为独立损益单元;总部极小、扁到 3 层 segment→GM。&rdquo;consciously chosen agility over scale economics&rdquo;</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>激励</td>\n<td>〔事实〕GM &ldquo;full P&amp;L responsibility&rdquo;&ldquo;compensated heavily on the results they deliver&rdquo;;CEO ~90% at-risk,且 <strong>2023 年因未达标 Norwitt 未拿 bonus</strong>(Jimmy&rsquo;s Journal / 代理声明)</td>\n<td>MIP 现金奖直接挂 operating-unit 利润/增长/ROI;具名 owner、上下行都真实(零 bonus = revealed 自缚证据)。偏离&rdquo;奖规模/活动&rdquo;</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>决策权(并购)</td>\n<td>&ldquo;The new companies are not integrated into Amphenol; they have total operating autonomy.&rdquo;(Norwitt);〔事实〕被并 BU 甚至可买竞品连接器自用</td>\n<td>70+ 桩并购后<strong>不整合</strong>、留原班 GM、保留自治;靠激励而非整合对齐。偏离&rdquo;并购即吸收&rdquo;共识</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3(同一&rdquo;操作系统&rdquo;在决策权/结构/激励三维各有独立机制):决策权 9 + 战略-结构 9 + 激励 6 = 24/27→<strong>89</strong>;保守去掉决策权与结构的重叠后(9+6+6=21→78)。取中 <strong>85</strong>。Δ:无重大转向;2026 Norwitt 兼任 Chairman、Loeffler 任满 5 旬退休 = <strong>常规计划内交接、CEO 连续性保留</strong>,非危机 reorg,不减 Alpha。<strong>在赌什么 / 何时失效</strong>:赌&rdquo;小单元的速度+具名问责 &gt; 规模协同&rdquo;;若 AI 数据中心需要跨 BU 统一的大平台/巨额集中投资,极致去中
